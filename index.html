                        document.getElementById('btn-delete-selected').style.display = 'flex';
                        if (['rect', 'cloud', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'circle'].includes(selectedObject.type)) {
                            document.getElementById('fill-gray-check').checked = (selectedObject.fillColor === '#e0e0e0'); isFillLightGray = (selectedObject.fillColor === '#e0e0e0');
                        }
                        isDraggingObject = true; dragStartPoint = { x: wx, y: wy }; snapshotOriginalPosition(selectedObject);
                    }
                } else {
                    lastClickTime = 0; lastClickObj = null; selectedObject = null; multiSelectedObjects = [];
                    document.getElementById('btn-delete-selected').style.display = 'none'; closePropertyPanel();
                    isLassoing = true; lassoPoints = [{x: wx, y: wy}];
                }
                renderScene(); return;
            }

            if (currentTool === 'text') { createTextInput(wx, wy, e.clientX, e.clientY); } 
            else if (currentTool === 'pen' || currentTool === 'eraser') {
                isDrawing = true; currentPath = { type: currentTool, color: currentColor, baseSize: currentBaseSize, points: [{x: wx, y: wy}] };
                if (currentTool === 'eraser') { sceneObjects.push(currentPath); resetUndoCounter(); }
            } else if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'circle', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(currentTool)) {
                let center = getAlignedCenter(wx, wy); activeGuides = center.guides;
                if (guideTimeout) clearTimeout(guideTimeout); guideTimeout = setTimeout(() => { activeGuides = []; renderScene(); }, 1000);

                if (currentTool === 'rect') sceneObjects.push({ type: 'rect', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.RECT_W/2, y: center.y - SHAPE.RECT_H/2, w: SHAPE.RECT_W, h: SHAPE.RECT_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'oval') sceneObjects.push({ type: 'oval', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.OVAL_W/2, y: center.y - SHAPE.OVAL_H/2, w: SHAPE.OVAL_W, h: SHAPE.OVAL_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'diamond') sceneObjects.push({ type: 'diamond', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.DIAMOND_W/2, y: center.y - SHAPE.DIAMOND_H/2, w: SHAPE.DIAMOND_W, h: SHAPE.DIAMOND_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'parallelogram') sceneObjects.push({ type: 'parallelogram', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.PARA_W/2, y: center.y - SHAPE.PARA_H/2, w: SHAPE.PARA_W, h: SHAPE.PARA_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'cloud') sceneObjects.push({ type: 'cloud', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.CLOUD_W/2, y: center.y - SHAPE.CLOUD_H/2, w: SHAPE.CLOUD_W, h: SHAPE.CLOUD_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'valve-h') sceneObjects.push({ type: 'valve-h', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_W/2, y: center.y - SHAPE.VALVE_H/2, w: SHAPE.VALVE_W, h: SHAPE.VALVE_H }); 
                else if (currentTool === 'valve-v') sceneObjects.push({ type: 'valve-v', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_H/2, y: center.y - SHAPE.VALVE_W/2, w: SHAPE.VALVE_H, h: SHAPE.VALVE_W }); 
                else if (currentTool === 'valve-poly') sceneObjects.push({ type: 'valve-poly', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_POLY_W/2, y: center.y - SHAPE.VALVE_POLY_H/2, w: SHAPE.VALVE_POLY_W, h: SHAPE.VALVE_POLY_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'circle') sceneObjects.push({ type: 'circle', color: currentColor, lineWidth: currentBaseSize, x: center.x, y: center.y, radius: 50, isDouble: isDoubleCircle, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                else if (currentTool === 'short-line-h') sceneObjects.push({ type: 'short-line-h', color: currentColor, lineWidth: currentBaseSize, x: center.x - 30, y: center.y, w: 60, h: 0, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                resetUndoCounter(); renderScene();
            } else if (currentTool.includes('arrow') || currentTool.includes('line')) {
                isDraggingArrow = true; arrowStartPoint = { x: wx, y: wy };
                if (currentTool.includes('angled')) { currentPath = { type: 'arrow', pathType: currentTool, color: currentColor, lineWidth: currentBaseSize, points: [arrowStartPoint] }; }
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (isDraggingText) return;
            e.preventDefault();

            if (e.pointerType === 'touch') {
                if (!activeTouchPointers.has(e.pointerId)) return;
                activeTouchPointers.set(e.pointerId, e);
                if (activeTouchPointers.size === 1 && isPanning) {
                    const dx = e.clientX - startPan.x, dy = e.clientY - startPan.y;
                    camera.x = startCam.x + dx; camera.y = startCam.y + dy; renderScene();
                } else if (activeTouchPointers.size === 2) {
                    let pts = Array.from(activeTouchPointers.values());
                    let currentDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    let currentCenter = { x: (pts[0].clientX + pts[1].clientX) / 2, y: (pts[0].clientY + pts[1].clientY) / 2 };
                    let scaleFactor = currentDist / initialPinchDist; camera.scale = Math.min(Math.max(initialScale * scaleFactor, 0.2), 5); 
                    camera.x = currentCenter.x - ((pinchCenter.x - startCam.x) / initialScale) * camera.scale;
                    camera.y = currentCenter.y - ((pinchCenter.y - startCam.y) / initialScale) * camera.scale; renderScene();
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;
            
            const worldPos = getWorldPos(e.clientX, e.clientY);

            if (currentTool === 'select') {
                if (isLassoing) { lassoPoints.push({x: worldPos.x, y: worldPos.y}); renderScene(); return; }
                if (isDraggingObject) {
                    const dx = worldPos.x - dragStartPoint.x, dy = worldPos.y - dragStartPoint.y;
                    let draggingList = multiSelectedObjects.length > 0 ? multiSelectedObjects : (selectedObject ? [selectedObject] : []);
                    draggingList.forEach(obj => {
                        if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'circle', 'text', 'oval', 'diamond', 'parallelogram', 'short-line-h', 'image'].includes(obj.type)) {
                            obj.x = obj._origX + dx; obj.y = obj._origY + dy;
                        } else {
                            if (obj.points && obj._origPoints) {
                                for (let i = 0; i < obj.points.length; i++) { obj.points[i].x = obj._origPoints[i].x + dx; obj.points[i].y = obj._origPoints[i].y + dy; }
                            } else if (obj.p1 && obj._origP1) {
                                obj.p1.x = obj._origP1.x + dx; obj.p1.y = obj._origP1.y + dy; obj.p2.x = obj._origP2.x + dx; obj.p2.y = obj._origP2.y + dy;
                            }
                        }
                    });
                    renderScene(); return;
                }
            }

            if (isDrawing && currentPath && (currentTool === 'pen' || currentTool === 'eraser')) {
                const events = (e.getCoalescedEvents && e.getCoalescedEvents().length > 0) ? e.getCoalescedEvents() : [e];
                for (let ev of events) {
                    const pos = getWorldPos(ev.clientX || e.clientX, ev.clientY || e.clientY);
                    const lastPt = currentPath.points[currentPath.points.length - 1];
                    if (!lastPt || Math.hypot(pos.x - lastPt.x, pos.y - lastPt.y) > 2) { currentPath.points.push({ x: pos.x, y: pos.y }); }
                }
                if (currentTool === 'pen') {
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); applyCamera(pCtx);
                    let renderPath = currentPath;
                    if (e.getPredictedEvents && e.pointerType === 'pen') {
                        const predicted = e.getPredictedEvents();
                        if (predicted.length > 0) {
                            renderPath = { ...currentPath, points: [...currentPath.points] };
                            for (let ev of predicted) {
                                const pos = getWorldPos(ev.clientX, ev.clientY); const lastPredPt = renderPath.points[renderPath.points.length - 1];
                                if (!lastPredPt || Math.hypot(pos.x - lastPredPt.x, pos.y - lastPredPt.y) > 2) { renderPath.points.push({ x: pos.x, y: pos.y }); }
                            }
                        }
                    }
                    drawSmoothPath(pCtx, renderPath);
                } else if (currentTool === 'eraser') { renderScene(); }
            } else if (isDraggingArrow) {
                if (currentTool.includes('angled') && currentPath) {
                    currentPath.points.push(worldPos);
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); applyCamera(pCtx);
                    let previewObj = { ...currentPath, points: orthogonalize(currentPath.points, 25) };
                    if (currentTool.includes('rounded-angled')) { drawRoundedOrthogonalArrow(pCtx, previewObj, true); } 
                    else { drawFreehandArrow(pCtx, previewObj, true); }
                } else { drawPreviewArrow(arrowStartPoint, worldPos); }
            }
        });

        function handlePointerEnd(e) {
            if (e.pointerType === 'touch') {
                activeTouchPointers.delete(e.pointerId);
                if (activeTouchPointers.size < 2) {
                    if (activeTouchPointers.size === 1) {
                        let remaining = Array.from(activeTouchPointers.values())[0];
                        startPan = { x: remaining.clientX, y: remaining.clientY }; startCam = { x: camera.x, y: camera.y }; isPanning = true;
                    } else { isPanning = false; }
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;

            if (currentTool === 'select') {
                if (isLassoing) {
                    isLassoing = false;
                    if (lassoPoints.length > 2) {
                        multiSelectedObjects = [];
                        sceneObjects.forEach(obj => {
                            let box = getBoundingBox(obj);
                            if (box && box.cx !== undefined && box.cy !== undefined) { if (isPointInPolygon({x: box.cx, y: box.cy}, lassoPoints)) { multiSelectedObjects.push(obj); } }
                        });
                        if (multiSelectedObjects.length > 0) { document.getElementById('btn-delete-selected').style.display = 'flex'; }
                    }
                    lassoPoints = []; renderScene(); return;
                }
                if (isDraggingObject) {
                    isDraggingObject = false;
                    let draggingList = multiSelectedObjects.length > 0 ? multiSelectedObjects : (selectedObject ? [selectedObject] : []);
                    draggingList.forEach(obj => cleanupOriginalPosition(obj));
                    sceneObjects.forEach(o => { if(o.type === 'text' && (o.varLinked === selectedObject || multiSelectedObjects.includes(o.varLinked))) { cleanupOriginalPosition(o); } });
                    return;
                }
            }

            if (isDrawing && (currentTool === 'pen' || currentTool === 'eraser')) {
                if (currentTool === 'pen' && currentPath) { sceneObjects.push(currentPath); resetUndoCounter(); }
                pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); renderScene();
            } else if (isDraggingArrow) {
                const worldPos = getWorldPos(e.clientX, e.clientY);
                if (currentTool.includes('angled') && currentPath) {
                    currentPath.points = orthogonalize(currentPath.points, 25);
                    if (currentPath.points.length > 1) { sceneObjects.push(currentPath); resetUndoCounter(); }
                } else {
                    let snapped = { p1: arrowStartPoint, p2: worldPos };
                    if (!currentTool.includes('curved') && !currentTool.includes('circle-')) { snapped = calculateSnapPoints(arrowStartPoint, worldPos); }
                    sceneObjects.push({ type: 'arrow', pathType: currentTool, color: currentColor, lineWidth: currentBaseSize, p1: snapped.p1, p2: snapped.p2, curvatureFactor: currentCurvatureFactor });
                    resetUndoCounter();
                }
                pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); renderScene();
            }
            isDrawing = false; isDraggingArrow = false; currentPath = null; arrowStartPoint = null;
        }

        window.addEventListener('pointerup', handlePointerEnd);
        window.addEventListener('pointercancel', handlePointerEnd);

        [canvas, previewCanvas].forEach(c => {
            c.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
            c.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
        });

        // ==========================================
        // ระบบลากหน้าต่าง Property Panel (Draggable)
        // ==========================================
        const propPanelTitle = document.getElementById('prop-panel-title');
        let isDraggingPanel = false;
        let panelDragOffset = { x: 0, y: 0 };

        propPanelTitle.addEventListener('pointerdown', (e) => {
            isDraggingPanel = true;
            propPanelTitle.style.cursor = 'grabbing';
            const rect = propPanel.getBoundingClientRect();
            panelDragOffset.x = e.clientX - rect.left;
            panelDragOffset.y = e.clientY - rect.top;
            e.preventDefault(); 
        });

        document.addEventListener('pointermove', (e) => {
            if (!isDraggingPanel) return;
            e.preventDefault();
            let newLeft = e.clientX - panelDragOffset.x;
            let newTop = e.clientY - panelDragOffset.y;
            newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - propPanel.offsetWidth));
            newTop = Math.max(0, Math.min(newTop, window.innerHeight - propPanel.offsetHeight));
            propPanel.style.left = newLeft + 'px';
            propPanel.style.top = newTop + 'px';
        });

        document.addEventListener('pointerup', () => {
            if (isDraggingPanel) {
                isDraggingPanel = false;
                propPanelTitle.style.cursor = 'move';
            }
        });

function importProject(event) {
    const input = event.target;
    const file = input.files[0];
    if (!file) return;

    if (activeTextInput) finalizeTextInput();

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (data.objects && data.camera) {
                sceneObjects = data.objects;
                let imagesPending = 0; 

                sceneObjects.forEach(obj => {
                    if (obj.type === 'text' && obj.varLinked) {
                        let linkedShape = sceneObjects.find(o => {
                            if (o.type === 'text') return false;
                            
                            let matchName = (o.varShortName && o.varShortName === obj.varLinked.varShortName);
                            let dx = Math.abs(o.x - obj.varLinked.x);
                            let dy = Math.abs(o.y - obj.varLinked.y);
                            let matchPos = (dx < 5 && dy < 5);
                            
                            return matchName || matchPos;
                        });
                        if (linkedShape) {
                            obj.varLinked = linkedShape;
                        }
                    }
                    
                    if (obj.type === 'image' && obj.src) {
                        imagesPending++;
                        const img = new Image();
                        img.onload = () => {
                            imagesPending--;
                            if (imagesPending === 0) renderScene(); 
                        };
                        img.src = obj.src;
                        obj.img = img; 
                    }
                });

                camera = data.camera;
                selectedObject = null;
                multiSelectedObjects = [];
                document.getElementById('btn-delete-selected').style.display = 'none';
                closePropertyPanel();
                resetUndoCounter();
                
                if (imagesPending === 0) renderScene(); 
            } else { alert('รูปแบบไฟล์ไม่ถูกต้อง หรือไม่ใช่ไฟล์โปรเจกต์ที่สร้างจากระบบนี้'); }
        } catch (err) { alert('เกิดข้อผิดพลาดในการอ่านไฟล์ JSON: ไฟล์อาจเสียหาย'); } 
        finally { input.value = ''; }
    };
    reader.onerror = () => { alert('เบราว์เซอร์ไม่สามารถอ่านไฟล์นี้ได้'); input.value = ''; };
    reader.readAsText(file);
}

// ==========================================
// ส่วนจัดการ Import / Export ข้อมูล CSV
// ==========================================

// ฟังก์ชันส่งออกผลลัพธ์ Simulation
function exportSimulationCSV() {
    if (!globalSimHistory || !globalSimHistory.history || globalSimHistory.history.time.length === 0) {
        alert("ยังไม่มีผลการจำลอง กรุณากดปุ่ม '▶️ คำนวณใหม่' ก่อนส่งออกข้อมูลครับ");
        return;
    }

    const { history, variables } = globalSimHistory;
    // ใช้ \uFEFF บังคับให้ Excel อ่านภาษาไทย (UTF-8) ได้ถูกต้อง
    let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
    
    // สร้าง Header (แถวแรก)
    let headers = ["Time"];
    variables.forEach(v => headers.push(v.varShortName));
    csvContent += headers.join(",") + "\r\n";

    // สร้างข้อมูลแต่ละช่วงเวลา (dt)
    for (let i = 0; i < history.time.length; i++) {
        let row = [history.time[i]];
        variables.forEach(v => {
            // ป้องกันค่า Undefined หรือ NaN
            let val = history[v.varShortName][i];
            row.push(val !== undefined ? val : 0);
        });
        csvContent += row.join(",") + "\r\n";
    }

    // สั่งดาวน์โหลด
    let encodedUri = encodeURI(csvContent);
    let link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    
    // ตั้งชื่อไฟล์ตามวันที่และเวลา
    const dateStr = new Date().toISOString().slice(0, 19).replace(/T|:/g, '-');
    link.setAttribute("download", `sd_result_${dateStr}.csv`);
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// ฟังก์ชันนำเข้าข้อมูลอนุกรมเวลาเข้าตาราง Lookup
function importCSVData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        // รองรับทั้ง \n (Mac/Linux) และ \r\n (Windows)
        const rows = text.split(/\r?\n/); 
        let newData = [];

        for (let i = 0; i < rows.length; i++) {
            let cols = rows[i].trim().split(',');
            
            // ตรวจสอบว่ามีอย่างน้อย 2 คอลัมน์ (Time, Value)
            if (cols.length >= 2) {
                let xVal = parseFloat(cols[0]); // คอลัมน์ X (Time)
                let yVal = parseFloat(cols[1]); // คอลัมน์ Y (Value)
                
                // ข้ามบรรทัดที่เป็นตัวหนังสือ (เช่น Header)
                if (!isNaN(xVal) && !isNaN(yVal)) {
                    newData.push({ x: xVal, y: yVal });
                }
            }
        }

        if (newData.length > 1) {
            // เรียงลำดับแกน X จากน้อยไปมากเสมอ
            newData.sort((a, b) => a.x - b.x);
            currentLookupData = newData;
            
            if (editingObject) {
                editingObject.lookupData = newData;
            }
            
            renderLookupTable();
            updateLookupChart();
            alert(`✅ นำเข้าข้อมูลสำเร็จจำนวน ${newData.length} จุด\nระบบได้แปลงข้อมูลลงตารางเรียบร้อยแล้วครับ`);
        } else {
            alert("❌ รูปแบบไฟล์ไม่ถูกต้อง\nกรุณาใช้ไฟล์ CSV ที่มี 2 คอลัมน์ (เวลา, ค่าข้อมูล) และต้องเป็นตัวเลขอย่างน้อย 2 บรรทัดขึ้นไปครับ");
        }
        
        event.target.value = ''; // รีเซ็ต input เผื่อต้องการโหลดไฟล์เดิมซ้ำ
    };
    reader.readAsText(file);
}

// ==========================================
// ส่วนจัดการ Sensitivity Analysis (Monte Carlo)
// ==========================================

function openSensitivityPanel() {
    const select = document.getElementById('sa-var-select');
    select.innerHTML = '';
    
    // ดึงมาเฉพาะตัวแปรที่ไม่ใช่ Stock (ไม่ใช่กล่อง) และไม่ใช่ Lookup
    let params = sceneObjects.filter(obj => obj.varShortName && obj.type !== 'rect' && !obj.isLookup);
    
    if (params.length === 0) {
        alert("ยังไม่มีตัวแปรให้สุ่มครับ กรุณาสร้างตัวแปร Auxiliary (วงรี) ก่อน");
        return;
    }

    params.forEach(v => {
        let opt = document.createElement('option');
        opt.value = v.varShortName;
        opt.text = v.varShortName + (v.varFullName ? ` (${v.varFullName})` : '');
        select.appendChild(opt);
    });

    // เซ็ตค่า Min/Max เริ่มต้นให้อิงจากค่าเดิม
    let firstParam = params[0];
    let defaultVal = parseFloat(firstParam.varEquation) || 1;
    document.getElementById('sa-min').value = (defaultVal * 0.5).toFixed(2);
    document.getElementById('sa-max').value = (defaultVal * 1.5).toFixed(2);

    // ดักจับการเปลี่ยนตัวแปรเพื่ออัปเดตค่า Min/Max อัตโนมัติ
    select.onchange = (e) => {
        let p = params.find(obj => obj.varShortName === e.target.value);
        let val = parseFloat(p.varEquation) || 1;
        document.getElementById('sa-min').value = (val * 0.5).toFixed(2);
        document.getElementById('sa-max').value = (val * 1.5).toFixed(2);
    };

    document.getElementById('sa-panel').style.display = 'block';
}

function closeSensitivityPanel() {
    document.getElementById('sa-panel').style.display = 'none';
}

function runMonteCarlo() {
    const targetVarName = document.getElementById('sa-var-select').value;
    const minVal = parseFloat(document.getElementById('sa-min').value);
    const maxVal = parseFloat(document.getElementById('sa-max').value);
    const runs = parseInt(document.getElementById('sa-runs').value) || 50;
    
    if (!targetVarName || isNaN(minVal) || isNaN(maxVal)) return;

    // ตั้งปุ่มให้เป็นสถานะกำลังโหลด
    const btn = document.querySelector('#sa-panel button[onclick="runMonteCarlo()"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = "⏳ กำลังคำนวณ...";
    btn.disabled = true;

    // หน่วงเวลาเล็กน้อยให้ UI อัปเดตคำว่า กำลังคำนวณ ก่อนเบราว์เซอร์ค้างชั่วคราว
    setTimeout(() => {
        executeMonteCarloLoop(targetVarName, minVal, maxVal, runs);
        btn.innerHTML = originalText;
        btn.disabled = false;
        closeSensitivityPanel();
    }, 50);
}

function executeMonteCarloLoop(targetVarName, minVal, maxVal, runs) {
    const tStart = parseFloat(document.getElementById('sim-start').value) || 0;
    const tEnd = parseFloat(document.getElementById('sim-end').value) || 10;
    const dt = parseFloat(document.getElementById('sim-dt').value) || 0.25;

    let targetObj = sceneObjects.find(o => o.varShortName === targetVarName);
    if (!targetObj) return;

    // เก็บสมการดั้งเดิมไว้คืนค่าทีหลัง
    const originalEquation = targetObj.varEquation;
    let allRunsHistory = [];
    let variables = sceneObjects.filter(obj => obj.varShortName && obj.varShortName.trim() !== '');
    let stocks = variables.filter(v => v.type === 'rect');
    let auxiliaries = variables.filter(v => v.type !== 'rect');

    // วนลูป Monte Carlo
    for (let r = 0; r < runs; r++) {
        // 1. สุ่มค่าแบบ Uniform Distribution
        let randomVal = minVal + Math.random() * (maxVal - minVal);
        targetObj.varEquation = randomVal.toString(); // ยัดค่าสุ่มทับสมการเดิมชั่วคราว

        let history = { time: [] };
        variables.forEach(v => history[v.varShortName] = []);

        // คอมไพล์สมการใหม่ทุกรอบ
        let compiled = {};
        variables.forEach(v => {
            try { 
                let parsedEq = (v.varEquation || '0').replace(/IF\s+THEN\s+ELSE/gi, 'IF_THEN_ELSE');
                compiled[v.varShortName] = math.compile(parsedEq); 
            } catch(e) { compiled[v.varShortName] = math.compile('0'); }
        });

        let currentScope = { Time: tStart };
        
        // ฟังก์ชันหน่วงเวลาสำหรับ Scope เฉพาะรอบนี้
        const createDelayFunc = (scope, hist) => {
            return function(varName, delayTime) {
                let targetTime = scope.Time - delayTime; 
                if (hist.time.length === 0 || targetTime < hist.time[0]) return 0;
                for (let i = hist.time.length - 1; i >= 0; i--) {
                    if (hist.time[i] <= targetTime + 0.0001) return hist[varName] ? hist[varName][i] : 0;
                }
                return 0;
            };
        };
        
        currentScope.DELAY = createDelayFunc(currentScope, history);
        currentScope.IF = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };
        currentScope.IF_THEN_ELSE = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };

        // เซ็ตค่าเริ่มต้น
        auxiliaries.forEach(aux => currentScope[aux.varShortName] = 0);
        stocks.forEach(s => {
            try { currentScope[s.varShortName] = math.evaluate(s.varInitial || '0', currentScope); } 
            catch(e) { currentScope[s.varShortName] = 0; }
        });

        function evaluateAuxiliaries(scope) {
            for(let pass = 0; pass < auxiliaries.length + 1; pass++) {
                auxiliaries.forEach(aux => {
                    try {
                        let evalResult = compiled[aux.varShortName].evaluate(scope);
                        let val = evalResult && evalResult.type === 'Unit' ? evalResult.toNumber() : evalResult;
                        scope[aux.varShortName] = (aux.isLookup && aux.lookupData) ? interpolateLookup(val, aux.lookupData) : val;
                    } catch(e) {} 
                });
            }
        }

        function getRates(scope) {
            evaluateAuxiliaries(scope);
            let rates = {};
            stocks.forEach(s => {
                try {
                    let netFlow = compiled[s.varShortName].evaluate(scope);
                    rates[s.varShortName] = netFlow && netFlow.type === 'Unit' ? netFlow.toNumber() : netFlow;
                } catch(e) { rates[s.varShortName] = 0; }
            });
            return rates;
        }

        // ลูปเวลา RK4
        for(let t = tStart; t <= tEnd + (dt/10); t += dt) {
            currentScope.Time = t;
            evaluateAuxiliaries(currentScope);

            history.time.push(parseFloat(t.toFixed(4)));
            variables.forEach(v => history[v.varShortName].push(currentScope[v.varShortName] || 0));

            let k1 = getRates(currentScope);

            let scopeK2 = { ...currentScope, Time: t + dt / 2 };
            scopeK2.DELAY = createDelayFunc(scopeK2, history);
            scopeK2.IF = currentScope.IF; scopeK2.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK2[s.varShortName] = currentScope[s.varShortName] + (k1[s.varShortName] * dt / 2));
            let k2 = getRates(scopeK2);

            let scopeK3 = { ...currentScope, Time: t + dt / 2 };
            scopeK3.DELAY = createDelayFunc(scopeK3, history);
            scopeK3.IF = currentScope.IF; scopeK3.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK3[s.varShortName] = currentScope[s.varShortName] + (k2[s.varShortName] * dt / 2));
            let k3 = getRates(scopeK3);

            let scopeK4 = { ...currentScope, Time: t + dt };
            scopeK4.DELAY = createDelayFunc(scopeK4, history);
            scopeK4.IF = currentScope.IF; scopeK4.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK4[s.varShortName] = currentScope[s.varShortName] + (k3[s.varShortName] * dt));
            let k4 = getRates(scopeK4);

            stocks.forEach(s => {
                let avgRate = (k1[s.varShortName] + 2 * k2[s.varShortName] + 2 * k3[s.varShortName] + k4[s.varShortName]) / 6;
                currentScope[s.varShortName] = currentScope[s.varShortName] + (avgRate * dt);
            });
        }
        allRunsHistory.push(history);
    }

    // คืนค่าสมการเดิม
    targetObj.varEquation = originalEquation;

    // นำผลลัพธ์ไปพล็อต
    renderMonteCarloChart(allRunsHistory, variables, targetVarName);
}

function renderMonteCarloChart(allRunsHistory, variables, targetVarName) {
    const ctxChart = document.getElementById('sim-chart').getContext('2d');
    const colors = ['#FF3B30', '#007AFF', '#34C759', '#FF9500', '#AF52DE', '#FF2D55', '#5856D6', '#FFCC00'];
    let datasets = [];

    // ดึงเฉพาะตัวแปรระดับ (Stocks) มาแสดงผลเป็นหลัก เพื่อไม่ให้กราฟดูรกเกินไป
    let displayVars = variables.filter(v => v.type === 'rect');
    if (displayVars.length === 0) displayVars = variables; // ถ้าไม่มี Stock ให้ดึงมาทั้งหมด

    displayVars.forEach((v, vIdx) => {
        let baseColor = colors[vIdx % colors.length];
        
        allRunsHistory.forEach((runHistory, rIdx) => {
            datasets.push({
                label: rIdx === 0 ? v.varShortName : '', // โชว์ชื่อตัวแปรใน Legend เฉพาะเส้นแรก
                data: runHistory[v.varShortName],
                borderColor: baseColor + '33', // เติมรหัส Hex 33 (ความโปร่งแสง ~20%) ให้เห็นเป็นเงาซ้อนกัน
                backgroundColor: 'transparent',
                fill: false,
                tension: 0.2,
                pointRadius: 0, // ซ่อนจุดไข่ปลาเพื่อประสิทธิภาพการเรนเดอร์
                borderWidth: 1.5
            });
        });
    });

    if (simChartInstance) simChartInstance.destroy();

    simChartInstance = new Chart(ctxChart, {
        type: 'line',
        data: {
            labels: allRunsHistory[0].time,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // ปิด Animation เพื่อให้กราฟ 50+ เส้นแสดงผลทันที
            plugins: {
                legend: { 
                    position: 'right',
                    labels: { filter: function(item) { return item.text !== ''; } } // ซ่อนกล่องสีที่ชื่อว่างเปล่า
                },
                title: { 
                    display: true, 
                    text: `Monte Carlo Sensitivity Analysis: ตัวแปรสุ่ม "${targetVarName}"`,
                    font: { size: 16 }
                }
            },
            scales: {
                x: { title: { display: true, text: 'Time', font: { weight: 'bold' } } },
                y: { title: { display: true, text: 'Value', font: { weight: 'bold' } } }
            }
        }
    });
}

function processValidation() {
    const targetVarName = document.getElementById('val-var-select').value;
    const rawText = document.getElementById('val-data-input').value;
    
    if (!targetVarName || rawText.trim() === '') {
        alert("กรุณาวางข้อมูลเพื่อเปรียบเทียบครับ");
        return;
    }

    // แปลงข้อความที่ Copy มา (รองรับทั้ง Tab และ Comma) ให้เป็น Array
    const rows = rawText.trim().split(/\r?\n/);
    let historicalPoints = [];

    for (let i = 0; i < rows.length; i++) {
        let cols = rows[i].trim().split(/[\t, ]+/); // แยกคอลัมน์ด้วย Tab, Comma หรือ Space
        if (cols.length >= 2) {
            let tVal = parseFloat(cols[0]);
            let yVal = parseFloat(cols[1]);
            if (!isNaN(tVal) && !isNaN(yVal)) {
                historicalPoints.push({ x: tVal, y: yVal });
            }
        }
    }

    if (historicalPoints.length < 2) {
        alert("รูปแบบข้อมูลไม่ถูกต้อง กรุณาวางข้อมูลอย่างน้อย 2 แถว (คอลัมน์แรกคือเวลา, คอลัมน์สองคือค่า)");
        return;
    }

    // เรียงลำดับตามเวลาเพื่อความชัวร์
    historicalPoints.sort((a, b) => a.x - b.x);

    // คำนวณความคลาดเคลื่อน (MAPE - Mean Absolute Percentage Error)
    let simTime = globalSimHistory.history.time;
    let simData = globalSimHistory.history[targetVarName];
    let totalPercentageError = 0;
    let countValidPoints = 0;

    historicalPoints.forEach(histPt => {
        // หาค่าจำลองที่เวลาใกล้เคียงที่สุด (Interpolation แบบง่าย)
        let closestIdx = 0;
        let minDiff = Infinity;
        for (let i = 0; i < simTime.length; i++) {
            let diff = Math.abs(simTime[i] - histPt.x);
            if (diff < minDiff) {
                minDiff = diff;
                closestIdx = i;
            }
        }
        
        let predictedY = simData[closestIdx];
        let actualY = histPt.y;

        if (actualY !== 0) { // ป้องกันการหารด้วยศูนย์
            totalPercentageError += Math.abs((actualY - predictedY) / actualY);
            countValidPoints++;
        }
    });

    let mape = 0;
    const resultBox = document.getElementById('val-result-box');
    const mapeText = document.getElementById('val-mape-value');
    const statusText = document.getElementById('val-status');

    if (countValidPoints > 0) {
        mape = (totalPercentageError / countValidPoints) * 100;
        resultBox.style.display = 'block';
        mapeText.innerText = mape.toFixed(2) + "%";

        // ประเมินผลความแม่นยำ
        if (mape <= 10) {
            statusText.innerText = "✅ มีความแม่นยำสูงมาก (Highly Valid)";
            statusText.style.color = "#155724";
            resultBox.style.backgroundColor = "#d4edda";
            resultBox.style.borderColor = "#c3e6cb";
        } else if (mape <= 20) {
            statusText.innerText = "⚠️ มีความแม่นยำพอใช้ (Acceptable)";
            statusText.style.color = "#856404";
            resultBox.style.backgroundColor = "#fff3cd";
            resultBox.style.borderColor = "#ffeeba";
        } else {
            statusText.innerText = "❌ มีความคลาดเคลื่อนสูง (Needs Calibration)";
            statusText.style.color = "#721c24";
            resultBox.style.backgroundColor = "#f8d7da";
            resultBox.style.borderColor = "#f5c6cb";
        }
    } else {
        resultBox.style.display = 'none';
        alert("ไม่สามารถคำนวณ Error ได้ เนื่องจากข้อมูลไม่ตรงกับช่วงเวลาในกราฟ");
    }

    // อัปเดตกราฟ Chart.js โดยเพิ่มเส้น Historical Data ลงไป
    if (simChartInstance) {
        // ลบเส้น Validation เดิมออกก่อน (ถ้ามี)
        simChartInstance.data.datasets = simChartInstance.data.datasets.filter(ds => ds.id !== 'validation-dataset');
        
        // ค้นหาสีของตัวแปรเป้าหมายเพื่อใช้สีเดียวกันแต่ทำให้เป็นจุดประ
        let targetDataset = simChartInstance.data.datasets.find(ds => ds.label.includes(targetVarName));
        let baseColor = targetDataset ? targetDataset.borderColor : '#000000';

        // สร้างชุดข้อมูลใหม่
        let newDataset = {
            id: 'validation-dataset',
            label: `ข้อมูลจริง: ${targetVarName}`,
            data: historicalPoints,
            borderColor: '#333333',
            backgroundColor: baseColor,
            type: 'scatter',
            pointStyle: 'rectRot',
            pointRadius: 6,
            pointBorderColor: '#000',
            pointBorderWidth: 2,
            showLine: true,
            borderDash: [5, 5],
            borderWidth: 2,
            fill: false
        };

        simChartInstance.data.datasets.push(newDataset);
        simChartInstance.update();
    }
}

function runAutoCalibration() {
    const targetVarName = document.getElementById('val-var-select').value;
    const rawText = document.getElementById('val-data-input').value;
    const paramToTuneName = document.getElementById('opt-param-select').value;
    const minVal = parseFloat(document.getElementById('opt-min').value);
    const maxVal = parseFloat(document.getElementById('opt-max').value);
    const steps = 100; // จำนวนรอบที่ใช้ค้นหา (Grid Search 100 สเตป)

    if (!targetVarName || rawText.trim() === '' || !paramToTuneName || isNaN(minVal) || isNaN(maxVal)) {
        alert("ข้อมูลไม่ครบถ้วน กรุณาเลือกตัวแปร, วางข้อมูลเปรียบเทียบ และระบุช่วง Min/Max ให้ครบถ้วนครับ");
        return;
    }

    // แปลงข้อมูลอ้างอิง
    const rows = rawText.trim().split(/\r?\n/);
    let historicalPoints = [];
    for (let i = 0; i < rows.length; i++) {
        let cols = rows[i].trim().split(/[\t, ]+/);
        if (cols.length >= 2) {
            let tVal = parseFloat(cols[0]), yVal = parseFloat(cols[1]);
            if (!isNaN(tVal) && !isNaN(yVal)) historicalPoints.push({ x: tVal, y: yVal });
        }
    }

    if (historicalPoints.length < 2) return alert("รูปแบบข้อมูลอ้างอิงไม่ถูกต้อง");
    historicalPoints.sort((a, b) => a.x - b.x);

    let paramObj = sceneObjects.find(o => o.varShortName === paramToTuneName);
    if (!paramObj) return;

    const originalEquation = paramObj.varEquation;
    const tStart = parseFloat(document.getElementById('sim-start').value) || 0;
    const tEnd = parseFloat(document.getElementById('sim-end').value) || 10;
    const dt = parseFloat(document.getElementById('sim-dt').value) || 0.25;

    let variables = sceneObjects.filter(obj => obj.varShortName && obj.varShortName.trim() !== '');
    let stocks = variables.filter(v => v.type === 'rect');
    let auxiliaries = variables.filter(v => v.type !== 'rect');

    let bestValue = minVal;
    let minError = Infinity;

    // ระบบค้นหา (Optimization Loop)
    for (let i = 0; i <= steps; i++) {
        // ทดลองค่าทีละสเตปจาก Min ไป Max
        let testVal = minVal + (i * (maxVal - minVal) / steps);
        paramObj.varEquation = testVal.toString();

        let compiled = {};
        variables.forEach(v => {
            try { compiled[v.varShortName] = math.compile((v.varEquation || '0').replace(/IF\s+THEN\s+ELSE/gi, 'IF_THEN_ELSE')); } 
            catch(e) { compiled[v.varShortName] = math.compile('0'); }
        });

        let currentScope = { Time: tStart };
        let history = { time: [] };
        variables.forEach(v => history[v.varShortName] = []);

        const createDelayFunc = (scope, hist) => {
            return function(varName, delayTime) {
                let targetTime = scope.Time - delayTime; 
                if (hist.time.length === 0 || targetTime < hist.time[0]) return 0;
                for (let j = hist.time.length - 1; j >= 0; j--) {
                    if (hist.time[j] <= targetTime + 0.0001) return hist[varName] ? hist[varName][j] : 0;
                }
                return 0;
            };
        };

        currentScope.DELAY = createDelayFunc(currentScope, history);
        currentScope.IF = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };
        currentScope.IF_THEN_ELSE = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };

        auxiliaries.forEach(aux => currentScope[aux.varShortName] = 0);
        stocks.forEach(s => {
            try { currentScope[s.varShortName] = math.evaluate(s.varInitial || '0', currentScope); } 
            catch(e) { currentScope[s.varShortName] = 0; }
        });

        function evaluateAuxiliaries(scope) {
            for(let pass = 0; pass < auxiliaries.length + 1; pass++) {
                auxiliaries.forEach(aux => {
                    try {
                        let evalResult = compiled[aux.varShortName].evaluate(scope);
                        let val = evalResult && evalResult.type === 'Unit' ? evalResult.toNumber() : evalResult;
                        scope[aux.varShortName] = (aux.isLookup && aux.lookupData) ? interpolateLookup(val, aux.lookupData) : val;
                    } catch(e) {} 
                });
            }
        }

        function getRates(scope) {
            evaluateAuxiliaries(scope);
            let rates = {};
            stocks.forEach(s => {
                try {
                    let netFlow = compiled[s.varShortName].evaluate(scope);
                    rates[s.varShortName] = netFlow && netFlow.type === 'Unit' ? netFlow.toNumber() : netFlow;
                } catch(e) { rates[s.varShortName] = 0; }
            });
            return rates;
        }

        // Run Simulation
        for(let t = tStart; t <= tEnd + (dt/10); t += dt) {
            currentScope.Time = t;
            evaluateAuxiliaries(currentScope);
            history.time.push(parseFloat(t.toFixed(4)));
            variables.forEach(v => history[v.varShortName].push(currentScope[v.varShortName] || 0));

            let k1 = getRates(currentScope);
            let scopeK2 = { ...currentScope, Time: t + dt / 2 }; scopeK2.DELAY = createDelayFunc(scopeK2, history); scopeK2.IF = currentScope.IF; scopeK2.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK2[s.varShortName] = currentScope[s.varShortName] + (k1[s.varShortName] * dt / 2));
            let k2 = getRates(scopeK2);
            let scopeK3 = { ...currentScope, Time: t + dt / 2 }; scopeK3.DELAY = createDelayFunc(scopeK3, history); scopeK3.IF = currentScope.IF; scopeK3.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK3[s.varShortName] = currentScope[s.varShortName] + (k2[s.varShortName] * dt / 2));
            let k3 = getRates(scopeK3);
            let scopeK4 = { ...currentScope, Time: t + dt }; scopeK4.DELAY = createDelayFunc(scopeK4, history); scopeK4.IF = currentScope.IF; scopeK4.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
            stocks.forEach(s => scopeK4[s.varShortName] = currentScope[s.varShortName] + (k3[s.varShortName] * dt));
            let k4 = getRates(scopeK4);

            stocks.forEach(s => {
                let avgRate = (k1[s.varShortName] + 2 * k2[s.varShortName] + 2 * k3[s.varShortName] + k4[s.varShortName]) / 6;
                currentScope[s.varShortName] = currentScope[s.varShortName] + (avgRate * dt);
            });
        }

        // คำนวณ Error (MAPE) ของรอบนี้
        let simTime = history.time;
        let simData = history[targetVarName];
        let totalPercentageError = 0;
        let countValidPoints = 0;

        historicalPoints.forEach(histPt => {
            let closestIdx = 0, minDiff = Infinity;
            for (let j = 0; j < simTime.length; j++) {
                let diff = Math.abs(simTime[j] - histPt.x);
                if (diff < minDiff) { minDiff = diff; closestIdx = j; }
            }
            let predictedY = simData[closestIdx];
            if (histPt.y !== 0) {
                totalPercentageError += Math.abs((histPt.y - predictedY) / histPt.y);
                countValidPoints++;
            }
        });

        let mape = (totalPercentageError / countValidPoints) * 100;
        
        // บันทึกค่าที่ดีที่สุด
        if (mape < minError) {
            minError = mape;
            bestValue = testVal;
        }
    }

    // นำค่าที่ดีที่สุดไปบันทึกกลับลงในโมเดลหลัก
    paramObj.varEquation = bestValue.toFixed(4); // อัปเดตพารามิเตอร์
    alert(`🎯 ปรับจูนสำเร็จ!\nระบบพบว่าค่า ${paramToTuneName} ที่เหมาะสมที่สุดคือ: ${bestValue.toFixed(4)}\nโดยมีความคลาดเคลื่อน (MAPE) ต่ำสุดที่: ${minError.toFixed(2)}%`);
    
    // สั่งรันกราฟใหม่และซ้อนทับข้อมูลจริงให้อัตโนมัติ
    runSimulation();
    processValidation();
}

function importImageToCanvas(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // คำนวณขนาดย่อส่วนไม่ให้ภาพล้นหน้าจอเกินไป
            let maxWidth = canvas.width * 0.7 / camera.scale;
            let maxHeight = canvas.height * 0.7 / camera.scale;
            let scale = Math.min(1, maxWidth / img.width, maxHeight / img.height);
            
            let w = img.width * scale;
            let h = img.height * scale;
            
            // หาจุดกึ่งกลางหน้าจอเพื่อวางรูปภาพ
            let rect = canvas.getBoundingClientRect();
            let centerW = getWorldPos(rect.width / 2, rect.height / 2);

            // ใช้ unshift เพื่อแทรกรูปไว้ล่างสุด (layer ล่างสุด) จะได้วาดทับได้
            sceneObjects.unshift({
                type: 'image',
                img: img,
                src: e.target.result, // เพิ่มการเก็บ src สำหรับเซฟ
                x: centerW.x - w / 2,
                y: centerW.y - h / 2,
                w: w,
                h: h
            });
            
            resetUndoCounter();
            renderScene();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = ''; // รีเซ็ตค่าเพื่อให้โหลดไฟล์เดิมซ้ำได้
}
