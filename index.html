<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Dynamics & Unit Checker</title>

<script src="math.js"></script>
<script src="chart.js"></script>

<link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; height: 100dvh; width: 100vw; }
        #board-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .canvas-layer { position: absolute; top: 0; left: 0; display: block; touch-action: none; }
        #board { background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 1; }
        #preview-canvas { z-index: 2; pointer-events: none; } 
        
        #toolbar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; z-index: 10; width: 95%; max-width: 1350px; }
        .tool-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ccc; padding-right: 8px; margin-right: 2px; }
        .tool-group:last-child { border-right: none; margin-right: 0; padding-right: 0; }
        
        button { width: 38px; height: 38px; padding: 0; border: none; border-radius: 50%; background: #e0e0e0; font-size: 18px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        button.active { background: #007aff; color: white; }
        button.danger { background: #ff3b30; color: white; }
        button.action-btn { background: #ff9500; color: white; }
        
        button.format-btn { width: 30px; height: 30px; border-radius: 6px; font-size: 14px; background: #e0e0e0; margin: 0 2px; }
        button.format-btn.active { background: #007aff; color: white; }

        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
        .color-btn.active { border-color: #333; transform: scale(1.1); }
        
        .size-check { display: flex; align-items: center; gap: 3px; cursor: pointer; background: #f5f5f5; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .size-check:hover { background: #e0e0e0; }
        .size-check input[type="checkbox"], .size-check input[type="radio"] { cursor: pointer; margin: 0; }

        .shape-control-group { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        #curvature-control { display: none; } 
        #curvature-slider { width: 80px; }
        #double-edge-control { display: none; } 
        #double-edge-check { cursor: pointer; }
        #text-format-control { display: none; background: #f9f9f9; padding: 4px 8px; border-radius: 10px; border: 1px solid #ddd; }
        #text-size-input { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 5px; padding: 2px 4px; font-size: 14px; outline: none; margin-right: 5px; }
        #text-size-input:focus { border-color: #007aff; }
        
        .movable-text-input {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed #007aff;
            border-radius: 8px;
            outline: none;
            padding: 4px 10px;
            z-index: 100;
            font-family: sans-serif;
            text-align: center;
            min-width: 150px;
            cursor: move;
            touch-action: none;
        }

        /* UI สำหรับ Property Panel ปรับขนาดใหญ่ขึ้น */
        #property-panel {
            display: none;
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            z-index: 200;
            font-family: sans-serif;
            width: 320px; 
        }
        #property-panel h3 { margin: 0 0 12px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 8px; color: #333; cursor: move; user-select: none; }
        .prop-row { margin-bottom: 12px; }
        .prop-row label { display: block; font-size: 14px; color: #444; margin-bottom: 5px; font-weight: bold; }
        .prop-row input, .prop-row select { 
            width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; 
            border-radius: 6px; font-family: monospace; font-size: 16px; 
        }
        
        .flex-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .flex-col { flex: 1; }
        .flex-col label { display: block; font-size: 14px; color: #444; margin-bottom: 5px; font-weight: bold; }
        .flex-col input { 
            width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; 
            border-radius: 6px; font-family: monospace; font-size: 16px; 
        }

        .prop-actions { display: flex; justify-content: space-between; margin-top: 18px; }
        .prop-actions button { width: auto; height: auto; padding: 8px 14px; border-radius: 6px; font-size: 14px; font-weight: bold; }
        #unit-result { margin-top: 12px; font-size: 14px; font-weight: bold; padding: 8px; border-radius: 6px; display: none; line-height: 1.4; }
        .result-pass { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result-fail { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .var-badge {
            background: #e3f2fd; border: 1px solid #00acc1; color: #006064; 
            border-radius: 12px; padding: 5px 10px; font-size: 13px; cursor: pointer; 
            transition: 0.1s; display: inline-block; font-weight: bold; margin-right: 5px; margin-bottom: 5px;
        }
        .var-badge:hover { background: #b2ebf2; transform: scale(1.05); }

        /* UI หน้าต่างกราฟ Simulation */
        #sim-panel {
            display: none; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; 
            background: white; z-index: 1000; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
            flex-direction: column; padding: 20px; box-sizing: border-box; font-family: sans-serif;
        }
        .sim-input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: 60px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="board-container">
        <canvas id="board" class="canvas-layer"></canvas>
        <canvas id="preview-canvas" class="canvas-layer"></canvas> 
    </div>

    <div id="property-panel">
        <h3 id="prop-panel-title">ตั้งค่าตัวแปร</h3>
        
        <div class="flex-row">
            <div class="flex-col" style="flex: 1;">
                <label>ชื่อย่อ (คำนวณ)</label>
                <input type="text" id="prop-short-name" placeholder="เช่น P">
            </div>
            <div class="flex-col" style="flex: 0.5;">
                <label>ลำดับที่</label>
                <input type="text" id="prop-index" placeholder="เช่น 1">
            </div>
        </div>

        <div class="prop-row">
            <label>ชื่อเต็ม (แสดงผล)</label>
            <input type="text" id="prop-full-name" placeholder="เช่น Population">
        </div>

        <div class="prop-row" id="prop-text-pos-row" style="display: none;">
            <label>ตำแหน่งข้อความ</label>
            <select id="prop-text-pos">
                <option value="above">อยู่บนขีด (Above)</option>
                <option value="below">อยู่ใต้ขีด (Below)</option>
            </select>
        </div>

        <div class="prop-row" style="display: none;">
            <label>จัดตัวอักษร</label>
            <select id="prop-align">
                <option value="center">กึ่งกลาง</option>
                <option value="left">ชิดซ้าย</option>
            </select>
        </div>

        <div class="prop-row">
            <label>หน่วย (Unit)</label>
            <input type="text" id="prop-unit" placeholder="เช่น person">
        </div>

        <div class="prop-row" id="prop-lookup-row" style="display: none; background: #e3f2fd; padding: 8px; border-radius: 6px; border: 1px solid #bbdefb;">
            <label style="cursor: pointer; color: #0056b3; font-weight: bold; margin-bottom: 0; display: flex; align-items: center; gap: 5px;">
                <input type="checkbox" id="prop-is-lookup" onchange="toggleLookupUI()"> ตั้งเป็น Lookup Function
            </label>
            <button type="button" id="btn-edit-lookup" style="display: none; margin-top: 8px; width: 100%; padding: 6px; border-radius: 4px; background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer;" onclick="openLookupEditor()">📊 แก้ไขตารางกราฟ</button>
        </div>
        
        <div class="prop-row" id="incoming-vars-row" style="display:none; background: #f9f9f9; padding: 5px; border-radius: 4px;">
            <label style="color: #007AFF;">🔗 นำเข้าจากลูกศร (คลิกแทรก)</label>
            <div id="incoming-vars-container" style="display: flex; flex-wrap: wrap; margin-top: 5px;"></div>
        </div>

        <div class="prop-row" id="prop-initial-row" style="display: none; background: #fff3cd; padding: 8px; border-radius: 6px; border: 1px solid #ffeeba;">
            <label style="color: #856404;">ค่าเริ่มต้นของระดับ (Initial Value)</label>
            <input type="text" id="prop-initial" placeholder="เช่น 100">
        </div>

        <div class="prop-row">
            <label id="lbl-prop-equation">สมการ (Equation)</label>
            <input type="text" id="prop-equation" placeholder="เช่น Pop * Rate">
        </div>
        <div id="unit-result"></div>
        <div class="prop-actions">
            <button class="action-btn" onclick="checkUnitUI()">Check Units</button>
            <button class="active" onclick="saveProperties()">Save</button>
            <button class="danger" onclick="closePropertyPanel()">Close</button>
        </div>
    </div>

    <div id="lookup-panel" style="display: none; position: absolute; top: 5%; left: 10%; width: 80%; height: 90%; background: white; z-index: 1100; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); flex-direction: column; padding: 20px; box-sizing: border-box; font-family: sans-serif;">
        <h3 style="margin: 0 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">📊 ข้อมูล Lookup Function</h3>
        <div style="display: flex; flex: 1; gap: 20px; min-height: 0;">
            <div style="flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ccc; padding-right: 15px;">
                <div style="flex: 1; overflow-y: auto;">
                    <table id="lookup-table" style="width: 100%; border-collapse: collapse; text-align: center; font-size: 14px;">
                        <thead style="background: #f5f5f5; position: sticky; top: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">
                            <tr><th style="padding: 5px;">Input (X)</th><th style="padding: 5px;">Output (Y)</th><th></th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <button style="margin-top: 10px; width: 100%; padding: 8px; background: #34C759; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="addLookupRow()">+ เพิ่มจุดข้อมูล</button>

<button style="margin-top: 10px; width: 100%; padding: 8px; background: #34C759; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="addLookupRow()">+ เพิ่มจุดข้อมูล</button>
<button style="margin-top: 10px; width: 100%; padding: 8px; background: #FF9500; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="document.getElementById('csv-import-input').click()">📂 นำเข้าไฟล์อนุกรมเวลา (.csv)</button>
<input type="file" id="csv-import-input" accept=".csv" style="display: none;" onchange="importCSVData(event)">

            </div>
            <div style="flex: 2; position: relative;">
                <canvas id="lookup-chart"></canvas>
            </div>
        </div>
        <div style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; border-top: 2px solid #eee; padding-top: 15px;">
            <button style="padding: 8px 20px; background: #007aff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="saveLookupData()">บันทึกข้อมูล</button>
            <button style="padding: 8px 20px; background: #ff3b30; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="closeLookupEditor()">ยกเลิก</button>
        </div>
    </div>

    <div id="sim-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0; color: #333;">📈 ผลการจำลอง (Simulation)</h2>
            <button class="danger" style="width: auto; height: auto; padding: 6px 15px; border-radius: 6px; font-size: 14px; font-weight: bold;" onclick="closeSimPanel()">ปิด ✖</button>
        </div>
        <div style="display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;">
            <label>เริ่ม (Start Time): <input type="number" id="sim-start" class="sim-input" value="0"></label>
            <label>สิ้นสุด (End Time): <input type="number" id="sim-end" class="sim-input" value="10"></label>
            <label>ช่วงเวลา (dt): <input type="number" id="sim-dt" class="sim-input" value="0.25" step="0.05"></label>
            
<button class="active" style="width: auto; height: auto; padding: 6px 20px; border-radius: 6px; font-size: 14px; font-weight: bold;" onclick="runSimulation()">▶️ คำนวณใหม่</button>
<button class="action-btn" style="width: auto; height: auto; padding: 6px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; margin-left: 10px; background-color: #007AFF;" onclick="openValidationPanel()">📊 เปรียบเทียบข้อมูลจริง</button>
<button class="action-btn" style="width: auto; height: auto; padding: 6px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; margin-left: 10px; background-color: #AF52DE;" onclick="openSensitivityPanel()">🎲 Sensitivity</button>
<button class="action-btn" style="width: auto; height: auto; padding: 6px 20px; border-radius: 6px; font-size: 14px; font-weight: bold; margin-left: 10px;" onclick="exportSimulationCSV()">💾 ส่งออก CSV</button>




        </div>
        <div style="flex: 1; position: relative; width: 100%;">
            <canvas id="sim-chart"></canvas>
        </div>
    </div>

    <div id="toolbar">
        <div class="tool-group">
            <button id="btn-select" class="tool-btn" onclick="setTool('select')" title="เลือกและย้ายวัตถุ (ดับเบิลคลิกรูปทรงเพื่อตั้งค่า/ตรวจหน่วย)">👆</button>
        <button id="btn-cycle-select" class="action-btn" onclick="cycleSelection()" title="สลับการเลือกวัตถุ (กด Tab)" style="margin-left: 2px;">🔄</button>
            <button id="btn-equation" class="tool-btn" onclick="setTool('equation')" title="ตั้งค่าสมการ (เลือกเครื่องมือนี้แล้วแตะที่รูปทรง)" style="margin-left: 2px;">🧮</button>
            <button id="btn-delete-selected" class="danger" onclick="deleteSelected()" title="ลบที่เลือก (Del)" style="display: none; width: 30px; height: 30px; font-size: 14px; margin-left: 2px;">✖</button>
            
            <button id="btn-pen" class="active tool-btn" onclick="setTool('pen')" title="เส้นอิสระ" style="margin-left: 5px;"> ✍🏻</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-text" class="tool-btn" onclick="setTool('text')" title="พิมพ์ข้อความ"> 🔠 </button>
                <div id="text-format-control" class="shape-control-group">
                    <label style="cursor: default; font-size: 16px;" title="ขนาดตัวอักษร">📏</label>
                    <input type="number" id="text-size-input" min="10" max="150" value="18" oninput="setTextSize(this.value)">
                    <button class="format-btn" onclick="toggleTextAlign(this)" title="จัดชิดซ้าย/กึ่งกลาง">L</button>
                    <button class="format-btn" onclick="toggleTextFormat('bold', this)" title="ตัวหนา"><b>B</b></button>
                    <button class="format-btn" style="font-family: serif;" onclick="toggleTextFormat('italic', this)" title="ตัวเอน"><i>I</i></button>
                    <button class="format-btn" onclick="toggleTextFormat('underline', this)" title="ขีดเส้นใต้"><u>U</u></button>
                    <button class="format-btn" style="font-size: 13px; font-weight: bold;" onclick="toggleTextFormat('caps', this)" title="พิมพ์ใหญ่">AA</button>
                </div>
            </div>
            <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')" title="ยางลบ"> 🧼 </button>
        </div>
        
        <div class="tool-group">
            <button id="btn-rect" class="tool-btn" onclick="setTool('rect')" title="กล่อง (Stock/Level)">⏹️</button>
            <button id="btn-oval" class="tool-btn" onclick="setTool('oval')" title="วงรี (Auxiliary/Parameter)">⬭</button>
            <button id="btn-diamond" class="tool-btn" onclick="setTool('diamond')" title="สี่เหลี่ยมเพชร"> 💠 </button>
            <button id="btn-parallelogram" class="tool-btn" onclick="setTool('parallelogram')" title="สี่เหลี่ยมขนมเปียกปูน">▱</button>
            <button id="btn-cloud" class="tool-btn" onclick="setTool('cloud')" title="ก้อนเมฆ (Source/Sink)"> ☁️ </button>
            <button id="btn-valve-poly" class="tool-btn" onclick="setTool('valve-poly')" title="วาล์ว (Rate/Flow)"> ⌛ </button>
            <button id="btn-valve-h" class="tool-btn" onclick="setTool('valve-h')" title="วาล์วแนวนอน">⋈</button>
            <button id="btn-valve-v" class="tool-btn" onclick="setTool('valve-v')" title="วาล์วแนวตั้ง">ⴵ</button>
                <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-circle" class="tool-btn" onclick="setTool('circle')" title="วงกลม (Connector)"> ⭕ </button>
                <button id="btn-short-l-h" class="tool-btn" onclick="setTool('short-line-h')" title="เส้นตรงแนวราบสั้น"> ➖ </button>

                <div id="double-edge-control" class="shape-control-group">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 3px;" title="เปิดใช้งานวงกลมขอบคู่">
                        <input type="checkbox" id="double-edge-check" onchange="toggleDoubleEdge()"> ◎
                    </label>
                </div>
            </div>
        </div>
        
        <div class="tool-group">
            <button id="btn-a-arrow-s" class="tool-btn" onclick="setTool('angled-arrow-solid')" title="ลูกศรเส้นทึบหักมุม"> ⬆️ </button>
            <button id="btn-circle-arrow" class="tool-btn" onclick="setTool('circle-arrow-dashed')" title="ลูกศรประโคนวงกลม"> 🔂</button>
            <button id="btn-circle-l" class="tool-btn" onclick="setTool('circle-line-dashed')" title="เส้นประแบบโค้งโคนวงกลม (ไม่มีหัวลูกศร)"> ⤿ </button>
            <button id="btn-c-arrow-d" class="tool-btn" onclick="setTool('curved-arrow-dashed')" title="ลูกศรเส้นประแบบโค้ง"> 🔁 </button>
            <button id="btn-a-arrow-d" class="tool-btn" onclick="setTool('angled-arrow-dashed')" title="ลูกศรเส้นประหักมุม">⇢</button>
            <button id="btn-ra-arrow-s" class="tool-btn" onclick="setTool('rounded-angled-arrow-solid')" title="เส้นทึบหักมุมโค้งมน" style="font-weight: bold; font-size: 16px;"> ⤵️ </button>
            <button id="btn-ra-arrow-d" class="tool-btn" onclick="setTool('rounded-angled-arrow-dashed')" title="เส้นประหักมุมโค้งมน" style="font-weight: bold; font-size: 16px;">╰⇢</button>
            <button id="btn-a-line-s" class="tool-btn" onclick="setTool('angled-line-solid')" title="เส้นทึบหักมุม (ไม่มีหัวลูกศร)"> #️⃣ </button>

            <button class="action-btn" onclick="toggleHandwritingGuides()" title="เปิด/ปิด เส้นบรรทัดคัดลายมือ">📝</button>

            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-c-line-d" class="tool-btn" onclick="setTool('curved-line-dashed')" title="เส้นประแบบโค้ง (ไม่มีหัวลูกศร)"> ╭╯ </button>
                  <div id="curvature-control" class="shape-control-group">
                    <label style="cursor: default; font-size: 16px;" title="ปรับระดับความโค้ง">🪃</label>
                    <input type="range" id="curvature-slider" min="-150" max="150" value="50" oninput="setCurvature(this.value)">
                    <input type="number" id="curvature-input" min="-150" max="150" value="50" oninput="setCurvature(this.value)" title="ระบุค่าความโค้ง" style="width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 5px; padding: 2px; font-size: 12px; outline: none; margin-left: 3px;">
                </div>
            </div>
            <button class="action-btn" onclick="undo()" title="ย้อนกลับการทำงานล่าสุด">↩️</button>
        </div>
        
        <div class="tool-group size-picker">
            <label class="size-check" title="ขนาดเล็ก"><input type="radio" name="penSize" value="2" checked onchange="setSize(2)"> S</label>
            <label class="size-check" title="ขนาดกลาง"><input type="radio" name="penSize" value="4" onchange="setSize(4)"> M</label>
            <label class="size-check" title="ขนาดใหญ่"><input type="radio" name="penSize" value="6" onchange="setSize(6)"> L</label>
        </div>

        <div class="tool-group color-picker">
            <button class="color-btn active" style="background-color: #000000;" onclick="setColor('#000000', this)" title="สีดำ"></button>
            <button class="color-btn" style="background-color: #FF3B30;" onclick="setColor('#FF3B30', this)" title="สีแดง"></button>
            <button class="color-btn" style="background-color: #34C759;" onclick="setColor('#34C759', this)" title="สีเขียว"></button>
            <button class="color-btn" style="background-color: #007AFF;" onclick="setColor('#007AFF', this)" title="สีน้ำเงิน"></button>
        </div>

        <div class="tool-group">

    <script>
// ==========================================
// ส่วนการจัดการ Unit Check, Data Model และ Simulation
// ==========================================

try {
    math.createUnit('person', { aliases: ['people', 'persons', 'man', 'men'] });
    math.createUnit('item', { aliases: ['items', 'piece', 'pieces', 'unit', 'units'] });
    math.createUnit('baht', { aliases: ['thb'] });
    math.createUnit('mcg', '1 ug');
    math.createUnit('ton', '1000 kg'); 
    math.createUnit('tons', '1000 kg');
    math.createUnit('rai', '1600 m^2');
    math.createUnit('ngan', '400 m^2');
    math.createUnit('sqwah', '4 m^2');
    math.createUnit('Dmnl', '1'); 
} catch(e) { console.log("หน่วยลงทะเบียนแล้ว"); }


math.import({
    DELAY: function(val, delayTime) { 
        try {
            if (typeof val === 'string') {
                return math.evaluate(val); 
            }
            return val;
        } catch(e) {
            return 1;
        }
    },
    // --- เพิ่มฟังก์ชันเงื่อนไข ---
    IF_THEN_ELSE: function(condition, trueVal, falseVal) {
        return condition ? trueVal : falseVal;
    },
    IF: function(condition, trueVal, falseVal) {
        return condition ? trueVal : falseVal;
    }
}, { override: true });

let globalSimHistory = null; // เพิ่มบรรทัดนี้เพื่อเก็บผลลัพธ์กราฟ

        let editingObject = null;
        let simChartInstance = null;
        let currentLookupData = [];
        let lookupChartInstance = null;
        
        const propPanel = document.getElementById('property-panel');
        const propShortNameInput = document.getElementById('prop-short-name');
        const propFullNameInput = document.getElementById('prop-full-name');
        const propIndexInput = document.getElementById('prop-index');
        const propAlignInput = document.getElementById('prop-align');
        const propTextPosInput = document.getElementById('prop-text-pos');
        const propTextPosRow = document.getElementById('prop-text-pos-row');
        const propUnitInput = document.getElementById('prop-unit');
        const propEquationInput = document.getElementById('prop-equation');
        const propInitialInput = document.getElementById('prop-initial');
        const propInitialRow = document.getElementById('prop-initial-row');
        const lblPropEquation = document.getElementById('lbl-prop-equation');
        const unitResult = document.getElementById('unit-result');

        function interpolateLookup(x, dataPoints) {
            if (!dataPoints || dataPoints.length === 0) return 0;
            if (dataPoints.length === 1) return dataPoints[0].y;
            
            let sorted = [...dataPoints].sort((a,b) => a.x - b.x);
            
            if (x <= sorted[0].x) return sorted[0].y;
            if (x >= sorted[sorted.length - 1].x) return sorted[sorted.length - 1].y;
            
            for (let i = 0; i < sorted.length - 1; i++) {
                if (x >= sorted[i].x && x <= sorted[i+1].x) {
                    let x0 = sorted[i].x, y0 = sorted[i].y;
                    let x1 = sorted[i+1].x, y1 = sorted[i+1].y;
                    if (x1 === x0) return y0;
                    return y0 + ((y1 - y0) / (x1 - x0)) * (x - x0);
                }
            }
            return 0;
        }

        function getShapeAtPoint(x, y, excludeObj = null) {
            for (let i = sceneObjects.length - 1; i >= 0; i--) {
                const obj = sceneObjects[i];
                if (obj === excludeObj) continue;
                
                let box = getShapeBox(obj);
                if (box) {
                    const pad = 20; 
                    if (x >= box.left - pad && x <= box.right + pad && y >= box.top - pad && y <= box.bottom + pad) {
                        return obj;
                    }
                }
            }
            return null;
        }

        function toggleLookupUI() {
            const isLookup = document.getElementById('prop-is-lookup').checked;
            const btnEdit = document.getElementById('btn-edit-lookup');
            const eqLabel = document.getElementById('lbl-prop-equation');
            if (isLookup) {
                btnEdit.style.display = 'block';
                eqLabel.innerHTML = "สมการนำเข้าแกน X <span style='color:#007aff;'>(ต้องเป็น Dmnl)</span>";
            } else {
                btnEdit.style.display = 'none';
                eqLabel.innerText = "สมการ (Equation)";
            }
        }

        function getIncomingVariables(targetObj) {
            let incomingVars = [];
            let targetBox = getShapeBox(targetObj);
            if (!targetBox) return incomingVars;

            const pad = 25; 
            sceneObjects.forEach(obj => {
                if (obj.type === 'arrow') { 
                    let startPt = null, endPt = null;
                    if (obj.points && obj.points.length >= 2) {
                        startPt = obj.points[0];
                        endPt = obj.points[obj.points.length - 1];
                    } else if (obj.p1 && obj.p2) {
                        startPt = obj.p1;
                        endPt = obj.p2;
                    }

                    if (startPt && endPt) {
                        if (endPt.x >= targetBox.left - pad && endPt.x <= targetBox.right + pad &&
                            endPt.y >= targetBox.top - pad && endPt.y <= targetBox.bottom + pad) {
                            
                            let sourceObj = getShapeAtPoint(startPt.x, startPt.y, targetObj);
                            if (sourceObj && (sourceObj.varShortName || sourceObj.varFullName)) {
                                let vName = sourceObj.varShortName || sourceObj.varFullName;
                                if (!incomingVars.includes(vName)) {
                                    incomingVars.push(vName);
                                }
                            }
                        }
                    }
                }
            });
            return incomingVars;
        }

        function openPropertyPanel(obj, screenX, screenY) {
            editingObject = obj;
            propShortNameInput.value = obj.varShortName || '';
            propFullNameInput.value = obj.varFullName || '';
            propIndexInput.value = obj.varIndex || '';
            propAlignInput.value = obj.varAlign || 'center';
            
            if (obj.type === 'short-line-h') {
                propTextPosRow.style.display = 'block';
                propTextPosInput.value = obj.varTextPos || 'above';
            } else {
                propTextPosRow.style.display = 'none';
            }
            
            propUnitInput.value = obj.varUnit || '';
            propEquationInput.value = obj.varEquation || '';
            
            if (obj.type === 'rect') {
                propInitialRow.style.display = 'block';
                propInitialInput.value = obj.varInitial || '';
                lblPropEquation.innerText = "สมการสุทธิ (Net Flow = Inflow - Outflow)";
                document.getElementById('prop-panel-title').innerText = "ตั้งค่าระดับ (Stock)";
            } else {
                propInitialRow.style.display = 'none';
                propInitialInput.value = '';
                lblPropEquation.innerText = "สมการ (Equation)";
                document.getElementById('prop-panel-title').innerText = "ตั้งค่าตัวแปร";
            }

            if (obj.type === 'circle' || obj.type === 'oval') {
                document.getElementById('prop-lookup-row').style.display = 'block';
                document.getElementById('prop-is-lookup').checked = !!obj.isLookup;
                toggleLookupUI();
            } else {
                document.getElementById('prop-lookup-row').style.display = 'none';
                document.getElementById('prop-is-lookup').checked = false;
            }

            unitResult.style.display = 'none';

            const incomingVars = getIncomingVariables(obj);
            const incomingRow = document.getElementById('incoming-vars-row');
            const incomingContainer = document.getElementById('incoming-vars-container');
            incomingContainer.innerHTML = ''; 
            
            if (incomingVars.length > 0) {
                incomingRow.style.display = 'block';
                incomingVars.forEach(v => {
                    let btn = document.createElement('button');
                    btn.type = 'button';
                    btn.innerText = `+ ${v}`;
                    btn.className = 'var-badge';
                    btn.onclick = () => {
                        const input = propEquationInput;
                        const start = input.selectionStart;
                        const end = input.selectionEnd;
                        const text = input.value;
                        let insertText = v;
                        
                        if (start > 0 && text[start-1] !== ' ' && text[start-1] !== '(') insertText = ' ' + insertText;
                        if (end < text.length && text[end] !== ' ' && text[end] !== ')') insertText = insertText + ' ';
                        
                        input.value = text.slice(0, start) + insertText + text.slice(end);
                        input.focus();
                        const newPos = start + insertText.length;
                        input.setSelectionRange(newPos, newPos);
                    };
                    incomingContainer.appendChild(btn);
                });
            } else {
                incomingRow.style.display = 'none';
            }

            let panelX = screenX + 20;
            let panelY = screenY + 20;
            if (panelX + 320 > window.innerWidth) panelX = window.innerWidth - 340;
            if (panelY + 450 > window.innerHeight) panelY = window.innerHeight - 480;

            propPanel.style.left = panelX + 'px';
            propPanel.style.top = panelY + 'px';
            propPanel.style.display = 'block';
        }

        function closePropertyPanel() {
            propPanel.style.display = 'none';
            editingObject = null;
        }

        function saveProperties() {
            if (editingObject) {
                editingObject.varShortName = propShortNameInput.value.trim();
                editingObject.varFullName = propFullNameInput.value.trim();
                editingObject.varIndex = propIndexInput.value.trim();
                editingObject.varAlign = propAlignInput.value;
                if (editingObject.type === 'short-line-h') {
                    editingObject.varTextPos = propTextPosInput.value;
                }
                
                editingObject.varUnit = propUnitInput.value.trim();
                editingObject.varEquation = propEquationInput.value.trim();
                
                if (editingObject.type === 'rect') {
                    editingObject.varInitial = propInitialInput.value.trim();
                }

                if (editingObject.type === 'circle' || editingObject.type === 'oval') {
                    editingObject.isLookup = document.getElementById('prop-is-lookup').checked;
                    if (editingObject.isLookup && !editingObject.lookupData) {
                        editingObject.lookupData = [{x: 0, y: 1}, {x: 1, y: 1}]; 
                    }
                    if (editingObject.isLookup && editingObject.varShortName) {
                        editingObject.varFullName = editingObject.varShortName + "T";
                        propFullNameInput.value = editingObject.varFullName;
                    }
                }

                let combinedTextLines = [];
                if (editingObject.varShortName) combinedTextLines.push(editingObject.varShortName);
                if (editingObject.varFullName) combinedTextLines.push(editingObject.varFullName);
                if (editingObject.varIndex) combinedTextLines.push(editingObject.varIndex);
                let combinedText = combinedTextLines.join('\n');
                
                // ลบข้อความเดิมทั้งหมดที่ผูกกับรูปทรงนี้ทิ้งแบบครอบคลุม ป้องกันการซ้อนทับ
                sceneObjects = sceneObjects.filter(o => {
                    if (o.type !== 'text' || !o.varLinked) return true;
                    
                    let isSameRef = (o.varLinked === editingObject);
                    let isSameName = (editingObject.varShortName && o.varLinked.varShortName === editingObject.varShortName);
                    
                    let dx = Math.abs((o.varLinked.x || 0) - (editingObject.x || 0));
                    let dy = Math.abs((o.varLinked.y || 0) - (editingObject.y || 0));
                    let isSamePos = (dx < 2 && dy < 2);
                    
                    if (isSameRef || isSameName || isSamePos) return false; 
                    return true;
                });

                if(combinedText && editingObject.type !== 'text'){
                    let box = getShapeBox(editingObject);
                    if(box){
                         sceneObjects.push({ 
                            type: 'text', 
                            text: combinedText, 
                            x: box.cx, 
                            y: box.cy, 
                            color: '#000', 
                            fontSize: 16,
                            isBold: true,
                            align: editingObject.varAlign, 
                            varLinked: editingObject 
                        });
                    }
                }

                renderScene();
            }
            closePropertyPanel();
        }


        // ==========================================
        // ส่วนจัดการ Lookup Panel
        // ==========================================
        function openLookupEditor() {
            if (!editingObject) return;
            currentLookupData = editingObject.lookupData ? JSON.parse(JSON.stringify(editingObject.lookupData)) : [
                { x: 0, y: 1 },
                { x: 1, y: 1 }
            ];
            document.getElementById('lookup-panel').style.display = 'flex';
            renderLookupTable();
            updateLookupChart();
        }

        function closeLookupEditor() {
            document.getElementById('lookup-panel').style.display = 'none';
        }

        function saveLookupData() {
            if (editingObject) {
                const rows = document.querySelectorAll('#lookup-table tbody tr');
                let newData = [];
                rows.forEach(row => {
                    const xVal = parseFloat(row.querySelector('.inp-x').value) || 0;
                    const yVal = parseFloat(row.querySelector('.inp-y').value) || 0;
                    newData.push({x: xVal, y: yVal});
                });
                newData.sort((a,b) => a.x - b.x);
                editingObject.lookupData = newData;
                currentLookupData = newData;
            }
            closeLookupEditor();
        }

        function renderLookupTable() {
            const tbody = document.querySelector('#lookup-table tbody');
            tbody.innerHTML = '';
            currentLookupData.forEach((pt, idx) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding: 4px;"><input type="number" class="inp-x" value="${pt.x}" step="0.1" onchange="updateLookupFromTable()" style="width: 100%; box-sizing: border-box; text-align:center; padding: 5px; border-radius: 4px; border: 1px solid #ccc;"></td>
                    <td style="padding: 4px;"><input type="number" class="inp-y" value="${pt.y}" step="0.1" onchange="updateLookupFromTable()" style="width: 100%; box-sizing: border-box; text-align:center; padding: 5px; border-radius: 4px; border: 1px solid #ccc;"></td>
                    <td style="padding: 4px;"><button class="danger" style="width:28px; height:28px; font-size:12px;" onclick="removeLookupRow(${idx})">✖</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addLookupRow() {
            let lastX = currentLookupData.length > 0 ? currentLookupData[currentLookupData.length-1].x + 1 : 0;
            let lastY = currentLookupData.length > 0 ? currentLookupData[currentLookupData.length-1].y : 0;
            currentLookupData.push({ x: lastX, y: lastY });
            renderLookupTable();
            updateLookupChart();
        }

        function removeLookupRow(idx) {
            if(currentLookupData.length <= 2) {
                alert("ต้องมีอย่างน้อย 2 จุด");
                return;
            }
            currentLookupData.splice(idx, 1);
            renderLookupTable();
            updateLookupChart();
        }

        function updateLookupFromTable() {
            const rows = document.querySelectorAll('#lookup-table tbody tr');
            let temp = [];
            rows.forEach(row => {
                temp.push({
                    x: parseFloat(row.querySelector('.inp-x').value) || 0,
                    y: parseFloat(row.querySelector('.inp-y').value) || 0
                });
            });
            currentLookupData = temp;
            updateLookupChart();
        }

        function updateLookupChart() {
            const ctxChart = document.getElementById('lookup-chart').getContext('2d');
            let plotData = [...currentLookupData].sort((a,b) => a.x - b.x);
            
            if (lookupChartInstance) {
                lookupChartInstance.destroy();
            }

            lookupChartInstance = new Chart(ctxChart, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Lookup Multiplier',
                        data: plotData,
                        borderColor: '#007AFF',
                        backgroundColor: 'rgba(0,122,255,0.2)',
                        showLine: true,
                        tension: 0,
                        pointRadius: 5,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: 'Input (X)' } },
                        y: { title: { display: true, text: 'Output (Y)' } }
                    }
                }
            });
        }

        // ==========================================
        // ส่วนของ Simulation Engine
        // ==========================================
        function openSimPanel() {
            if (activeTextInput) finalizeTextInput();
            setTool('select');
            
            if (document.getElementById('property-panel').style.display === 'block') {
                saveProperties();
            }

            document.getElementById('sim-panel').style.display = 'flex';
            runSimulation();
        }

        function closeSimPanel() {
            document.getElementById('sim-panel').style.display = 'none';
        }

        function runSimulation() {
            const tStart = parseFloat(document.getElementById('sim-start').value) || 0;
            const tEnd = parseFloat(document.getElementById('sim-end').value) || 10;
            const dt = parseFloat(document.getElementById('sim-dt').value) || 0.25;

            let variables = sceneObjects.filter(obj => obj.varShortName && obj.varShortName.trim() !== '');
            let stocks = variables.filter(v => v.type === 'rect');
            let auxiliaries = variables.filter(v => v.type !== 'rect');

            let history = { time: [] };
            variables.forEach(v => history[v.varShortName] = []);

            let compiled = {};
            variables.forEach(v => {
             try { 
                let parsedEq = (v.varEquation || '0').replace(/IF\s+THEN\s+ELSE/gi, 'IF_THEN_ELSE');
                compiled[v.varShortName] = math.compile(parsedEq); 
             } 
             catch(e) { compiled[v.varShortName] = math.compile('0'); }
            });

            const createDelayFunc = (scope) => {
                return function(varName, delayTime) {
                    let targetTime = scope.Time - delayTime; 
                    if (history.time.length === 0 || targetTime < history.time[0]) {
                        return 0;
                    }
                    for (let i = history.time.length - 1; i >= 0; i--) {
                        if (history.time[i] <= targetTime + 0.0001) {
                            return history[varName] ? history[varName][i] : 0;
                        }
                    }
                    return 0;
                };
            };

            let currentScope = { Time: tStart };
            currentScope.DELAY = createDelayFunc(currentScope);
            
            currentScope.IF = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };
            currentScope.IF_THEN_ELSE = function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; };

            auxiliaries.forEach(aux => currentScope[aux.varShortName] = 0);
            
            stocks.forEach(s => {
                try { currentScope[s.varShortName] = math.evaluate(s.varInitial || '0', currentScope); } 
                catch(e) { currentScope[s.varShortName] = 0; }
            });

            function evaluateAuxiliaries(scope) {
                for(let pass = 0; pass < auxiliaries.length + 1; pass++) {
                    auxiliaries.forEach(aux => {
                        try {
                            let evalResult = compiled[aux.varShortName].evaluate(scope);
                            let val = evalResult && evalResult.type === 'Unit' ? evalResult.toNumber() : evalResult;
                            scope[aux.varShortName] = (aux.isLookup && aux.lookupData) ? interpolateLookup(val, aux.lookupData) : val;
                        } catch(e) {} 
                    });
                }
            }

            function getRates(scope) {
                evaluateAuxiliaries(scope);
                let rates = {};
                stocks.forEach(s => {
                    try {
                        let netFlow = compiled[s.varShortName].evaluate(scope);
                        rates[s.varShortName] = netFlow && netFlow.type === 'Unit' ? netFlow.toNumber() : netFlow;
                    } catch(e) { rates[s.varShortName] = 0; }
                });
                return rates;
            }

            for(let t = tStart; t <= tEnd + (dt/10); t += dt) {
                currentScope.Time = t;

                evaluateAuxiliaries(currentScope);

                history.time.push(parseFloat(t.toFixed(4)));
                variables.forEach(v => {
                    history[v.varShortName].push(currentScope[v.varShortName] || 0);
                });

                let k1 = getRates(currentScope);

                let scopeK2 = { ...currentScope, Time: t + dt / 2 };
                scopeK2.DELAY = createDelayFunc(scopeK2);
                scopeK2.IF = currentScope.IF;
                scopeK2.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
                stocks.forEach(s => scopeK2[s.varShortName] = currentScope[s.varShortName] + (k1[s.varShortName] * dt / 2));
                let k2 = getRates(scopeK2);

                let scopeK3 = { ...currentScope, Time: t + dt / 2 };
                scopeK3.DELAY = createDelayFunc(scopeK3);
                scopeK3.IF = currentScope.IF;
                scopeK3.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
                stocks.forEach(s => scopeK3[s.varShortName] = currentScope[s.varShortName] + (k2[s.varShortName] * dt / 2));
                let k3 = getRates(scopeK3);

                let scopeK4 = { ...currentScope, Time: t + dt };
                scopeK4.DELAY = createDelayFunc(scopeK4);
                scopeK4.IF = currentScope.IF;
                scopeK4.IF_THEN_ELSE = currentScope.IF_THEN_ELSE;
                stocks.forEach(s => scopeK4[s.varShortName] = currentScope[s.varShortName] + (k3[s.varShortName] * dt));
                let k4 = getRates(scopeK4);

                stocks.forEach(s => {
                    let avgRate = (k1[s.varShortName] + 2 * k2[s.varShortName] + 2 * k3[s.varShortName] + k4[s.varShortName]) / 6;
                    currentScope[s.varShortName] = currentScope[s.varShortName] + (avgRate * dt);
                });
            }

// แทรกบรรทัดนี้ก่อน render กราฟ
globalSimHistory = { history: history, variables: variables }; 


            renderSimulationChart(history, variables);
        }

        // ==========================================
        // ฟังก์ชันแกนกลางสำหรับการตรวจสอบหน่วย (Unit Check Logic)
        // ==========================================
        function validateUnit(obj, modelData) {
            const nameToUse = obj.varShortName || obj.varFullName || "ไม่ระบุชื่อ";
            const lhsUnit = (obj.varUnit || "").trim();
            let rhsEquation = (obj.varEquation || "").trim();

            if (!obj.varShortName || !lhsUnit || !rhsEquation) {
                return { pass: false, message: `[${nameToUse}] ข้อมูลไม่ครบถ้วน (ขาดชื่อย่อ, หน่วย หรือ สมการ)` };
            }

            rhsEquation = rhsEquation.replace(/IF\s+THEN\s+ELSE/gi, 'IF_THEN_ELSE');
            let parsedEquation = rhsEquation;
            
            parsedEquation = parsedEquation.replace(/\bTime\b/gi, '(1)');

            for (const [varName, data] of Object.entries(modelData)) {
                if (varName === nameToUse) continue; 
                
                const regex = new RegExp(`\\b${varName}\\b`, 'g');
                if (parsedEquation.match(regex)) {
                    let cleanUnit = data.unit ? data.unit.trim() : "";
                    let unitString = "(1)";
                    
                    if (cleanUnit !== "" && cleanUnit.toLowerCase() !== "dmnl") {
                        // เติม * เข้าไปแก้ปัญหาตัวเลขติดกัน (เช่น 1 1/year)
                        unitString = `(1 * ${cleanUnit})`; 
                    }
                    
                    parsedEquation = parsedEquation.replace(regex, unitString);
                }
            }

            const checkScope = {
                IF: function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; },
                IF_THEN_ELSE: function(condition, trueVal, falseVal) { return condition ? trueVal : falseVal; },
                Time: 1
            };
            
            if (obj.isLookup) {
                try {
                    const rhsResult = math.evaluate(parsedEquation, checkScope);
                    let isDmnl = false;
                    
                    if (typeof rhsResult === 'number') {
                        isDmnl = true;
                    } else if (rhsResult.type === 'Unit') {
                        isDmnl = rhsResult.dimensions.every(d => d === 0);
                    }

                    if (isDmnl || parsedEquation.includes('Dmnl')) {
                        return { pass: true, message: `[${nameToUse}] แกน X ไร้หน่วย (Dmnl) ขาออกมีหน่วย [ ${lhsUnit} ]` };
                    } else {
                        return { pass: false, message: `[${nameToUse}] สมการ X ต้องเป็น Dmnl แต่ได้ [ ${typeof rhsResult === 'number' ? 'Dmnl' : rhsResult.formatUnits()} ]` };
                    }
                } catch (error) {
                    return { pass: false, message: `[${nameToUse}] ขวา: ${error.message}` };
                }
            }

            try {
                const rhsResult = math.evaluate(parsedEquation, checkScope);

                if (obj.type === 'rect') {
                    const lhsUnitObj = math.unit(lhsUnit);
                    const ratio = math.divide(lhsUnitObj, rhsResult); 
                    
                    try {
                        ratio.to('day'); 
                        return { pass: true, message: `[${nameToUse}] สมการสุทธิถูกต้อง (สะสม ${lhsUnit} ต่อ ${ratio.formatUnits()})` };
                    } catch (e) {
                        return { pass: false, message: `[${nameToUse}] สมการสุทธิต้องมีหน่วยเป็น ${lhsUnit}/เวลา แต่ขวาได้ [ ${rhsResult.formatUnits()} ]` };
                    }
                } else {
                    let rhsDim;
                    let rhsFormat = "";
                    let isRhsDimensionless = false;
                    
                    if (typeof rhsResult === 'number') {
                        rhsDim = math.unit('1').dimensions; 
                        rhsFormat = "Dmnl";
                        isRhsDimensionless = true;
                    } else if (rhsResult.type === 'Unit') {
                        rhsDim = rhsResult.dimensions;
                        rhsFormat = rhsResult.formatUnits();
                        isRhsDimensionless = rhsDim.every(d => d === 0);
                    } else {
                         throw new Error("รูปแบบสมการฝั่งขวาไม่รองรับ");
                    }

                    const isLhsDimensionless = (lhsUnit.toLowerCase() === 'dmnl' || lhsUnit === '1');

                    if (isLhsDimensionless) {
                        if (isRhsDimensionless) {
                            return { pass: true, message: `[${nameToUse}] สมดุลแล้ว (ซ้ายไร้หน่วย = ขวาไร้หน่วย)` };
                        } else {
                            return { pass: false, message: `[${nameToUse}] ขวาได้ [ ${rhsFormat} ] แต่ซ้ายตั้งไว้ว่าไร้หน่วย [ Dmnl ]` };
                        }
                    } else {
                        const lhsDim = math.unit(lhsUnit).dimensions;
                        if (JSON.stringify(lhsDim) === JSON.stringify(rhsDim)) {
                            return { pass: true, message: `[${nameToUse}] หน่วยสอดคล้องกัน [ ${lhsUnit} ]` };
                        } else {
                            return { pass: false, message: `[${nameToUse}] ขวาได้ [ ${rhsFormat} ] แต่ซ้ายตั้งไว้ [ ${lhsUnit} ]` };
                        }
                    }
                }
            } catch (error) {
                return { pass: false, message: `[${nameToUse}] ขวา: ${error.message}` };
            }
        }

        function isPointInPolygon(point, vs) {
            let x = point.x, y = point.y;
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                let xi = vs[i].x, yi = vs[i].y;
                let xj = vs[j].x, yj = vs[j].y;
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function applyCamera(context) {
            const dpr = window.devicePixelRatio || 1;
            context.setTransform(dpr * camera.scale, 0, 0, dpr * camera.scale, camera.x * dpr, camera.y * dpr);
        }

        function resetView() { camera = { x: 0, y: 0, scale: 1 }; renderScene(); }

        function getWorldPos(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (screenX - rect.left - camera.x) / camera.scale,
                y: (screenY - rect.top - camera.y) / camera.scale
            };
        }
        
        function getScreenPos(worldX, worldY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: worldX * camera.scale + camera.x + rect.left,
                y: worldY * camera.scale + camera.y + rect.top
            };
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            
            [canvas, previewCanvas].forEach(c => {
                c.width = w * dpr;
                c.height = h * dpr;
                c.style.width = w + 'px';
                c.style.height = h + 'px';

        function getShapeBox(obj) {
            let box = null;
            if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'short-line-h', 'image'].includes(obj.type)) {
                let hPad = obj.type === 'short-line-h' ? 10 : 0;
                box = { left: obj.x, right: obj.x + obj.w, top: obj.y - hPad, bottom: obj.y + obj.h + hPad, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            } else if (obj.type === 'circle') {
                box = { left: obj.x - obj.radius, right: obj.x + obj.radius, top: obj.y - obj.radius, bottom: obj.y + obj.radius, cx: obj.x, cy: obj.y };
            }
            if (box) box.isValve = (obj.type === 'valve-h' || obj.type === 'valve-v' || obj.type === 'valve-poly');
            return box;
        }

        function getBoundingBox(obj) {
            let box = getShapeBox(obj);
            if (box) return box;

            if (obj.type === 'text') {
                ctx.font = `${obj.isItalic ? 'italic ' : ''}${obj.isBold ? 'bold ' : ''}${obj.fontSize}px sans-serif`;
                let lines = (obj.isAllCaps ? obj.text.toUpperCase() : obj.text).split('\n');
                let maxWidth = 0;
                lines.forEach(line => { maxWidth = Math.max(maxWidth, ctx.measureText(line).width); });
                let totalHeight = lines.length * (obj.fontSize * 1.2);
                return { left: obj.x - maxWidth/2, right: obj.x + maxWidth/2, top: obj.y - totalHeight/2, bottom: obj.y + totalHeight/2, cx: obj.x, cy: obj.y };
            } else if (obj.points) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                obj.points.forEach(p => { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); });
                return { left: minX, right: maxX, top: minY, bottom: maxY, cx: (minX + maxX)/2, cy: (minY + maxY)/2 };
            } else if (obj.p1 && obj.p2) {
                return { left: Math.min(obj.p1.x, obj.p2.x), right: Math.max(obj.p1.x, obj.p2.x), top: Math.min(obj.p1.y, obj.p2.y), bottom: Math.max(obj.p1.y, obj.p2.y), cx: (obj.p1.x + obj.p2.x)/2, cy: (obj.p1.y + obj.p2.y)/2 };
            }
            return null;
        }

        function getAlignedCenter(cx, cy) {
            let snappedCx = cx;
            let snappedCy = cy;
            let foundV = false;
            let foundH = false;
            const threshold = 20; 
            let guides = [];

            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (!box) continue;

                if (!foundV && Math.abs(cx - box.cx) < threshold) {
                    snappedCx = box.cx; guides.push({ type: 'v', val: box.cx }); foundV = true;
                }
                if (!foundH && Math.abs(cy - box.cy) < threshold) {
                    snappedCy = box.cy; guides.push({ type: 'h', val: box.cy }); foundH = true;
                }
            }
            return { x: snappedCx, y: snappedCy, guides: guides };
        }

        function isPointInOrNearBox(px, py, box) {
            const pad = 30; 
            return px >= box.left - pad && px <= box.right + pad && py >= box.top - pad && py <= box.bottom + pad;
        }

        function calculateSnapPoints(p1, p2) {
            let srcBox = null, dstBox = null;
            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (box) {
                    if (!srcBox && isPointInOrNearBox(p1.x, p1.y, box)) srcBox = box;
                    if (!dstBox && isPointInOrNearBox(p2.x, p2.y, box) && box !== srcBox) dstBox = box;
                }
            }

            if (srcBox && dstBox) {
                const dx = dstBox.cx - srcBox.cx;
                const dy = dstBox.cy - srcBox.cy;
                let p1x, p1y, p2x, p2y;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.right; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.left; p2y = dstBox.cy;
                    } else {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.left; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.right; p2y = dstBox.cy;
                    }
                } else {
                    if (dy > 0) {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.bottom;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.top;
                    } else {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.top;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.bottom;
                    }
                }
                return { p1: {x: p1x, y: p1y}, p2: {x: p2x, y: p2y} };
            }
            return { p1, p2 };
        }

        function orthogonalize(points, threshold = 30) {
            if (!points || points.length < 2) return points;
            
            let result = [{ x: points[0].x, y: points[0].y }];
            let current = { x: points[0].x, y: points[0].y };
            let movingAxis = null; 

            for (let i = 1; i < points.length; i++) {
                let pt = points[i];
                let dx = pt.x - current.x;
                let dy = pt.y - current.y;

                if (!movingAxis) {
                    if (Math.abs(dx) >= Math.abs(dy) && Math.abs(dx) > threshold) {
                        movingAxis = 'x'; current.x = pt.x; result.push({ x: current.x, y: current.y });
                    } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > threshold) {
                        movingAxis = 'y'; current.y = pt.y; result.push({ x: current.x, y: current.y });
                    }
                } else {
                    if (movingAxis === 'x') {
                        current.x = pt.x; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        if (Math.abs(pt.y - current.y) > threshold) {
                            movingAxis = 'y'; current.y = pt.y; result.push({ x: current.x, y: current.y });
                        }
                    } else {
                        current.y = pt.y; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        if (Math.abs(pt.x - current.x) > threshold) {
                            movingAxis = 'x'; current.x = pt.x; result.push({ x: current.x, y: current.y });
                        }
                    }
                }
            }
            
            if (result.length > 1) {
                let lastRaw = points[points.length - 1];
                if (movingAxis === 'x') { result[result.length - 1] = { x: lastRaw.x, y: current.y }; } 
                else if (movingAxis === 'y') { result[result.length - 1] = { x: current.x, y: lastRaw.y }; }
            }
            
            let cleanResult = [result[0]];
            for (let i = 1; i < result.length; i++) {
                let prev = cleanResult[cleanResult.length - 1];
                let curr = result[i];
                if (Math.abs(curr.x - prev.x) > 1 || Math.abs(curr.y - prev.y) > 1) { cleanResult.push(curr); }
            }

            if (cleanResult.length === 1) { cleanResult.push({ x: points[points.length-1].x, y: points[points.length-1].y }); }
            return cleanResult;
        }

        function drawSmoothPath(c, pathData) {
            if (!pathData.points || pathData.points.length === 0) return;
            c.beginPath();
            c.lineCap = 'round'; c.lineJoin = 'round';
            c.globalCompositeOperation = pathData.type === 'eraser' ? 'destination-out' : 'source-over';
            c.strokeStyle = pathData.type === 'eraser' ? 'rgba(0,0,0,1)' : (pathData.color || '#000');
            c.lineWidth = pathData.type === 'eraser' ? pathData.baseSize * 2.5 : pathData.baseSize;

            c.moveTo(pathData.points[0].x, pathData.points[0].y);
            
            if (pathData.points.length === 1) {
                c.lineTo(pathData.points[0].x + 0.1, pathData.points[0].y);
            } else {
                for (let i = 1; i < pathData.points.length - 1; i++) {
                    let midX = (pathData.points[i].x + pathData.points[i+1].x) / 2;
                    let midY = (pathData.points[i].y + pathData.points[i+1].y) / 2;
                    c.quadraticCurveTo(pathData.points[i].x, pathData.points[i].y, midX, midY);
                }
                let last = pathData.points[pathData.points.length - 1];
                c.lineTo(last.x, last.y);
            }
            c.stroke();
            c.globalCompositeOperation = 'source-over';
        }

        function drawArrowhead(c, x, y, angle, color, lineWidth = 4) {
            const size = 14 + (lineWidth * 1.5); 
            const offset = lineWidth;

            c.save(); 
            c.translate(x, y); 
            c.rotate(angle);
            c.beginPath(); 
            
            c.moveTo(offset, 0); 
            c.lineTo(-size + offset, -size * 0.30); 
            c.lineTo(-size * 0.9 + offset, 0); 
            c.lineTo(-size + offset, size * 0.30); 
            
            c.closePath();
            c.fillStyle = color; c.fill(); c.restore();
        }

        function drawCloudShape(c, x, y, w, h, color, lineWidth = 4, fillColor = '#ffffff') {
            c.beginPath(); c.moveTo(x + w * 0.2, y + h * 0.8);
            c.bezierCurveTo(x - w * 0.1, y + h * 0.8, x - w * 0.1, y + h * 0.3, x + w * 0.2, y + h * 0.3);
            c.bezierCurveTo(x + w * 0.2, y - h * 0.1, x + w * 0.7, y - h * 0.1, x + w * 0.7, y + h * 0.2);
            c.bezierCurveTo(x + w * 1.1, y + h * 0.2, x + w * 1.1, y + h * 0.8, x + w * 0.8, y + h * 0.8);
            c.closePath();
            c.strokeStyle = color; c.lineWidth = lineWidth; c.fillStyle = fillColor; c.fill(); c.stroke();
        }

        function drawValveShape(c, obj) {
            c.beginPath();
            if (obj.type === 'valve-h') {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x, obj.y + obj.h); c.closePath();
                c.moveTo(obj.x + obj.w, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            } else {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y); c.closePath();
                c.moveTo(obj.x, obj.y + obj.h); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            }
            c.strokeStyle = obj.color; c.lineWidth = obj.lineWidth || 4; c.stroke();
        }

        function drawValvePolyShape(c, obj) {
            const {x, y, w, h, color, lineWidth} = obj;
            const cy = y + h / 2;
            const headH = h * 0.6; 
            const neckX_ref = x + w * 0.75; 
            const dx = w * 0.25; const dy = headH / 2; 
            const slopeX = dx / dy; const insetX = (h / 2) * slopeX; 
            const origTopX = Math.max(x, neckX_ref - insetX);
            const topX = x + ((origTopX - x) * 2);
            const bottomX = x + ((origTopX - x) * 2); 

            c.beginPath();
            c.moveTo(x, y);            
            c.lineTo(topX, y);         
            c.lineTo(x + w, cy + headH / 2); 
            c.lineTo(x + w, cy - headH / 2); 
            c.lineTo(bottomX, y + h); 
            c.lineTo(x, y + h);        
            c.closePath();             

            c.fillStyle = obj.fillColor || '#ffffff'; c.fill();
            c.strokeStyle = color; c.lineWidth = lineWidth || 4; c.lineJoin = 'miter'; c.stroke();
        }

        function setLineDash(c, isDashed) { if (isDashed) c.setLineDash([10, 5]); else c.setLineDash([]); }

        function drawCurvedArrow(c, obj, isPreview = false) {
            const p1 = obj.p1, p2 = obj.p2;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) return;

            let h = Math.max(1, Math.min(Math.abs(obj.curvatureFactor), d / 2));
            const bowOutward = obj.curvatureFactor >= 0;
            
            const r = (d * d) / (8 * h) + (h / 2);
            const k = r - h;
            let nx = -dy / d, ny = dx / d;
            if (!bowOutward) { nx = -nx; ny = -ny; }

            const cx = (p1.x + p2.x) / 2 - k * nx;
            const cy = (p1.y + p2.y) / 2 - k * ny;
            const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
            const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
            const ccw = bowOutward ? true : false;

            c.beginPath(); c.arc(cx, cy, r, startAngle, endAngle, ccw);
            c.strokeStyle = obj.color; c.lineWidth = obj.lineWidth || 4; 
            setLineDash(c, obj.pathType.includes('dashed')); c.stroke(); setLineDash(c, false);
            
            if (!isPreview && !obj.pathType.includes('line')) {
                drawArrowhead(c, p2.x, p2.y, endAngle + (ccw ? -Math.PI / 2 : Math.PI / 2), obj.color, obj.lineWidth || 4);
            }
        }
        
        function drawCircleTailArrow(c, obj, isPreview = false) {
            const p1 = obj.p1, p2 = obj.p2;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) return;

            let factor = obj.curvatureFactor !== undefined ? obj.curvatureFactor : 50;
            let h = Math.max(1, Math.min(Math.abs(factor), d / 2));
            const bowOutward = factor >= 0;
            
            const r = (d * d) / (8 * h) + (h / 2);
            const k = r - h;
            let nx = -dy / d, ny = dx / d;
            if (!bowOutward) { nx = -nx; ny = -ny; }

            const cx = (p1.x + p2.x) / 2 - k * nx;
            const cy = (p1.y + p2.y) / 2 - k * ny;
            const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
            const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
            const ccw = bowOutward ? true : false;

            const circleRadius = 3 + (obj.lineWidth || 4) * 0.4; 

            c.beginPath(); 
            c.arc(cx, cy, r, startAngle, endAngle, ccw);
            c.strokeStyle = isPreview ? '#999' : obj.color; 
            c.lineWidth = obj.lineWidth || 4; 
            setLineDash(c, true); c.stroke(); setLineDash(c, false);

            c.beginPath(); c.arc(p1.x, p1.y, circleRadius, 0, Math.PI * 2);
            c.fillStyle = obj.fillColor || '#ffffff'; c.fill(); c.stroke();

            if (!isPreview && !obj.pathType.includes('line')) {
                drawArrowhead(c, p2.x, p2.y, endAngle + (ccw ? -Math.PI / 2 : Math.PI / 2), obj.color, obj.lineWidth || 4);
            }
        }

        function drawFreehandArrow(c, obj, isPreview = false) {
            if (!obj.points || obj.points.length < 2) return;

            c.beginPath();
            c.moveTo(obj.points[0].x, obj.points[0].y);
            for (let i = 1; i < obj.points.length; i++) { c.lineTo(obj.points[i].x, obj.points[i].y); }

            c.strokeStyle = isPreview ? '#999' : obj.color;
            c.lineWidth = obj.lineWidth || 4; c.lineJoin = 'round'; 
            
            setLineDash(c, obj.pathType.includes('dashed')); c.stroke(); setLineDash(c, false);
            c.lineJoin = 'miter';

            if (!isPreview && !obj.pathType.includes('line')) {
                let endPt = obj.points[obj.points.length - 1];
                let prevPt = obj.points[obj.points.length - 2];
                const angle = Math.atan2(endPt.y - prevPt.y, endPt.x - prevPt.x);
                drawArrowhead(c, endPt.x, endPt.y, angle, obj.color, obj.lineWidth || 4);
            }
        }

        function drawRoundedOrthogonalArrow(c, obj, isPreview = false) {
            if (!obj.points || obj.points.length < 2) return;

            c.beginPath(); c.moveTo(obj.points[0].x, obj.points[0].y);

            let maxRadius = 20;
            if (obj.points.length > 2) {
                for (let i = 1; i < obj.points.length - 1; i++) {
                    let p0 = obj.points[i-1], p1 = obj.points[i], p2 = obj.points[i+1];
                    let d1 = Math.hypot(p1.x - p0.x, p1.y - p0.y), d2 = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    let radius = Math.min(maxRadius, d1 / 2, d2 / 2);
                    c.arcTo(p1.x, p1.y, p2.x, p2.y, radius);
                }
            }
