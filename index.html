<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad System Dynamics - Text Move & Limited Undo</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #board-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .canvas-layer { position: absolute; top: 0; left: 0; display: block; touch-action: none; }
        #board { background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 1; }
        #preview-canvas { z-index: 2; pointer-events: none; } 
        
        #toolbar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; z-index: 10; width: 95%; max-width: 1350px; }
        .tool-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ccc; padding-right: 8px; margin-right: 2px; }
        .tool-group:last-child { border-right: none; margin-right: 0; padding-right: 0; }
        
        button { padding: 6px 12px; border: none; border-radius: 15px; background: #e0e0e0; font-size: 14px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        button.active { background: #007aff; color: white; }
        button.danger { background: #ff3b30; color: white; }
        button.action-btn { background: #ff9500; color: white; }
        
        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
        .color-btn.active { border-color: #333; transform: scale(1.1); }
        
        .size-check { display: flex; align-items: center; gap: 3px; cursor: pointer; background: #f5f5f5; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
        .size-check:hover { background: #e0e0e0; }
        .size-check input[type="radio"] { cursor: pointer; margin: 0; }

        .shape-control-group { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        #curvature-control { display: none; } 
        #curvature-slider { width: 100px; }
        #double-edge-control { display: none; } 
        #double-edge-check { cursor: pointer; }
        #text-size-control { display: none; }
        #text-size-input { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 5px; padding: 2px 4px; font-size: 14px; outline: none; }
        #text-size-input:focus { border-color: #007aff; }
        
        /* สไตล์สำหรับกล่องข้อความที่ลากได้ */
        .movable-text-input {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed #007aff;
            border-radius: 8px;
            outline: none;
            padding: 4px 10px;
            z-index: 100;
            font-family: sans-serif;
            text-align: center;
            min-width: 150px;
            cursor: move; /* เปลี่ยน cursor ให้รู้ว่าลากได้ */
            touch-action: none; /* ป้องกัน browser handling */
        }
    </style>
</head>
<body>
    <div id="board-container">
        <canvas id="board" class="canvas-layer"></canvas>
        <canvas id="preview-canvas" class="canvas-layer"></canvas> 
    </div>

    <div id="toolbar">
        <div class="tool-group">
            <button id="btn-pen" class="active tool-btn" onclick="setTool('pen')">✍️ เส้น</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-text" class="tool-btn" onclick="setTool('text')">🔤 พิมพ์</button>
                <div id="text-size-control" class="shape-control-group">
                    <label style="cursor: default;">ขนาด:</label>
                    <input type="number" id="text-size-input" min="10" max="150" value="24" oninput="setTextSize(this.value)"> px
                </div>
            </div>
            <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')">🧹 ลบ</button>
        </div>
        <div class="tool-group">
            <button id="btn-rect" class="tool-btn" onclick="setTool('rect')">🟩 กล่อง</button>
            <button id="btn-cloud" class="tool-btn" onclick="setTool('cloud')">☁️ เมฆ</button>
            <button id="btn-valve-h" class="tool-btn" onclick="setTool('valve-h')">⏳ วาล์วนอน</button>
            <button id="btn-valve-v" class="tool-btn" onclick="setTool('valve-v')">⌛ วาล์วตั้ง</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-circle" class="tool-btn" onclick="setTool('circle')">⭕ วงกลม</button>
                <div id="double-edge-control" class="shape-control-group">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 3px;">
                        <input type="checkbox" id="double-edge-check" onchange="toggleDoubleEdge()"> ขอบคู่
                    </label>
                </div>
            </div>
        </div>
        <div class="tool-group">
            <button id="btn-a-arrow-s" class="tool-btn" onclick="setTool('angled-arrow-solid')">⤴ ทึบ</button>
            <button id="btn-a-arrow-d" class="tool-btn" onclick="setTool('angled-arrow-dashed')">⤴ ประ</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-c-arrow-d" class="tool-btn" onclick="setTool('curved-arrow-dashed')">弧 ประโค้ง</button>
                <div id="curvature-control" class="shape-control-group">
                    <label style="cursor: default;">โค้ง:</label>
                    <input type="range" id="curvature-slider" min="-150" max="150" value="50" oninput="setCurvature(this.value)">
                </div>
            </div>
        </div>
        
        <div class="tool-group size-picker">
            <label class="size-check"><input type="radio" name="penSize" value="2" onchange="setSize(2)"> เล็ก</label>
            <label class="size-check"><input type="radio" name="penSize" value="4" checked onchange="setSize(4)"> กลาง</label>
            <label class="size-check"><input type="radio" name="penSize" value="12" onchange="setSize(12)"> ใหญ่</label>
        </div>

        <div class="tool-group color-picker">
            <button class="color-btn active" style="background-color: #000000;" onclick="setColor('#000000', this)"></button>
            <button class="color-btn" style="background-color: #FF3B30;" onclick="setColor('#FF3B30', this)"></button>
            <button class="color-btn" style="background-color: #34C759;" onclick="setColor('#34C759', this)"></button>
            <button class="color-btn" style="background-color: #007AFF;" onclick="setColor('#007AFF', this)"></button>
        </div>

        <div class="tool-group">
            <button class="action-btn" onclick="resetView()" style="margin-right: 5px;">🔍 คืนมุมมอง</button>
            <button class="action-btn" onclick="undo()" style="margin-right: 5px;">↩️ ย้อน</button>
            <button class="action-btn" onclick="saveImage()" style="margin-right: 5px;">💾 บันทึก</button>
            <button class="action-btn" onclick="shareImage()" style="margin-right: 5px;">📲 แชร์</button>
            <button class="danger" onclick="clearBoard()">🗑️ ล้าง</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('preview-canvas');
        const pCtx = previewCanvas.getContext('2d');
        const container = document.getElementById('board-container');
        
        const curvatureControl = document.getElementById('curvature-control');
        const doubleEdgeControl = document.getElementById('double-edge-control');
        const doubleEdgeCheck = document.getElementById('double-edge-check');
        const textSizeControl = document.getElementById('text-size-control');
        const textSizeInput = document.getElementById('text-size-input'); 
        
        // --- สถานะของแอป ---
        let currentTool = 'pen';
        let currentColor = '#000000';
        let currentBaseSize = 4;
        let currentCurvatureFactor = 50; 
        let currentTextSize = 24;
        let isDoubleCircle = false; 
        
        // --- สถานะการวาด ---
        let isDrawing = false;
        let isDraggingArrow = false; 
        let arrowStartPoint = null; 
        let sceneObjects = []; 
        let currentPath = null;
        let activeTextInput = null; 

        // --- สถานะการลากข้อความ ---
        let isDraggingText = false;
        let textDragOffset = { x: 0, y: 0 };

        // --- ระบบกล้อง (Pan & Zoom) ---
        let camera = { x: 0, y: 0, scale: 1 };
        let activeTouchPointers = new Map();
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let startCam = { x: 0, y: 0 };
        let initialPinchDist = 0;
        let initialScale = 1;
        let pinchCenter = { x: 0, y: 0 };

        // --- ระบบ Alignment Guides ---
        let activeGuides = [];
        let guideTimeout = null;

        const SHAPE = { RECT_W: 160, RECT_H: 80, CLOUD_W: 70, CLOUD_H: 45, VALVE_W: 60, VALVE_H: 40 };

        function applyCamera(context) {
            const dpr = window.devicePixelRatio || 1;
            context.setTransform(dpr * camera.scale, 0, 0, dpr * camera.scale, camera.x * dpr, camera.y * dpr);
        }

        function resetView() {
            camera = { x: 0, y: 0, scale: 1 };
            renderScene();
        }

        function getWorldPos(screenX, screenY) {
            return {
                x: (screenX - camera.x) / camera.scale,
                y: (screenY - camera.y) / camera.scale
            };
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            [canvas, previewCanvas].forEach(c => {
                c.width = w * dpr;
                c.height = h * dpr;
                c.style.width = w + 'px';
                c.style.height = h + 'px';
            });
            renderScene();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function setTool(tool) {
            if (activeTextInput) finalizeTextInput();

            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            const btnId = `btn-${tool.replace(/-solid|-dashed/g, '').replace(/straight/g, 's').replace(/angled/g, 'a').replace(/curved/g, 'c')}`;
            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('active');

            curvatureControl.style.display = currentTool.includes('curved') ? 'flex' : 'none';
            doubleEdgeControl.style.display = currentTool === 'circle' ? 'flex' : 'none';
            textSizeControl.style.display = currentTool === 'text' ? 'flex' : 'none';
        }

        function setColor(color, btnElement) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            if(activeTextInput) activeTextInput.style.color = currentColor;
            if(currentTool === 'eraser') setTool('pen');
        }

        function setSize(size) { currentBaseSize = parseInt(size); }
        function setCurvature(value) { currentCurvatureFactor = parseInt(value); } 
        function setTextSize(value) { 
            const parsedValue = parseInt(value);
            if (!isNaN(parsedValue) && parsedValue > 0) {
                currentTextSize = parsedValue; 
                if(activeTextInput) {
                    activeTextInput.style.fontSize = (parsedValue * camera.scale) + 'px';
                    activeTextInput.setAttribute('data-size', parsedValue);
                }
            }
        }
        function toggleDoubleEdge() { isDoubleCircle = doubleEdgeCheck.checked; } 
        
        function clearBoard() { sceneObjects = []; resetView(); }

        // --- เพิ่มฟังก์ชันจัดการ Undo Limit (2 ชั้น) ---
        function pushToScene(newObj) {
            sceneObjects.push(newObj);
            // จำกัดจำนวน object หรือกลุ่ม object ไว้ที่นี่หากต้องการ undo แบบ snapshot
            // แต่เนื่องจากโค้ดเดิมใช้ sceneObjects แบบ list ของ action 
            // การจำกัด undo 2 ชั้น หมายถึงให้ถอยหลังได้ 2 action
            // ในที่นี้จะเก็บประวัติ 2 ลำดับสุดท้าย? 
            // "อยากให้ปุ่ม undo ได้ไม่เกิน 2 ชั้นความลึกย้อนหลัง"
            // ปกติ sceneObjects ยาวเท่าไหร่ก็ได้ แต่เราจะให้ undo ถอนได้แค่ 2 ครั้ง
            // หรือหมายถึงเก็บ state ทั้งหมดแค่ 2 state? 
            // เอาเป็นว่า sceneObjects เป็นตัววาด ถอน push ไปก็คือ undo
        }

        // สถานะนับการ undo ว่าทำไปกี่ครั้งแล้ว
        let undoCount = 0;
        let undoLimit = 2; // จำนวนชั้นที่อนุญาตให้ undo ได้

        function undo() {
            if (activeTextInput) finalizeTextInput();
            
            // เช็คว่าถอนไปแล้วกี่ครั้ง
            if (sceneObjects.length > 0 && undoCount < undoLimit) {
                sceneObjects.pop(); 
                undoCount++; // เพิ่มจำนวนการถอน
                renderScene();      
            } else if (undoCount >= undoLimit) {
                console.log("ถึงขีดจำกัดการ Undo (2 ครั้ง)");
                // แจ้งผู้ใช้เบาๆ (ถ้าต้องการ)
            }
        }

        // เมื่อมีการวาดหรือสร้างอะไรใหม่ ให้รีเซ็ตการนับการ undo
        function resetUndoCounter() {
            undoCount = 0;
        }

        function getCanvasWithWhiteBackground() {
            const tempCanvas = document.createElement('canvas');
            const dpr = window.devicePixelRatio || 1;
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.drawImage(canvas, 0, 0);
            return tempCanvas;
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'sd-diagram.png';
            link.href = getCanvasWithWhiteBackground().toDataURL('image/png');
            link.click();
        }

        async function shareImage() {
            getCanvasWithWhiteBackground().toBlob(async (blob) => {
                if (navigator.share) {
                    const file = new File([blob], 'sd-diagram.png', { type: 'image/png' });
                    try { await navigator.share({ files: [file], title: 'System Dynamics Diagram' }); } 
                    catch (error) { console.log('ยกเลิกการแชร์:', error); }
                } else { alert('เบราว์เซอร์ไม่รองรับการแชร์ไฟล์ภาพ กรุณาใช้ปุ่มบันทึกแทน'); }
            }, 'image/png');
        }

        function getShapeBox(obj) {
            let box = null;
            if (obj.type === 'rect') box = { left: obj.x, right: obj.x + obj.w, top: obj.y, bottom: obj.y + obj.h, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            else if (obj.type === 'cloud') box = { left: obj.x, right: obj.x + obj.w, top: obj.y, bottom: obj.y + obj.h, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            else if (obj.type === 'valve-h') box = { left: obj.x, right: obj.x + obj.w, top: obj.y, bottom: obj.y + obj.h, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            else if (obj.type === 'valve-v') box = { left: obj.x, right: obj.x + obj.w, top: obj.y, bottom: obj.y + obj.h, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            else if (obj.type === 'circle') box = { left: obj.x - obj.radius, right: obj.x + obj.radius, top: obj.y - obj.radius, bottom: obj.y + obj.radius, cx: obj.x, cy: obj.y };
            
            if (box) box.isValve = (obj.type === 'valve-h' || obj.type === 'valve-v');
            return box;
        }

        function getAlignedCenter(cx, cy) {
            let snappedCx = cx;
            let snappedCy = cy;
            let foundV = false;
            let foundH = false;
            const threshold = 20; 
            let guides = [];

            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (!box) continue;

                if (!foundV && Math.abs(cx - box.cx) < threshold) {
                    snappedCx = box.cx;
                    guides.push({ type: 'v', val: box.cx });
                    foundV = true;
                }
                if (!foundH && Math.abs(cy - box.cy) < threshold) {
                    snappedCy = box.cy;
                    guides.push({ type: 'h', val: box.cy });
                    foundH = true;
                }
            }
            return { x: snappedCx, y: snappedCy, guides: guides };
        }

        function isPointInOrNearBox(px, py, box) {
            const pad = 30; 
            return px >= box.left - pad && px <= box.right + pad && py >= box.top - pad && py <= box.bottom + pad;
        }

        function calculateSnapPoints(p1, p2) {
            let srcBox = null, dstBox = null;
            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (box) {
                    if (!srcBox && isPointInOrNearBox(p1.x, p1.y, box)) srcBox = box;
                    if (!dstBox && isPointInOrNearBox(p2.x, p2.y, box) && box !== srcBox) dstBox = box;
                }
            }

            if (srcBox && dstBox) {
                const dx = dstBox.cx - srcBox.cx;
                const dy = dstBox.cy - srcBox.cy;
                let p1x, p1y, p2x, p2y;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.right; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.left; p2y = dstBox.cy;
                    } else {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.left; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.right; p2y = dstBox.cy;
                    }
                } else {
                    if (dy > 0) {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.bottom;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.top;
                    } else {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.top;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.bottom;
                    }
                }
                return { p1: {x: p1x, y: p1y}, p2: {x: p2x, y: p2y} };
            }
            return { p1, p2 };
        }

        function orthogonalize(points, threshold = 30) {
            if (!points || points.length < 2) return points;
            
            let result = [{ x: points[0].x, y: points[0].y }];
            let current = { x: points[0].x, y: points[0].y };
            let movingAxis = null; 

            for (let i = 1; i < points.length; i++) {
                let pt = points[i];
                let dx = pt.x - current.x;
                let dy = pt.y - current.y;

                if (!movingAxis) {
                    if (Math.abs(dx) >= Math.abs(dy) && Math.abs(dx) > threshold) {
                        movingAxis = 'x';
                        current.x = pt.x;
                        result.push({ x: current.x, y: current.y });
                    } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > threshold) {
                        movingAxis = 'y';
                        current.y = pt.y;
                        result.push({ x: current.x, y: current.y });
                    }
                } else {
                    if (movingAxis === 'x') {
                        current.x = pt.x; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        
                        if (Math.abs(pt.y - current.y) > threshold) {
                            movingAxis = 'y';
                            current.y = pt.y;
                            result.push({ x: current.x, y: current.y });
                        }
                    } else {
                        current.y = pt.y; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        
                        if (Math.abs(pt.x - current.x) > threshold) {
                            movingAxis = 'x';
                            current.x = pt.x;
                            result.push({ x: current.x, y: current.y });
                        }
                    }
                }
            }
            
            if (result.length > 1) {
                let lastRaw = points[points.length - 1];
                if (movingAxis === 'x') {
                    result[result.length - 1] = { x: lastRaw.x, y: current.y };
                } else if (movingAxis === 'y') {
                    result[result.length - 1] = { x: current.x, y: lastRaw.y };
                }
            }
            
            let cleanResult = [result[0]];
            for (let i = 1; i < result.length; i++) {
                let prev = cleanResult[cleanResult.length - 1];
                let curr = result[i];
                if (Math.abs(curr.x - prev.x) > 1 || Math.abs(curr.y - prev.y) > 1) {
                    cleanResult.push(curr);
                }
            }

            if (cleanResult.length === 1) {
                cleanResult.push({ x: points[points.length-1].x, y: points[points.length-1].y });
            }
            
            return cleanResult;
        }

        // --- ระบบวาดเส้นและรูปทรง ---

        function drawSmoothPath(c, pathData) {
            if (!pathData.points || pathData.points.length === 0) return;
            c.beginPath();
            c.lineCap = 'round';
            c.lineJoin = 'round';
            c.globalCompositeOperation = pathData.type === 'eraser' ? 'destination-out' : 'source-over';
            c.strokeStyle = pathData.type === 'eraser' ? 'rgba(0,0,0,1)' : (pathData.color || '#000');
            c.lineWidth = pathData.type === 'eraser' ? pathData.baseSize * 2.5 : pathData.baseSize;

            c.moveTo(pathData.points[0].x, pathData.points[0].y);
            
            if (pathData.points.length === 1) {
                c.lineTo(pathData.points[0].x + 0.1, pathData.points[0].y);
            } else {
                for (let i = 1; i < pathData.points.length - 1; i++) {
                    let midX = (pathData.points[i].x + pathData.points[i+1].x) / 2;
                    let midY = (pathData.points[i].y + pathData.points[i+1].y) / 2;
                    c.quadraticCurveTo(pathData.points[i].x, pathData.points[i].y, midX, midY);
                }
                let last = pathData.points[pathData.points.length - 1];
                c.lineTo(last.x, last.y);
            }
            c.stroke();
            c.globalCompositeOperation = 'source-over';
        }

        function drawArrowhead(c, x, y, angle, color) {
            const size = 14; 
            c.save(); c.translate(x, y); c.rotate(angle);
            c.beginPath(); c.moveTo(0, 0); c.lineTo(-size, -size * 0.5); c.lineTo(-size * 0.8, 0); c.lineTo(-size, size * 0.5); c.closePath();
            c.fillStyle = color; c.fill(); c.restore();
        }

        function drawCloudShape(c, x, y, w, h, color) {
            c.beginPath(); c.moveTo(x + w * 0.2, y + h * 0.8);
            c.bezierCurveTo(x - w * 0.1, y + h * 0.8, x - w * 0.1, y + h * 0.3, x + w * 0.2, y + h * 0.3);
            c.bezierCurveTo(x + w * 0.2, y - h * 0.1, x + w * 0.7, y - h * 0.1, x + w * 0.7, y + h * 0.2);
            c.bezierCurveTo(x + w * 1.1, y + h * 0.2, x + w * 1.1, y + h * 0.8, x + w * 0.8, y + h * 0.8);
            c.closePath();
            c.strokeStyle = color; c.lineWidth = 4; c.fillStyle = '#ffffff'; c.fill(); c.stroke();
        }

        function drawValveShape(c, obj) {
            c.beginPath();
            if (obj.type === 'valve-h') {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x, obj.y + obj.h); c.closePath();
                c.moveTo(obj.x + obj.w, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            } else {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y); c.closePath();
                c.moveTo(obj.x, obj.y + obj.h); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            }
            c.strokeStyle = obj.color; c.lineWidth = 4; c.stroke();
        }

        function getArrowAngle(p1, p2) { return Math.atan2(p2.y - p1.y, p2.x - p1.x); }
        function setLineDash(c, isDashed) { if (isDashed) c.setLineDash([10, 5]); else c.setLineDash([]); }

        function drawCurvedArrow(c, obj, isPreview = false) {
            const p1 = obj.p1, p2 = obj.p2;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) return;

            let h = Math.max(1, Math.min(Math.abs(obj.curvatureFactor), d / 2));
            const bowOutward = obj.curvatureFactor >= 0;
            
            const r = (d * d) / (8 * h) + (h / 2);
            const k = r - h;
            let nx = -dy / d, ny = dx / d;
            if (!bowOutward) { nx = -nx; ny = -ny; }

            const cx = (p1.x + p2.x) / 2 - k * nx;
            const cy = (p1.y + p2.y) / 2 - k * ny;
            const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
            const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
            const ccw = bowOutward ? true : false;

            c.beginPath(); c.arc(cx, cy, r, startAngle, endAngle, ccw);
            c.strokeStyle = obj.color; c.lineWidth = 4; setLineDash(c, obj.pathType.includes('dashed')); c.stroke(); setLineDash(c, false);
            if (!isPreview) drawArrowhead(c, p2.x, p2.y, endAngle + (ccw ? -Math.PI / 2 : Math.PI / 2), obj.color);
        }

        function drawFreehandArrow(c, obj, isPreview = false) {
            if (!obj.points || obj.points.length < 2) return;

            c.beginPath();
            c.moveTo(obj.points[0].x, obj.points[0].y);
            for (let i = 1; i < obj.points.length; i++) {
                c.lineTo(obj.points[i].x, obj.points[i].y);
            }

            c.strokeStyle = isPreview ? '#999' : obj.color;
            c.lineWidth = 4;
            c.lineJoin = 'round'; 
            
            setLineDash(c, obj.pathType.includes('dashed'));
            c.stroke();
            setLineDash(c, false);
            c.lineJoin = 'miter';

            if (!isPreview) {
                let endPt = obj.points[obj.points.length - 1];
                let prevPt = obj.points[obj.points.length - 2];
                const angle = Math.atan2(endPt.y - prevPt.y, endPt.x - prevPt.x);
                drawArrowhead(c, endPt.x, endPt.y, angle, obj.color);
            }
        }

        function drawPreviewArrow(p1, p2) {
            pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            applyCamera(pCtx);
            
            let snapped = { p1, p2 };
            if (currentTool !== 'curved-arrow-dashed') {
                snapped = calculateSnapPoints(p1, p2); 
            }

            const obj = { p1: snapped.p1, p2: snapped.p2, color: '#999', pathType: currentTool, curvatureFactor: currentCurvatureFactor }; 
            // ลบ drawStraightArrow ออก
            if (currentTool.includes('curved')) drawCurvedArrow(pCtx, obj, true);
        }

        function renderScene() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyCamera(ctx);
            
            sceneObjects.forEach(obj => {
                if (obj.type === 'pen' || obj.type === 'eraser') {
                    drawSmoothPath(ctx, obj);
                } else if (obj.type === 'rect') {
                    ctx.beginPath(); ctx.rect(obj.x, obj.y, obj.w, obj.h);
                    ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.strokeStyle = obj.color; ctx.lineWidth = 4; ctx.stroke();
                } else if (obj.type === 'cloud') {
                    drawCloudShape(ctx, obj.x, obj.y, obj.w, obj.h, obj.color);
                } else if (obj.type === 'valve-h' || obj.type === 'valve-v') {
                    drawValveShape(ctx, obj);
                } else if (obj.type === 'circle') {
                    ctx.lineWidth = 4; ctx.strokeStyle = obj.color; ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2); ctx.fill();
                    if (obj.isDouble) { 
                        ctx.stroke(); ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius - 8, 0, Math.PI * 2); 
                    }
                    ctx.stroke();
                } else if (obj.type === 'arrow') {
                    if (obj.points) {
                        drawFreehandArrow(ctx, obj, false);
                    } else if (obj.p1 && obj.p2) {
                        // ลบ straight arrow ออก
                        if (obj.pathType.includes('curved')) drawCurvedArrow(ctx, obj);
                    }
                } else if (obj.type === 'text') {
                    ctx.fillStyle = obj.color;
                    ctx.font = `${obj.fontSize}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obj.text, obj.x, obj.y);
                }
            });

            if (activeGuides.length > 0) {
                ctx.save();
                ctx.strokeStyle = '#34C759'; 
                ctx.lineWidth = 2 / camera.scale; 
                ctx.setLineDash([10 / camera.scale, 10 / camera.scale]);
                
                activeGuides.forEach(g => {
                    ctx.beginPath();
                    if (g.type === 'v') {
                        ctx.moveTo(g.val, -50000); 
                        ctx.lineTo(g.val, 50000);
                    } else {
                        ctx.moveTo(-50000, g.val); 
                        ctx.lineTo(50000, g.val);
                    }
                    ctx.stroke();
                });
                ctx.restore();
            }
        }

        function finalizeTextInput() {
            if (activeTextInput) {
                if (activeTextInput.value.trim() !== '') {
                    const tx = parseFloat(activeTextInput.getAttribute('data-x'));
                    const ty = parseFloat(activeTextInput.getAttribute('data-y'));
                    
                    sceneObjects.push({ 
                        type: 'text', 
                        text: activeTextInput.value, 
                        x: tx, 
                        y: ty, 
                        color: activeTextInput.style.color, 
                        fontSize: parseInt(activeTextInput.getAttribute('data-size')) 
                    });
                    resetUndoCounter(); // มีการสร้างใหม่ รีเซ็ต undo
                    renderScene();
                }
                activeTextInput.remove();
                activeTextInput = null;
                isDraggingText = false;
            }
        }

        // ฟังก์ชันสร้างกล่องข้อความ
        function createTextInput(wx, wy, clientX, clientY) {
            activeTextInput = document.createElement('input');
            activeTextInput.type = 'text';
            activeTextInput.placeholder = 'พิมพ์...';
            activeTextInput.className = 'movable-text-input';
            
            // ตำแหน่งบนจอ
            activeTextInput.style.left = clientX + 'px';
            activeTextInput.style.top = clientY + 'px';
            activeTextInput.style.fontSize = (currentTextSize * camera.scale) + 'px';
            activeTextInput.style.color = currentColor;
            
            activeTextInput.setAttribute('data-x', wx);
            activeTextInput.setAttribute('data-y', wy);
            activeTextInput.setAttribute('data-size', currentTextSize);

            container.appendChild(activeTextInput);
            setTimeout(() => activeTextInput.focus(), 50);

            // อีเวนต์ลากขยับกล่อง
            activeTextInput.addEventListener('pointerdown', (e) => {
                isDraggingText = true;
                // คำนวณจุดที่จิ้มเทียบกับตำแหน่งของกล่อง (เพื่อไม่ให้กล่องกระตุกไปที่ตรงกลาง)
                const rect = activeTextInput.getBoundingClientRect();
                textDragOffset.x = e.clientX - (rect.left + rect.width / 2);
                textDragOffset.y = e.clientY - (rect.top + rect.height / 2);
                
                // ไม่ให้ไป trigger การวาดที่ canvas
                e.stopPropagation();
            });

            // เมื่อพิมพ์เสร็จ
            activeTextInput.addEventListener('blur', finalizeTextInput);
            activeTextInput.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') { ev.preventDefault(); activeTextInput.blur(); }
            });
        }

        // --- ระบบรับข้อมูล Pointer Events ---
        container.addEventListener('pointermove', (e) => {
            // จัดการลากข้อความในระดับ container
            if (isDraggingText && activeTextInput) {
                e.preventDefault();
                
                // คำนวณตำแหน่งใหม่บนจอ
                const newClientX = e.clientX - textDragOffset.x;
                const newClientY = e.clientY - textDragOffset.y;
                
                activeTextInput.style.left = newClientX + 'px';
                activeTextInput.style.top = newClientY + 'px';
                
                // อัปเดตพิกัด world
                const wPos = getWorldPos(newClientX, newClientY);
                activeTextInput.setAttribute('data-x', wPos.x);
                activeTextInput.setAttribute('data-y', wPos.y);
            }
        });

        container.addEventListener('pointerup', (e) => {
            if (isDraggingText) {
                isDraggingText = false;
                // หลังจากลากเสร็จ ให้ focus คืน
                if (activeTextInput) activeTextInput.focus();
            }
        });

        canvas.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') {
                if (activeTextInput && !isDraggingText) finalizeTextInput();
                activeTouchPointers.set(e.pointerId, e);
                
                if (activeTouchPointers.size === 1) {
                    isPanning = true;
                    startPan = { x: e.clientX, y: e.clientY };
                    startCam = { x: camera.x, y: camera.y };
                } else if (activeTouchPointers.size === 2) {
                    isPanning = false; 
                    let pts = Array.from(activeTouchPointers.values());
                    initialPinchDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    initialScale = camera.scale;
                    pinchCenter = { x: (pts[0].clientX + pts[1].clientX) / 2, y: (pts[0].clientY + pts[1].clientY) / 2 };
                    startCam = { x: camera.x, y: camera.y };
                }
                return; 
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;

            const worldPos = getWorldPos(e.clientX, e.clientY);
            const wx = worldPos.x;
            const wy = worldPos.y;
            
            if (activeTextInput && !isDraggingText) {
                finalizeTextInput();
                if (currentTool !== 'text') return; 
            }

            if (currentTool === 'text') {
                createTextInput(wx, wy, e.clientX, e.clientY);
            } else if (currentTool === 'pen' || currentTool === 'eraser') {
                isDrawing = true; 
                currentPath = { type: currentTool, color: currentColor, baseSize: currentBaseSize, points: [{x: wx, y: wy}] };
                if (currentTool === 'eraser') {
                    sceneObjects.push(currentPath);
                    resetUndoCounter();
                }
            } else if (currentTool.includes('arrow')) {
                isDraggingArrow = true; arrowStartPoint = { x: wx, y: wy };
                
                if (currentTool.includes('angled-arrow')) {
                    currentPath = {
                        type: 'arrow',
                        pathType: currentTool,
                        color: currentColor,
                        points: [arrowStartPoint]
                    };
                }
            } else if (['rect', 'cloud', 'valve-h', 'valve-v', 'circle'].includes(currentTool)) {
                let center = getAlignedCenter(wx, wy);
                activeGuides = center.guides;
                if (guideTimeout) clearTimeout(guideTimeout);
                guideTimeout = setTimeout(() => { activeGuides = []; renderScene(); }, 1000);

                if (currentTool === 'rect') {
                    sceneObjects.push({ type: 'rect', color: currentColor, x: center.x - SHAPE.RECT_W/2, y: center.y - SHAPE.RECT_H/2, w: SHAPE.RECT_W, h: SHAPE.RECT_H }); 
                } else if (currentTool === 'cloud') {
                    sceneObjects.push({ type: 'cloud', color: currentColor, x: center.x - SHAPE.CLOUD_W/2, y: center.y - SHAPE.CLOUD_H/2, w: SHAPE.CLOUD_W, h: SHAPE.CLOUD_H }); 
                } else if (currentTool === 'valve-h') {
                    sceneObjects.push({ type: 'valve-h', color: currentColor, x: center.x - SHAPE.VALVE_W/2, y: center.y - SHAPE.VALVE_H/2, w: SHAPE.VALVE_W, h: SHAPE.VALVE_H }); 
                } else if (currentTool === 'valve-v') {
                    sceneObjects.push({ type: 'valve-v', color: currentColor, x: center.x - SHAPE.VALVE_H/2, y: center.y - SHAPE.VALVE_W/2, w: SHAPE.VALVE_H, h: SHAPE.VALVE_W }); 
                } else if (currentTool === 'circle') {
                    sceneObjects.push({ type: 'circle', color: currentColor, x: center.x, y: center.y, radius: 50, isDouble: isDoubleCircle }); 
                }
                resetUndoCounter();
                renderScene();
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            // ถ้าย้ายกล่องข้อความอยู่ ให้ container จัดการ
            if (isDraggingText) return;

            e.preventDefault();

            if (e.pointerType === 'touch') {
                if (!activeTouchPointers.has(e.pointerId)) return;
                activeTouchPointers.set(e.pointerId, e);
                
                if (activeTouchPointers.size === 1 && isPanning) {
                    const dx = e.clientX - startPan.x;
                    const dy = e.clientY - startPan.y;
                    camera.x = startCam.x + dx;
                    camera.y = startCam.y + dy;
                    renderScene();
                } else if (activeTouchPointers.size === 2) {
                    let pts = Array.from(activeTouchPointers.values());
                    let currentDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    let currentCenter = { x: (pts[0].clientX + pts[1].clientX) / 2, y: (pts[0].clientY + pts[1].clientY) / 2 };
                    
                    let scaleFactor = currentDist / initialPinchDist;
                    camera.scale = Math.min(Math.max(initialScale * scaleFactor, 0.2), 5); 
                    
                    camera.x = currentCenter.x - ((pinchCenter.x - startCam.x) / initialScale) * camera.scale;
                    camera.y = currentCenter.y - ((pinchCenter.y - startCam.y) / initialScale) * camera.scale;
                    renderScene();
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;
            
            const worldPos = getWorldPos(e.clientX, e.clientY);

            if (isDrawing && currentPath && (currentTool === 'pen' || currentTool === 'eraser')) {
                const events = (e.getCoalescedEvents && e.getCoalescedEvents().length > 0) ? e.getCoalescedEvents() : [e];
                for (let ev of events) {
                    currentPath.points.push(getWorldPos(ev.clientX || e.clientX, ev.clientY || e.clientY));
                }
                
                if (currentTool === 'pen') {
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                    applyCamera(pCtx);
                    drawSmoothPath(pCtx, currentPath);
                } else if (currentTool === 'eraser') {
                    renderScene();
                }

            } else if (isDraggingArrow) {
                if (currentTool.includes('angled-arrow') && currentPath) {
                    currentPath.points.push(worldPos);
                    
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                    applyCamera(pCtx);
                    
                    let previewObj = { ...currentPath, points: orthogonalize(currentPath.points, 25) };
                    drawFreehandArrow(pCtx, previewObj, true); 
                } else {
                    drawPreviewArrow(arrowStartPoint, worldPos);
                }
            }
        });

        function handlePointerEnd(e) {
            // จัดการกรณี touch ที่แคนวาส
            if (e.pointerType === 'touch') {
                activeTouchPointers.delete(e.pointerId);
                if (activeTouchPointers.size < 2) {
                    if (activeTouchPointers.size === 1) {
                        let remaining = Array.from(activeTouchPointers.values())[0];
                        startPan = { x: remaining.clientX, y: remaining.clientY };
                        startCam = { x: camera.x, y: camera.y };
                        isPanning = true;
                    } else {
                        isPanning = false;
                    }
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;

            if (isDrawing && (currentTool === 'pen' || currentTool === 'eraser')) {
                if (currentTool === 'pen' && currentPath) {
                    sceneObjects.push(currentPath);
                    resetUndoCounter();
                }
                pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                renderScene();
            } else if (isDraggingArrow) {
                const worldPos = getWorldPos(e.clientX, e.clientY);

                if (currentTool.includes('angled-arrow') && currentPath) {
                    currentPath.points = orthogonalize(currentPath.points, 25);
                    if (currentPath.points.length > 1) {
                        sceneObjects.push(currentPath);
                        resetUndoCounter();
                    }
                } else {
                    let snapped = { p1: arrowStartPoint, p2: worldPos };
                    if (currentTool !== 'curved-arrow-dashed') {
                        snapped = calculateSnapPoints(arrowStartPoint, worldPos); 
                    }
                    sceneObjects.push({ 
                        type: 'arrow', pathType: currentTool, color: currentColor, 
                        p1: snapped.p1, p2: snapped.p2, curvatureFactor: currentCurvatureFactor 
                    });
                    resetUndoCounter();
                }
                
                pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                renderScene();
            }
            isDrawing = false; isDraggingArrow = false; currentPath = null; arrowStartPoint = null;
        }

        window.addEventListener('pointerup', handlePointerEnd);
        window.addEventListener('pointercancel', handlePointerEnd);

        [canvas, previewCanvas].forEach(c => {
            c.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
            c.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
        });
    </script>
</body>
</html>
