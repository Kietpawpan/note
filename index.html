                const rect = activeTextInput.getBoundingClientRect();
                textDragOffset.x = e.clientX - (rect.left + rect.width / 2);
                textDragOffset.y = e.clientY - (rect.top + rect.height / 2);
                e.stopPropagation();
            });

            activeTextInput.addEventListener('blur', finalizeTextInput);
        }

        function getHitObject(wx, wy) {
            for (let i = sceneObjects.length - 1; i >= 0; i--) {
                const obj = sceneObjects[i];
                if (obj.type === 'text') {
                    ctx.font = `${obj.isItalic ? 'italic ' : ''}${obj.isBold ? 'bold ' : ''}${obj.fontSize}px sans-serif`;
                    let lines = (obj.isAllCaps ? obj.text.toUpperCase() : obj.text).split('\n');
                    let maxWidth = 0;
                    lines.forEach(line => {
                        maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
                    });
                    let totalHeight = lines.length * (obj.fontSize * 1.2);
                    
                    if (wx >= obj.x - maxWidth / 2 && wx <= obj.x + maxWidth / 2 && wy >= obj.y - totalHeight / 2 && wy <= obj.y + totalHeight / 2) {
                        return { index: i, object: obj };
                    }
                }
            }

            for (let i = sceneObjects.length - 1; i >= 0; i--) {
                const obj = sceneObjects[i];
                if (obj.type === 'text') continue; 

                if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(obj.type)) {
                    let hPad = obj.type === 'short-line-h' ? 15 : 0;
                    if (wx >= obj.x && wx <= obj.x + obj.w && wy >= obj.y - hPad && wy <= obj.y + obj.h + hPad) {
                        return { index: i, object: obj };
                    }
                } else if (obj.type === 'circle') {
                    if (Math.hypot(wx - obj.x, wy - obj.y) <= obj.radius) {
                        return { index: i, object: obj };
                    }
                } else if (['pen', 'arrow', 'eraser'].includes(obj.type)) {
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    if (obj.points) {
                        obj.points.forEach(p => {
                            minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
                            maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
                        });
                    } else if (obj.p1 && obj.p2) {
                        minX = Math.min(obj.p1.x, obj.p2.x); minY = Math.min(obj.p1.y, obj.p2.y);
                        maxX = Math.max(obj.p1.x, obj.p2.x); maxY = Math.max(obj.p1.y, obj.p2.y);
                    }
                    const pad = 15;
                    if (wx >= minX - pad && wx <= maxX + pad && wy >= minY - pad && wy <= maxY + pad) {
                         return { index: i, object: obj };
                    }
                }
            }
            return null;
        }

        container.addEventListener('pointermove', (e) => {
            if (isDraggingText && activeTextInput) {
                e.preventDefault();
                
                const newClientX = e.clientX - textDragOffset.x;
                const newClientY = e.clientY - textDragOffset.y;
                
                activeTextInput.style.left = newClientX + 'px';
                activeTextInput.style.top = newClientY + 'px';
                
                const wPos = getWorldPos(newClientX, newClientY);
                activeTextInput.setAttribute('data-x', wPos.x);
                activeTextInput.setAttribute('data-y', wPos.y);
            }
        });

        container.addEventListener('pointerup', (e) => {
            if (isDraggingText) {
                isDraggingText = false;
                if (activeTextInput) activeTextInput.focus();
            }
        });

        canvas.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') {
                if (activeTextInput && !isDraggingText) finalizeTextInput();
                activeTouchPointers.set(e.pointerId, e);
                
                if (activeTouchPointers.size === 1) {
                    isPanning = true;
                    startPan = { x: e.clientX, y: e.clientY };
                    startCam = { x: camera.x, y: camera.y };
                } else if (activeTouchPointers.size === 2) {
                    isPanning = false; 
                    let pts = Array.from(activeTouchPointers.values());
                    initialPinchDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    initialScale = camera.scale;
                    pinchCenter = { x: (pts[0].clientX + pts[1].clientX) / 2, y: (pts[0].clientY + pts[1].clientY) / 2 };
                    startCam = { x: camera.x, y: camera.y };
                }
                return; 
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;

            const worldPos = getWorldPos(e.clientX, e.clientY);
            const wx = worldPos.x;
            const wy = worldPos.y;
            
            if (activeTextInput && !isDraggingText) {
                finalizeTextInput();
                if (currentTool !== 'text' && currentTool !== 'select') return; 
            }

            if (currentTool === 'select') {
                const hit = getHitObject(wx, wy);
                const now = Date.now();
                
                if (hit && hit.object.type === 'text' && (now - lastClickTime < 400) && lastClickObj === hit.object) {
                    editExistingText(hit.object, hit.index);
                    lastClickTime = 0;
                    lastClickObj = null;
                    return;
                }

                if (hit) {
                    lastClickTime = now;
                    lastClickObj = hit.object;
                    
                    if (multiSelectedObjects.includes(hit.object)) {
                        isDraggingObject = true;
                        dragStartPoint = { x: wx, y: wy };
                        multiSelectedObjects.forEach(o => snapshotOriginalPosition(o));
                    } else {
                        multiSelectedObjects = [];
                        selectedObject = hit.object;
                        sceneObjects.splice(hit.index, 1);
                        sceneObjects.push(selectedObject);
                        
                        document.getElementById('btn-delete-selected').style.display = 'flex';

                        if (['rect', 'cloud', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'circle'].includes(selectedObject.type)) {
                            document.getElementById('fill-gray-check').checked = (selectedObject.fillColor === '#e0e0e0');
                            isFillLightGray = (selectedObject.fillColor === '#e0e0e0');
                        }

                        isDraggingObject = true;
                        dragStartPoint = { x: wx, y: wy };
                        snapshotOriginalPosition(selectedObject);
                    }
                } else {
                    lastClickTime = 0;
                    lastClickObj = null;
                    selectedObject = null;
                    multiSelectedObjects = [];
                    document.getElementById('btn-delete-selected').style.display = 'none';
                    
                    isLassoing = true;
                    lassoPoints = [{x: wx, y: wy}];
                }
                renderScene();
                return;
            }

            if (currentTool === 'text') {
                createTextInput(wx, wy, e.clientX, e.clientY);
            } else if (currentTool === 'pen' || currentTool === 'eraser') {
                isDrawing = true; 
                
                currentPath = { 
                    type: currentTool, 
                    color: currentColor, 
                    baseSize: currentBaseSize, 
                    points: [{x: wx, y: wy}] 
                };
                if (currentTool === 'eraser') {
                    sceneObjects.push(currentPath);
                    resetUndoCounter();
                }
            } else if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'circle', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(currentTool)) {
                let center = getAlignedCenter(wx, wy);
                activeGuides = center.guides;
                if (guideTimeout) clearTimeout(guideTimeout);
                guideTimeout = setTimeout(() => { activeGuides = []; renderScene(); }, 1000);

                if (currentTool === 'rect') {
                    sceneObjects.push({ type: 'rect', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.RECT_W/2, y: center.y - SHAPE.RECT_H/2, w: SHAPE.RECT_W, h: SHAPE.RECT_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'oval') {
                    sceneObjects.push({ type: 'oval', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.OVAL_W/2, y: center.y - SHAPE.OVAL_H/2, w: SHAPE.OVAL_W, h: SHAPE.OVAL_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'diamond') {
                    sceneObjects.push({ type: 'diamond', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.DIAMOND_W/2, y: center.y - SHAPE.DIAMOND_H/2, w: SHAPE.DIAMOND_W, h: SHAPE.DIAMOND_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'parallelogram') {
                    sceneObjects.push({ type: 'parallelogram', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.PARA_W/2, y: center.y - SHAPE.PARA_H/2, w: SHAPE.PARA_W, h: SHAPE.PARA_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'cloud') {
                    sceneObjects.push({ type: 'cloud', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.CLOUD_W/2, y: center.y - SHAPE.CLOUD_H/2, w: SHAPE.CLOUD_W, h: SHAPE.CLOUD_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'valve-h') {
                    sceneObjects.push({ type: 'valve-h', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_W/2, y: center.y - SHAPE.VALVE_H/2, w: SHAPE.VALVE_W, h: SHAPE.VALVE_H }); 
                } else if (currentTool === 'valve-v') {
                    sceneObjects.push({ type: 'valve-v', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_H/2, y: center.y - SHAPE.VALVE_W/2, w: SHAPE.VALVE_H, h: SHAPE.VALVE_W }); 
                } else if (currentTool === 'valve-poly') {
                    sceneObjects.push({ type: 'valve-poly', color: currentColor, lineWidth: currentBaseSize, x: center.x - SHAPE.VALVE_POLY_W/2, y: center.y - SHAPE.VALVE_POLY_H/2, w: SHAPE.VALVE_POLY_W, h: SHAPE.VALVE_POLY_H, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'circle') {
                    sceneObjects.push({ type: 'circle', color: currentColor, lineWidth: currentBaseSize, x: center.x, y: center.y, radius: 50, isDouble: isDoubleCircle, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                } else if (currentTool === 'short-line-h') {
                    sceneObjects.push({ type: 'short-line-h', color: currentColor, lineWidth: currentBaseSize, x: center.x - 30, y: center.y, w: 60, h: 0, fillColor: isFillLightGray ? '#e0e0e0' : '#ffffff' }); 
                }
                resetUndoCounter();
                renderScene();
            } else if (currentTool.includes('arrow') || currentTool.includes('line')) {
                isDraggingArrow = true; arrowStartPoint = { x: wx, y: wy };
                
                if (currentTool.includes('angled')) {
                    currentPath = {
                        type: 'arrow',
                        pathType: currentTool,
                        color: currentColor,
                        lineWidth: currentBaseSize, 
                        points: [arrowStartPoint]
                    };
                }
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (isDraggingText) return;

            e.preventDefault();

            if (e.pointerType === 'touch') {
                if (!activeTouchPointers.has(e.pointerId)) return;
                activeTouchPointers.set(e.pointerId, e);
                
                if (activeTouchPointers.size === 1 && isPanning) {
                    const dx = e.clientX - startPan.x;
                    const dy = e.clientY - startPan.y;
                    camera.x = startCam.x + dx;
                    camera.y = startCam.y + dy;
                    renderScene();
                } else if (activeTouchPointers.size === 2) {
                    let pts = Array.from(activeTouchPointers.values());
                    let currentDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    let currentCenter = { x: (pts[0].clientX + pts[1].clientX) / 2, y: (pts[0].clientY + pts[1].clientY) / 2 };
                    
                    let scaleFactor = currentDist / initialPinchDist;
                    camera.scale = Math.min(Math.max(initialScale * scaleFactor, 0.2), 5); 
                    
                    camera.x = currentCenter.x - ((pinchCenter.x - startCam.x) / initialScale) * camera.scale;
                    camera.y = currentCenter.y - ((pinchCenter.y - startCam.y) / initialScale) * camera.scale;
                    renderScene();
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;
            
            const worldPos = getWorldPos(e.clientX, e.clientY);

            if (currentTool === 'select') {
                if (isLassoing) {
                    lassoPoints.push({x: worldPos.x, y: worldPos.y});
                    renderScene();
                    return;
                }

                if (isDraggingObject) {
                    const dx = worldPos.x - dragStartPoint.x;
                    const dy = worldPos.y - dragStartPoint.y;

                    let draggingList = multiSelectedObjects.length > 0 ? multiSelectedObjects : (selectedObject ? [selectedObject] : []);

                    draggingList.forEach(obj => {
                        if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'circle', 'text', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(obj.type)) {
                            obj.x = obj._origX + dx;
                            obj.y = obj._origY + dy;
                        } else {
                            if (obj.points && obj._origPoints) {
                                for (let i = 0; i < obj.points.length; i++) {
                                    obj.points[i].x = obj._origPoints[i].x + dx;
                                    obj.points[i].y = obj._origPoints[i].y + dy;
                                }
                            } else if (obj.p1 && obj._origP1) {
                                obj.p1.x = obj._origP1.x + dx;
                                obj.p1.y = obj._origP1.y + dy;
                                obj.p2.x = obj._origP2.x + dx;
                                obj.p2.y = obj._origP2.y + dy;
                            }
                        }
                    });
                    renderScene();
                    return;
                }
            }

            if (isDrawing && currentPath && (currentTool === 'pen' || currentTool === 'eraser')) {
                const events = (e.getCoalescedEvents && e.getCoalescedEvents().length > 0) ? e.getCoalescedEvents() : [e];
                for (let ev of events) {
                    const pos = getWorldPos(ev.clientX || e.clientX, ev.clientY || e.clientY);
                    const lastPt = currentPath.points[currentPath.points.length - 1];
                    if (!lastPt || Math.hypot(pos.x - lastPt.x, pos.y - lastPt.y) > 2) {
                        currentPath.points.push({ x: pos.x, y: pos.y });
                    }
                }
                
                if (currentTool === 'pen') {
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                    applyCamera(pCtx);
                    
                    let renderPath = currentPath;
                    if (e.getPredictedEvents && e.pointerType === 'pen') {
                        const predicted = e.getPredictedEvents();
                        if (predicted.length > 0) {
                            renderPath = { ...currentPath, points: [...currentPath.points] };
                            for (let ev of predicted) {
                                const pos = getWorldPos(ev.clientX, ev.clientY);
                                const lastPredPt = renderPath.points[renderPath.points.length - 1];
                                if (!lastPredPt || Math.hypot(pos.x - lastPredPt.x, pos.y - lastPredPt.y) > 2) {
                                    renderPath.points.push({ x: pos.x, y: pos.y });
                                }
                            }
                        }
                    }
                    drawSmoothPath(pCtx, renderPath);
                } else if (currentTool === 'eraser') {
                    renderScene();
                }

            } else if (isDraggingArrow) {
                if (currentTool.includes('angled') && currentPath) {
                    currentPath.points.push(worldPos);
                    
                    pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                    applyCamera(pCtx);
                    
                    let previewObj = { ...currentPath, points: orthogonalize(currentPath.points, 25) };
                    if (currentTool.includes('rounded-angled')) {
                        drawRoundedOrthogonalArrow(pCtx, previewObj, true);
                    } else {
                        drawFreehandArrow(pCtx, previewObj, true); 
                    }
                } else {
                    drawPreviewArrow(arrowStartPoint, worldPos);
                }
            }
        });

        function handlePointerEnd(e) {
            if (e.pointerType === 'touch') {
                activeTouchPointers.delete(e.pointerId);
                if (activeTouchPointers.size < 2) {
                    if (activeTouchPointers.size === 1) {
                        let remaining = Array.from(activeTouchPointers.values())[0];
                        startPan = { x: remaining.clientX, y: remaining.clientY };
                        startCam = { x: camera.x, y: camera.y };
                        isPanning = true;
                    } else {
                        isPanning = false;
                    }
                }
                return;
            }

            if (e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;

            if (currentTool === 'select') {
                if (isLassoing) {
                    isLassoing = false;
                    if (lassoPoints.length > 2) {
                        multiSelectedObjects = [];
                        sceneObjects.forEach(obj => {
                            let box = getBoundingBox(obj);
                            if (box && box.cx !== undefined && box.cy !== undefined) {
                                if (isPointInPolygon({x: box.cx, y: box.cy}, lassoPoints)) {
                                    multiSelectedObjects.push(obj);
                                }
                            }
                        });

                        if (multiSelectedObjects.length > 0) {
                            document.getElementById('btn-delete-selected').style.display = 'flex';
                        }
                    }
                    lassoPoints = [];
                    renderScene();
                    return;
                }

                if (isDraggingObject) {
                    isDraggingObject = false;
                    let draggingList = multiSelectedObjects.length > 0 ? multiSelectedObjects : (selectedObject ? [selectedObject] : []);
                    draggingList.forEach(obj => cleanupOriginalPosition(obj));
                    return;
                }
            }

            if (isDrawing && (currentTool === 'pen' || currentTool === 'eraser')) {
                if (currentTool === 'pen' && currentPath) {
                    sceneObjects.push(currentPath);
                    resetUndoCounter();
                }
                pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                renderScene();
            } else if (isDraggingArrow) {
                const worldPos = getWorldPos(e.clientX, e.clientY);

                if (currentTool.includes('angled') && currentPath) {
                    currentPath.points = orthogonalize(currentPath.points, 25);
                    if (currentPath.points.length > 1) {
                        sceneObjects.push(currentPath);
                        resetUndoCounter();
                    }
                } else {
                    let snapped = { p1: arrowStartPoint, p2: worldPos };
                    if (!currentTool.includes('curved') && currentTool !== 'circle-arrow-dashed') {
                        snapped = calculateSnapPoints(arrowStartPoint, worldPos); 
                    }
                    sceneObjects.push({ 
                        type: 'arrow', pathType: currentTool, color: currentColor, 
                        lineWidth: currentBaseSize, 
                        p1: snapped.p1, p2: snapped.p2, curvatureFactor: currentCurvatureFactor 
                    });
                    resetUndoCounter();
                }
                
                pCtx.setTransform(1, 0, 0, 1, 0, 0); 
                pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height); 
                renderScene();
            }
            isDrawing = false; isDraggingArrow = false; currentPath = null; arrowStartPoint = null;
        }

        window.addEventListener('pointerup', handlePointerEnd);
        window.addEventListener('pointercancel', handlePointerEnd);

        [canvas, previewCanvas].forEach(c => {
            c.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
            c.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
        });
    </script>
</body>
</html>
