<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Dynamics</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; height: 100dvh; width: 100vw; }
        #board-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .canvas-layer { position: absolute; top: 0; left: 0; display: block; touch-action: none; }
        #board { background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 1; }
        #preview-canvas { z-index: 2; pointer-events: none; } 
        
        #toolbar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; z-index: 10; width: 95%; max-width: 1350px; }
        .tool-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ccc; padding-right: 8px; margin-right: 2px; }
        .tool-group:last-child { border-right: none; margin-right: 0; padding-right: 0; }
        
        button { width: 38px; height: 38px; padding: 0; border: none; border-radius: 50%; background: #e0e0e0; font-size: 18px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        button.active { background: #007aff; color: white; }
        button.danger { background: #ff3b30; color: white; }
        button.action-btn { background: #ff9500; color: white; }
        
        button.format-btn { width: 30px; height: 30px; border-radius: 6px; font-size: 14px; background: #e0e0e0; margin: 0 2px; }
        button.format-btn.active { background: #007aff; color: white; }

        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
        .color-btn.active { border-color: #333; transform: scale(1.1); }
        
        .size-check { display: flex; align-items: center; gap: 3px; cursor: pointer; background: #f5f5f5; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .size-check:hover { background: #e0e0e0; }
        .size-check input[type="checkbox"], .size-check input[type="radio"] { cursor: pointer; margin: 0; }

        .shape-control-group { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        #curvature-control { display: none; } 
        #curvature-slider { width: 80px; }
        #double-edge-control { display: none; } 
        #double-edge-check { cursor: pointer; }
        #text-format-control { display: none; background: #f9f9f9; padding: 4px 8px; border-radius: 10px; border: 1px solid #ddd; }
        #text-size-input { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 5px; padding: 2px 4px; font-size: 14px; outline: none; margin-right: 5px; }
        #text-size-input:focus { border-color: #007aff; }
        
        .movable-text-input {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border: 2px dashed #007aff;
            border-radius: 8px;
            outline: none;
            padding: 4px 10px;
            z-index: 100;
            font-family: sans-serif;
            text-align: center;
            min-width: 150px;
            cursor: move;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="board-container">
        <canvas id="board" class="canvas-layer"></canvas>
        <canvas id="preview-canvas" class="canvas-layer"></canvas> 
    </div>

    <div id="toolbar">
        <div class="tool-group">
            <button id="btn-select" class="tool-btn" onclick="setTool('select')" title="เลือกและย้ายวัตถุ (วงล้อมเพื่อเลือกหลายอันได้)">👆</button>
            <button id="btn-delete-selected" class="danger" onclick="deleteSelected()" title="ลบที่เลือก (Del)" style="display: none; width: 30px; height: 30px; font-size: 14px; margin-left: 2px;">✖</button>
            
            <button id="btn-pen" class="active tool-btn" onclick="setTool('pen')" title="เส้นอิสระ" style="margin-left: 5px;">✍️</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-text" class="tool-btn" onclick="setTool('text')" title="พิมพ์ข้อความ">🔤</button>
                <div id="text-format-control" class="shape-control-group">
                    <label style="cursor: default; font-size: 16px;" title="ขนาดตัวอักษร">📏</label>
                    <input type="number" id="text-size-input" min="10" max="150" value="18" oninput="setTextSize(this.value)">
                    <button class="format-btn" onclick="toggleTextAlign(this)" title="จัดชิดซ้าย/กึ่งกลาง">L</button>
                    <button class="format-btn" onclick="toggleTextFormat('bold', this)" title="ตัวหนา"><b>B</b></button>
                    <button class="format-btn" style="font-family: serif;" onclick="toggleTextFormat('italic', this)" title="ตัวเอน"><i>I</i></button>
                    <button class="format-btn" onclick="toggleTextFormat('underline', this)" title="ขีดเส้นใต้"><u>U</u></button>
                    <button class="format-btn" style="font-size: 13px; font-weight: bold;" onclick="toggleTextFormat('caps', this)" title="พิมพ์ใหญ่">AA</button>
                </div>
            </div>
            <button id="btn-eraser" class="tool-btn" onclick="setTool('eraser')" title="ยางลบ">🧹</button>
        </div>
        
        <div class="tool-group">
            <button id="btn-rect" class="tool-btn" onclick="setTool('rect')" title="กล่องสี่เหลี่ยม (Process)">🟩</button>
            <button id="btn-oval" class="tool-btn" onclick="setTool('oval')" title="วงรี (Terminal)">⬭</button>
            <button id="btn-diamond" class="tool-btn" onclick="setTool('diamond')" title="สี่เหลี่ยมเพชร (Decision)">💠</button>
            <button id="btn-parallelogram" class="tool-btn" onclick="setTool('parallelogram')" title="สี่เหลี่ยมขนมเปียกปูน (Input/Output)">▱</button>
            <button id="btn-cloud" class="tool-btn" onclick="setTool('cloud')" title="ก้อนเมฆ">☁️</button>
            <button id="btn-valve-h" class="tool-btn" onclick="setTool('valve-h')" title="วาล์วแนวนอน">⏳</button>
            <button id="btn-valve-v" class="tool-btn" onclick="setTool('valve-v')" title="วาล์วแนวตั้ง">⌛</button>
            <button id="btn-valve-poly" class="tool-btn" onclick="setTool('valve-poly')" title="วาล์วสไตล์ Forrester">⋈</button>
            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-circle" class="tool-btn" onclick="setTool('circle')" title="วงกลม (Connector)">⭕</button>
                <div id="double-edge-control" class="shape-control-group">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 3px;" title="เปิดใช้งานวงกลมขอบคู่">
                        <input type="checkbox" id="double-edge-check" onchange="toggleDoubleEdge()"> ◎
                    </label>
                </div>
            </div>
        </div>
        
        <div class="tool-group">
            <button id="btn-a-arrow-s" class="tool-btn" onclick="setTool('angled-arrow-solid')" title="ลูกศรเส้นทึบหักมุม">⤴️</button>
            <button id="btn-a-arrow-d" class="tool-btn" onclick="setTool('angled-arrow-dashed')" title="ลูกศรเส้นประหักมุม">⤵️</button>
            <button id="btn-ra-arrow-s" class="tool-btn" onclick="setTool('rounded-angled-arrow-solid')" title="เส้นทึบหักมุมโค้งมน" style="font-weight: bold; font-size: 16px;">╰→</button>
            <button id="btn-ra-arrow-d" class="tool-btn" onclick="setTool('rounded-angled-arrow-dashed')" title="เส้นประหักมุมโค้งมน" style="font-weight: bold; font-size: 16px;">╰⇢</button>
            <button id="btn-a-line-s" class="tool-btn" onclick="setTool('angled-line-solid')" title="เส้นทึบหักมุม (ไม่มีหัวลูกศร)">🔀</button>

            <div style="display: flex; align-items: center; gap: 5px;">
                <button id="btn-c-arrow-d" class="tool-btn" onclick="setTool('curved-arrow-dashed')" title="ลูกศรเส้นประแบบโค้ง">)</button>
                <button id="btn-c-line-d" class="tool-btn" onclick="setTool('curved-line-dashed')" title="เส้นประแบบโค้ง (ไม่มีหัวลูกศร)">〰</button>
                <button id="btn-short-l-h" class="tool-btn" onclick="setTool('short-line-h')" title="เส้นตรงแนวราบสั้น">➖</button>
                <button id="btn-circle-arrow" class="tool-btn" onclick="setTool('circle-arrow-dashed')" title="ลูกศรประโคนวงกลม">⤏</button>
                <div id="curvature-control" class="shape-control-group">
                    <label style="cursor: default; font-size: 16px;" title="ปรับระดับความโค้ง">🪃</label>
                    <input type="range" id="curvature-slider" min="-150" max="150" value="50" oninput="setCurvature(this.value)">
                    <input type="number" id="curvature-input" min="-150" max="150" value="50" oninput="setCurvature(this.value)" title="ระบุค่าความโค้ง" style="width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 5px; padding: 2px; font-size: 12px; outline: none; margin-left: 3px;">
                </div>
            </div>
            <button class="action-btn" onclick="undo()" title="ย้อนกลับการทำงานล่าสุด">↩️</button>
        </div>
        
        <div class="tool-group size-picker">
            <label class="size-check" title="ขนาดเล็ก"><input type="radio" name="penSize" value="2" checked onchange="setSize(2)"> S</label>
            <label class="size-check" title="ขนาดกลาง"><input type="radio" name="penSize" value="4" onchange="setSize(4)"> M</label>
            <label class="size-check" title="ขนาดใหญ่"><input type="radio" name="penSize" value="6" onchange="setSize(6)"> L</label>
        </div>

        <div class="tool-group color-picker">
            <button class="color-btn active" style="background-color: #000000;" onclick="setColor('#000000', this)" title="สีดำ"></button>
            <button class="color-btn" style="background-color: #FF3B30;" onclick="setColor('#FF3B30', this)" title="สีแดง"></button>
            <button class="color-btn" style="background-color: #34C759;" onclick="setColor('#34C759', this)" title="สีเขียว"></button>
            <button class="color-btn" style="background-color: #007AFF;" onclick="setColor('#007AFF', this)" title="สีน้ำเงิน"></button>
        </div>

        <div class="tool-group">
            <label class="size-check" title="เปิด/ปิด เทสีเทาอ่อนให้รูปทรง">
                <input type="checkbox" id="fill-gray-check" onchange="toggleFillGray()"> 🪣 สีเทา
            </label>
        </div>

        <div class="tool-group">
            <button class="action-btn" onclick="createWatermark()" title="ประทับลายน้ำลิขสิทธิ์">©️</button>
            <button class="action-btn" onclick="resetView()" title="คืนมุมมองหน้าจอเริ่มต้น">🔍</button>
            
            <button class="action-btn" onclick="document.getElementById('file-input').click()" title="เปิดโปรเจกต์ (.json)">📂</button>
            <button class="action-btn" onclick="exportProject()" title="บันทึกโปรเจกต์ (.json)">💾</button>
            
            <button class="action-btn" onclick="saveImage()" title="บันทึกรูปภาพ (.png)">🖼️</button>
            <button class="action-btn" onclick="shareImage()" title="แชร์รูปภาพ">📲</button>
            <button class="danger" onclick="clearBoard()" title="ลบภาพทั้งหมดบนกระดาน">🗑️</button>
        </div>
    </div>
    
    <input type="file" id="file-input" style="display: none;" accept=".json" onchange="importProject(event)">

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d', { desynchronized: true });
        const previewCanvas = document.getElementById('preview-canvas');
        const pCtx = previewCanvas.getContext('2d', { desynchronized: true });
        const container = document.getElementById('board-container');
        
        const curvatureControl = document.getElementById('curvature-control');
        const doubleEdgeControl = document.getElementById('double-edge-control');
        const doubleEdgeCheck = document.getElementById('double-edge-check');
        const textFormatControl = document.getElementById('text-format-control');
        const textSizeInput = document.getElementById('text-size-input'); 
        
        let currentTool = 'pen';
        let currentColor = '#000000';
        let currentBaseSize = 2;
        let currentCurvatureFactor = 50; 
        let currentTextSize = 18;
        let isDoubleCircle = false; 
        let isFillLightGray = false; 

        let textAlignMode = 'left'; 
        let isTextBold = false;
        let isTextItalic = false;
        let isTextUnderline = false;
        let isTextAllCaps = false;
        
        let isDrawing = false;
        let isDraggingArrow = false; 
        let arrowStartPoint = null; 
        let sceneObjects = []; 
        let currentPath = null;
        let activeTextInput = null; 

        let isDraggingText = false;
        let textDragOffset = { x: 0, y: 0 };

        let selectedObject = null;
        let multiSelectedObjects = [];
        let isLassoing = false;
        let lassoPoints = [];

        let isDraggingObject = false;
        let dragStartPoint = { x: 0, y: 0 };

        let camera = { x: 0, y: 0, scale: 1 };
        let activeTouchPointers = new Map();
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let startCam = { x: 0, y: 0 };
        let initialPinchDist = 0;
        let initialScale = 1;
        let pinchCenter = { x: 0, y: 0 };

        let activeGuides = [];
        let guideTimeout = null;
        
        let lastClickTime = 0;
        let lastClickObj = null;

        const SHAPE = { 
            RECT_W: 160, RECT_H: 80, 
            CLOUD_W: 70, CLOUD_H: 45, 
            VALVE_W: 60, VALVE_H: 40,
            VALVE_POLY_W: 160, VALVE_POLY_H: 80,
            OVAL_W: 128, OVAL_H: 64,  
            DIAMOND_W: 160, DIAMOND_H: 100, 
            PARA_W: 160, PARA_H: 80
        };

        function isPointInPolygon(point, vs) {
            let x = point.x, y = point.y;
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                let xi = vs[i].x, yi = vs[i].y;
                let xj = vs[j].x, yj = vs[j].y;
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function snapshotOriginalPosition(obj) {
            if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'circle', 'text', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(obj.type)) {
                obj._origX = obj.x;
                obj._origY = obj.y;
            } else {
                obj._origPoints = obj.points ? JSON.parse(JSON.stringify(obj.points)) : null;
                obj._origP1 = obj.p1 ? { ...obj.p1 } : null;
                obj._origP2 = obj.p2 ? { ...obj.p2 } : null;
            }
        }

        function cleanupOriginalPosition(obj) {
            delete obj._origX; delete obj._origY;
            delete obj._origPoints; delete obj._origP1; delete obj._origP2;
        }

        function toggleFillGray() {
            isFillLightGray = document.getElementById('fill-gray-check').checked;
            if (selectedObject && ['rect', 'cloud', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'circle', 'short-line-h'].includes(selectedObject.type)) {
                selectedObject.fillColor = isFillLightGray ? '#e0e0e0' : '#ffffff';
                renderScene();
            }
        }

        function deleteSelected() {
            if (multiSelectedObjects.length > 0) {
                sceneObjects = sceneObjects.filter(obj => !multiSelectedObjects.includes(obj));
            } else if (selectedObject) {
                const index = sceneObjects.indexOf(selectedObject);
                if (index > -1) sceneObjects.splice(index, 1);
            }
            
            selectedObject = null;
            multiSelectedObjects = [];
            document.getElementById('btn-delete-selected').style.display = 'none';
            resetUndoCounter();
            renderScene();
        }

        window.addEventListener('keydown', (e) => {
            if ((e.key === 'Delete' || e.key === 'Backspace') && (selectedObject || multiSelectedObjects.length > 0) && currentTool === 'select') {
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return; 
                deleteSelected();
            }
        });

        function applyCamera(context) {
            const dpr = window.devicePixelRatio || 1;
            context.setTransform(dpr * camera.scale, 0, 0, dpr * camera.scale, camera.x * dpr, camera.y * dpr);
        }

        function resetView() {
            camera = { x: 0, y: 0, scale: 1 };
            renderScene();
        }

        function getWorldPos(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (screenX - rect.left - camera.x) / camera.scale,
                y: (screenY - rect.top - camera.y) / camera.scale
            };
        }
        
        function getScreenPos(worldX, worldY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: worldX * camera.scale + camera.x + rect.left,
                y: worldY * camera.scale + camera.y + rect.top
            };
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            
            [canvas, previewCanvas].forEach(c => {
                c.width = w * dpr;
                c.height = h * dpr;
                c.style.width = w + 'px';
                c.style.height = h + 'px';
            });
            renderScene();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function setTool(tool) {
            if (activeTextInput) finalizeTextInput();

            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            const btnId = `btn-${tool.replace(/-solid|-dashed/g, '').replace(/rounded-angled/g, 'ra').replace(/straight/g, 's').replace(/angled/g, 'a').replace(/curved/g, 'c').replace(/line/g, 'l').replace(/short-line-h/g, 'short-l-h').replace(/circle-arrow-dashed/g, 'circle-arrow')}`;
            const btn = document.getElementById(btnId);
            if(btn) btn.classList.add('active');

            curvatureControl.style.display = (currentTool.includes('curved') || currentTool === 'circle-arrow-dashed') ? 'flex' : 'none';
            doubleEdgeControl.style.display = currentTool === 'circle' ? 'flex' : 'none';
            textFormatControl.style.display = currentTool === 'text' ? 'flex' : 'none';

            if (tool !== 'select') {
                selectedObject = null;
                multiSelectedObjects = [];
                isLassoing = false;
                lassoPoints = [];
                document.getElementById('btn-delete-selected').style.display = 'none';
                renderScene();
            }
        }

        function toggleTextAlign(btn) {
            textAlignMode = textAlignMode === 'left' ? 'center' : 'left';
            btn.innerHTML = textAlignMode === 'center' ? 'C' : 'L';
            btn.classList.toggle('active', textAlignMode === 'center');
            if (activeTextInput) {
                activeTextInput.style.textAlign = textAlignMode;
            }
        }

        function toggleTextFormat(format, btn) {
            btn.classList.toggle('active');
            const isActive = btn.classList.contains('active');
            if (format === 'bold') isTextBold = isActive;
            if (format === 'italic') isTextItalic = isActive;
            if (format === 'underline') isTextUnderline = isActive;
            if (format === 'caps') isTextAllCaps = isActive;

            if (activeTextInput) {
                activeTextInput.style.fontWeight = isTextBold ? 'bold' : 'normal';
                activeTextInput.style.fontStyle = isTextItalic ? 'italic' : 'normal';
                activeTextInput.style.textDecoration = isTextUnderline ? 'underline' : 'none';
                activeTextInput.style.textTransform = isTextAllCaps ? 'uppercase' : 'none';
            }
        }
        
        function updateFormatButtonsUI() {
            const btns = document.querySelectorAll('.format-btn');
            btns.forEach(btn => {
                const title = btn.getAttribute('title');
                if (title === 'ตัวหนา') btn.classList.toggle('active', isTextBold);
                if (title === 'ตัวเอน') btn.classList.toggle('active', isTextItalic);
                if (title === 'ขีดเส้นใต้') btn.classList.toggle('active', isTextUnderline);
                if (title === 'พิมพ์ใหญ่') btn.classList.toggle('active', isTextAllCaps);
                if (title === 'จัดชิดซ้าย/กึ่งกลาง') {
                    btn.innerHTML = textAlignMode === 'center' ? 'C' : 'L';
                    btn.classList.toggle('active', textAlignMode === 'center');
                }
            });
        }

        function setColor(color, btnElement) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            if(activeTextInput) activeTextInput.style.color = currentColor;
            if(currentTool === 'eraser') setTool('pen');
        }

        function setSize(size) { currentBaseSize = parseInt(size); }
        function setCurvature(value) { 
            let val = parseInt(value);
            if (isNaN(val)) return;
            val = Math.max(-150, Math.min(150, val)); // ล็อกค่าให้อยู่ในช่วง -150 ถึง 150
            currentCurvatureFactor = val; 
            document.getElementById('curvature-slider').value = val;
            document.getElementById('curvature-input').value = val;
        } 
        function setTextSize(value) { 
            const parsedValue = parseInt(value);
            if (!isNaN(parsedValue) && parsedValue > 0) {
                currentTextSize = parsedValue; 
                if(activeTextInput) {
                    activeTextInput.style.fontSize = (parsedValue * camera.scale) + 'px';
                    activeTextInput.setAttribute('data-size', parsedValue);
                    activeTextInput.style.height = 'auto';
                    activeTextInput.style.height = activeTextInput.scrollHeight + 'px';
                }
            }
        }
        function toggleDoubleEdge() { isDoubleCircle = doubleEdgeCheck.checked; } 
        
        function clearBoard() { sceneObjects = []; selectedObject = null; multiSelectedObjects = []; document.getElementById('btn-delete-selected').style.display = 'none'; resetView(); }

        let undoCount = 0;
        let undoLimit = 2;

        function undo() {
            if (activeTextInput) finalizeTextInput();
            
            if (sceneObjects.length > 0 && undoCount < undoLimit) {
                let removed = sceneObjects.pop(); 
                if (removed === selectedObject) {
                    selectedObject = null;
                    document.getElementById('btn-delete-selected').style.display = 'none';
                }
                if (multiSelectedObjects.includes(removed)) {
                    multiSelectedObjects = multiSelectedObjects.filter(o => o !== removed);
                    if(multiSelectedObjects.length === 0) document.getElementById('btn-delete-selected').style.display = 'none';
                }
                undoCount++; 
                renderScene();      
            } else if (undoCount >= undoLimit) {
                console.log("ถึงขีดจำกัดการ Undo (2 ครั้ง)");
            }
        }

        function resetUndoCounter() {
            undoCount = 0;
        }

        function getCanvasWithWhiteBackground() {
            const tempCanvas = document.createElement('canvas');
            const dpr = window.devicePixelRatio || 1;
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.drawImage(canvas, 0, 0);
            return tempCanvas;
        }
        
        function exportProject() {
            if (activeTextInput) finalizeTextInput();

            const dateStr = new Date().toISOString().slice(0,10).replace(/-/g, '');
            const defaultName = `sd-project-${dateStr}`;
            
            let fileName = prompt("ตั้งชื่อไฟล์โปรเจกต์ที่ต้องการบันทึก (ไม่ต้องพิมพ์ .json):" , defaultName);
            
            if (fileName === null) return; 
            if (fileName.trim() === "") fileName = defaultName;

            const projectData = {
                version: "1.0",
                timestamp: new Date().toISOString(),
                camera: camera,
                objects: sceneObjects
            };

            const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${fileName}.json`;
            link.click();
            URL.revokeObjectURL(url);

        function importProject(event) {
            const input = event.target;
            const file = input.files[0];
            if (!file) return;

            if (activeTextInput) finalizeTextInput();

            reader.onload = (e) => {

                        selectedObject = null;
                        multiSelectedObjects = [];

        function getShapeBox(obj) {
            let box = null;
            if (['rect', 'cloud', 'valve-h', 'valve-v', 'valve-poly', 'oval', 'diamond', 'parallelogram', 'short-line-h'].includes(obj.type)) {
                let hPad = obj.type === 'short-line-h' ? 10 : 0;
                box = { left: obj.x, right: obj.x + obj.w, top: obj.y - hPad, bottom: obj.y + obj.h + hPad, cx: obj.x + obj.w/2, cy: obj.y + obj.h/2 };
            } else if (obj.type === 'circle') {
                box = { left: obj.x - obj.radius, right: obj.x + obj.radius, top: obj.y - obj.radius, bottom: obj.y + obj.radius, cx: obj.x, cy: obj.y };
            }
            
            if (box) box.isValve = (obj.type === 'valve-h' || obj.type === 'valve-v' || obj.type === 'valve-poly');
            return box;
        }

        function getBoundingBox(obj) {
            let box = getShapeBox(obj);
            if (box) return box;

            if (obj.type === 'text') {
                ctx.font = `${obj.isItalic ? 'italic ' : ''}${obj.isBold ? 'bold ' : ''}${obj.fontSize}px sans-serif`;
                let lines = (obj.isAllCaps ? obj.text.toUpperCase() : obj.text).split('\n');
                let maxWidth = 0;
                lines.forEach(line => {
                    maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
                });
                let totalHeight = lines.length * (obj.fontSize * 1.2);
                return { left: obj.x - maxWidth/2, right: obj.x + maxWidth/2, top: obj.y - totalHeight/2, bottom: obj.y + totalHeight/2, cx: obj.x, cy: obj.y };
            } else if (obj.points) {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                obj.points.forEach(p => { minX = Math.min(minX, p.x); minY = Math.min(minY, p.y); maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y); });
                return { left: minX, right: maxX, top: minY, bottom: maxY, cx: (minX + maxX)/2, cy: (minY + maxY)/2 };
            } else if (obj.p1 && obj.p2) {
                return { left: Math.min(obj.p1.x, obj.p2.x), right: Math.max(obj.p1.x, obj.p2.x), top: Math.min(obj.p1.y, obj.p2.y), bottom: Math.max(obj.p1.y, obj.p2.y), cx: (obj.p1.x + obj.p2.x)/2, cy: (obj.p1.y + obj.p2.y)/2 };
            }
            return null;
        }

        function getAlignedCenter(cx, cy) {
            let snappedCx = cx;
            let snappedCy = cy;
            let foundV = false;
            let foundH = false;
            const threshold = 20; 
            let guides = [];

            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (!box) continue;

                if (!foundV && Math.abs(cx - box.cx) < threshold) {
                    snappedCx = box.cx;
                    guides.push({ type: 'v', val: box.cx });
                    foundV = true;
                }
                if (!foundH && Math.abs(cy - box.cy) < threshold) {
                    snappedCy = box.cy;
                    guides.push({ type: 'h', val: box.cy });
                    foundH = true;
                }
            }
            return { x: snappedCx, y: snappedCy, guides: guides };
        }

        function isPointInOrNearBox(px, py, box) {
            const pad = 30; 
            return px >= box.left - pad && px <= box.right + pad && py >= box.top - pad && py <= box.bottom + pad;
        }

        function calculateSnapPoints(p1, p2) {
            let srcBox = null, dstBox = null;
            for (let obj of sceneObjects) {
                let box = getShapeBox(obj);
                if (box) {
                    if (!srcBox && isPointInOrNearBox(p1.x, p1.y, box)) srcBox = box;
                    if (!dstBox && isPointInOrNearBox(p2.x, p2.y, box) && box !== srcBox) dstBox = box;
                }
            }

            if (srcBox && dstBox) {
                const dx = dstBox.cx - srcBox.cx;
                const dy = dstBox.cy - srcBox.cy;
                let p1x, p1y, p2x, p2y;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.right; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.left; p2y = dstBox.cy;
                    } else {
                        p1x = srcBox.isValve ? srcBox.cx : srcBox.left; p1y = srcBox.cy;
                        p2x = dstBox.isValve ? dstBox.cx : dstBox.right; p2y = dstBox.cy;
                    }
                } else {
                    if (dy > 0) {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.bottom;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.top;
                    } else {
                        p1x = srcBox.cx; p1y = srcBox.isValve ? srcBox.cy : srcBox.top;
                        p2x = dstBox.cx; p2y = dstBox.isValve ? dstBox.cy : dstBox.bottom;
                    }
                }
                return { p1: {x: p1x, y: p1y}, p2: {x: p2x, y: p2y} };
            }
            return { p1, p2 };
        }

        function orthogonalize(points, threshold = 30) {
            if (!points || points.length < 2) return points;
            
            let result = [{ x: points[0].x, y: points[0].y }];
            let current = { x: points[0].x, y: points[0].y };
            let movingAxis = null; 

            for (let i = 1; i < points.length; i++) {
                let pt = points[i];
                let dx = pt.x - current.x;
                let dy = pt.y - current.y;

                if (!movingAxis) {
                    if (Math.abs(dx) >= Math.abs(dy) && Math.abs(dx) > threshold) {
                        movingAxis = 'x';
                        current.x = pt.x;
                        result.push({ x: current.x, y: current.y });
                    } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > threshold) {
                        movingAxis = 'y';
                        current.y = pt.y;
                        result.push({ x: current.x, y: current.y });
                    }
                } else {
                    if (movingAxis === 'x') {
                        current.x = pt.x; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        
                        if (Math.abs(pt.y - current.y) > threshold) {
                            movingAxis = 'y';
                            current.y = pt.y;
                            result.push({ x: current.x, y: current.y });
                        }
                    } else {
                        current.y = pt.y; 
                        result[result.length - 1] = { x: current.x, y: current.y };
                        
                        if (Math.abs(pt.x - current.x) > threshold) {
                            movingAxis = 'x';
                            current.x = pt.x;
                            result.push({ x: current.x, y: current.y });
                        }
                    }
                }
            }
            
            if (result.length > 1) {
                let lastRaw = points[points.length - 1];
                if (movingAxis === 'x') {
                    result[result.length - 1] = { x: lastRaw.x, y: current.y };
                } else if (movingAxis === 'y') {
                    result[result.length - 1] = { x: current.x, y: lastRaw.y };
                }
            }
            
            let cleanResult = [result[0]];
            for (let i = 1; i < result.length; i++) {
                let prev = cleanResult[cleanResult.length - 1];
                let curr = result[i];
                if (Math.abs(curr.x - prev.x) > 1 || Math.abs(curr.y - prev.y) > 1) {
                    cleanResult.push(curr);
                }
            }

            if (cleanResult.length === 1) {
                cleanResult.push({ x: points[points.length-1].x, y: points[points.length-1].y });
            }
            
            return cleanResult;
        }

        function drawSmoothPath(c, pathData) {
            if (!pathData.points || pathData.points.length === 0) return;
            c.beginPath();
            c.lineCap = 'round';
            c.lineJoin = 'round';
            c.globalCompositeOperation = pathData.type === 'eraser' ? 'destination-out' : 'source-over';
            c.strokeStyle = pathData.type === 'eraser' ? 'rgba(0,0,0,1)' : (pathData.color || '#000');
            c.lineWidth = pathData.type === 'eraser' ? pathData.baseSize * 2.5 : pathData.baseSize;

            c.moveTo(pathData.points[0].x, pathData.points[0].y);
            
            if (pathData.points.length === 1) {
                c.lineTo(pathData.points[0].x + 0.1, pathData.points[0].y);
            } else {
                for (let i = 1; i < pathData.points.length - 1; i++) {
                    let midX = (pathData.points[i].x + pathData.points[i+1].x) / 2;
                    let midY = (pathData.points[i].y + pathData.points[i+1].y) / 2;
                    c.quadraticCurveTo(pathData.points[i].x, pathData.points[i].y, midX, midY);
                }
                let last = pathData.points[pathData.points.length - 1];
                c.lineTo(last.x, last.y);
            }
            c.stroke();
            c.globalCompositeOperation = 'source-over';
        }

        function drawArrowhead(c, x, y, angle, color, lineWidth = 4) {
            const size = 12 + (lineWidth * 1.2); 
            const offset = lineWidth; 

            c.save(); c.translate(x, y); c.rotate(angle);
            c.beginPath(); 
            c.moveTo(offset, 0); 
            c.lineTo(-size + offset, -size * 0.5); 
            c.lineTo(-size * 0.8 + offset, 0); 
            c.lineTo(-size + offset, size * 0.5); 
            c.closePath();
            c.fillStyle = color; c.fill(); c.restore();
        }

        function drawCloudShape(c, x, y, w, h, color, lineWidth = 4, fillColor = '#ffffff') {
            c.beginPath(); c.moveTo(x + w * 0.2, y + h * 0.8);
            c.bezierCurveTo(x - w * 0.1, y + h * 0.8, x - w * 0.1, y + h * 0.3, x + w * 0.2, y + h * 0.3);
            c.bezierCurveTo(x + w * 0.2, y - h * 0.1, x + w * 0.7, y - h * 0.1, x + w * 0.7, y + h * 0.2);
            c.bezierCurveTo(x + w * 1.1, y + h * 0.2, x + w * 1.1, y + h * 0.8, x + w * 0.8, y + h * 0.8);
            c.closePath();
            c.strokeStyle = color; c.lineWidth = lineWidth; c.fillStyle = fillColor; c.fill(); c.stroke();
        }

        function drawValveShape(c, obj) {
            c.beginPath();
            if (obj.type === 'valve-h') {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x, obj.y + obj.h); c.closePath();
                c.moveTo(obj.x + obj.w, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            } else {
                c.moveTo(obj.x, obj.y); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y); c.closePath();
                c.moveTo(obj.x, obj.y + obj.h); c.lineTo(obj.x + obj.w / 2, obj.y + obj.h / 2); c.lineTo(obj.x + obj.w, obj.y + obj.h); c.closePath();
            }
            c.strokeStyle = obj.color; c.lineWidth = obj.lineWidth || 4; c.stroke();
        }

        function drawValvePolyShape(c, obj) {
            const {x, y, w, h, color, lineWidth} = obj;
            const cy = y + h / 2;

            const headH = h * 0.6; 
            
            const neckX_ref = x + w * 0.75; 
            const dx = w * 0.25; 
            const dy = headH / 2; 
            const slopeX = dx / dy; 
            const insetX = (h / 2) * slopeX; 
            const origTopX = Math.max(x, neckX_ref - insetX);
            
            const topX = x + ((origTopX - x) * 2);
            const bottomX = x + ((origTopX - x) * 2); 

            c.beginPath();
            c.moveTo(x, y);            
            c.lineTo(topX, y);         
            
            c.lineTo(x + w, cy + headH / 2); 
            
            c.lineTo(x + w, cy - headH / 2); 

            c.lineTo(bottomX, y + h); 
            
            c.lineTo(x, y + h);        
            c.closePath();             

            c.fillStyle = obj.fillColor || '#ffffff';
            c.fill();
            c.strokeStyle = color;
            c.lineWidth = lineWidth || 4;
            c.lineJoin = 'miter';
            c.stroke();
        }

        function setLineDash(c, isDashed) { if (isDashed) c.setLineDash([10, 5]); else c.setLineDash([]); }

        function drawCurvedArrow(c, obj, isPreview = false) {
            const p1 = obj.p1, p2 = obj.p2;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) return;

            let h = Math.max(1, Math.min(Math.abs(obj.curvatureFactor), d / 2));
            const bowOutward = obj.curvatureFactor >= 0;
            
            const r = (d * d) / (8 * h) + (h / 2);
            const k = r - h;
            let nx = -dy / d, ny = dx / d;
            if (!bowOutward) { nx = -nx; ny = -ny; }

            const cx = (p1.x + p2.x) / 2 - k * nx;
            const cy = (p1.y + p2.y) / 2 - k * ny;
            const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
            const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
            const ccw = bowOutward ? true : false;

            c.beginPath(); c.arc(cx, cy, r, startAngle, endAngle, ccw);
            c.strokeStyle = obj.color; c.lineWidth = obj.lineWidth || 4; 
            setLineDash(c, obj.pathType.includes('dashed')); c.stroke(); setLineDash(c, false);
            
            if (!isPreview && !obj.pathType.includes('line')) {
                drawArrowhead(c, p2.x, p2.y, endAngle + (ccw ? -Math.PI / 2 : Math.PI / 2), obj.color, obj.lineWidth || 4);
            }
        }
        
        function drawCircleTailArrow(c, obj, isPreview = false) {
            const p1 = obj.p1, p2 = obj.p2;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) return;

            // คำนวณความโค้งเหมือนลูกศรโค้งปกติ
            let factor = obj.curvatureFactor !== undefined ? obj.curvatureFactor : 50;
            let h = Math.max(1, Math.min(Math.abs(factor), d / 2));
            const bowOutward = factor >= 0;
            
            const r = (d * d) / (8 * h) + (h / 2);
            const k = r - h;
            let nx = -dy / d, ny = dx / d;
            if (!bowOutward) { nx = -nx; ny = -ny; }

            const cx = (p1.x + p2.x) / 2 - k * nx;
            const cy = (p1.y + p2.y) / 2 - k * ny;
            const startAngle = Math.atan2(p1.y - cy, p1.x - cx);
            const endAngle = Math.atan2(p2.y - cy, p2.x - cx);
            const ccw = bowOutward ? true : false;

            // ขนาดวงกลมใหม่ (เล็กลง)
            const circleRadius = 3 + (obj.lineWidth || 4) * 0.4; 

            // 1. วาดเส้นประแบบโค้ง
            c.beginPath(); 
            c.arc(cx, cy, r, startAngle, endAngle, ccw);
            c.strokeStyle = isPreview ? '#999' : obj.color; 
            c.lineWidth = obj.lineWidth || 4; 
            setLineDash(c, true); 
            c.stroke(); 
            setLineDash(c, false);

            // 2. วาดโคนวงกลมเล็กทับจุดเริ่มต้น
            c.beginPath();
            c.arc(p1.x, p1.y, circleRadius, 0, Math.PI * 2);
            c.fillStyle = obj.fillColor || '#ffffff';
            c.fill();
            c.stroke();

            // 3. วาดหัวลูกศร
            if (!isPreview) {
                drawArrowhead(c, p2.x, p2.y, endAngle + (ccw ? -Math.PI / 2 : Math.PI / 2), obj.color, obj.lineWidth || 4);
            }
        }


        function drawFreehandArrow(c, obj, isPreview = false) {
            if (!obj.points || obj.points.length < 2) return;

            c.beginPath();
            c.moveTo(obj.points[0].x, obj.points[0].y);
            for (let i = 1; i < obj.points.length; i++) {
                c.lineTo(obj.points[i].x, obj.points[i].y);
            }

            c.strokeStyle = isPreview ? '#999' : obj.color;
            c.lineWidth = obj.lineWidth || 4;
            c.lineJoin = 'round'; 
            
            setLineDash(c, obj.pathType.includes('dashed'));
            c.stroke();
            setLineDash(c, false);
            c.lineJoin = 'miter';

            if (!isPreview && !obj.pathType.includes('line')) {
                let endPt = obj.points[obj.points.length - 1];
                let prevPt = obj.points[obj.points.length - 2];
                const angle = Math.atan2(endPt.y - prevPt.y, endPt.x - prevPt.x);
                drawArrowhead(c, endPt.x, endPt.y, angle, obj.color, obj.lineWidth || 4);
            }
        }

        function drawRoundedOrthogonalArrow(c, obj, isPreview = false) {
            if (!obj.points || obj.points.length < 2) return;

            c.beginPath();
            c.moveTo(obj.points[0].x, obj.points[0].y);

            let maxRadius = 20;

            if (obj.points.length > 2) {
                for (let i = 1; i < obj.points.length - 1; i++) {
                    let p0 = obj.points[i-1];
                    let p1 = obj.points[i];
                    let p2 = obj.points[i+1];
                    
                    let d1 = Math.hypot(p1.x - p0.x, p1.y - p0.y);
                    let d2 = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    let radius = Math.min(maxRadius, d1 / 2, d2 / 2);

                    c.arcTo(p1.x, p1.y, p2.x, p2.y, radius);
                }
            }
            c.lineTo(obj.points[obj.points.length - 1].x, obj.points[obj.points.length - 1].y);

            c.strokeStyle = isPreview ? '#999' : obj.color;
            c.lineWidth = obj.lineWidth || 4;
            c.lineJoin = 'round';
            c.lineCap = 'round';

            setLineDash(c, obj.pathType.includes('dashed'));
            c.stroke();
            setLineDash(c, false);

            if (!isPreview && !obj.pathType.includes('line')) {
                let endPt = obj.points[obj.points.length - 1];
                let prevPt = obj.points[obj.points.length - 2];
                const angle = Math.atan2(endPt.y - prevPt.y, endPt.x - prevPt.x);
                drawArrowhead(c, endPt.x, endPt.y, angle, obj.color, obj.lineWidth || 4);
            }
        }

        function drawPreviewArrow(p1, p2) {
            pCtx.setTransform(1, 0, 0, 1, 0, 0); pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            applyCamera(pCtx);
            
            let snapped = { p1, p2 };
            if (!currentTool.includes('curved') && currentTool !== 'circle-arrow-dashed') {
                snapped = calculateSnapPoints(p1, p2); 
            }

            const obj = { p1: snapped.p1, p2: snapped.p2, color: '#999', pathType: currentTool, curvatureFactor: currentCurvatureFactor, lineWidth: currentBaseSize }; 
            if (currentTool.includes('curved')) {
                drawCurvedArrow(pCtx, obj, true);
            } else if (currentTool === 'circle-arrow-dashed') {
                drawCircleTailArrow(pCtx, obj, true);
            }
        }

        function renderScene() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            applyCamera(ctx);
            
            sceneObjects.forEach(obj => {
                if (obj.type === 'text') return; 

                if (obj.type === 'pen' || obj.type === 'eraser') {
                    drawSmoothPath(ctx, obj);
                } else if (obj.type === 'rect') {
                    ctx.beginPath(); ctx.rect(obj.x, obj.y, obj.w, obj.h);
                    ctx.fillStyle = obj.fillColor || '#ffffff'; ctx.fill();
                    ctx.strokeStyle = obj.color; ctx.lineWidth = obj.lineWidth || 4; ctx.stroke();
                } else if (obj.type === 'oval') {
                    ctx.beginPath();
                    ctx.ellipse(obj.x + obj.w/2, obj.y + obj.h/2, obj.w/2, obj.h/2, 0, 0, 2 * Math.PI);
                    ctx.fillStyle = obj.fillColor || '#ffffff'; ctx.fill();
                    ctx.strokeStyle = obj.color; ctx.lineWidth = obj.lineWidth || 4; ctx.stroke();
                } else if (obj.type === 'diamond') {
                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w/2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h/2);
                    ctx.lineTo(obj.x + obj.w/2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h/2);
                    ctx.closePath();
                    ctx.fillStyle = obj.fillColor || '#ffffff'; ctx.fill();
                    ctx.strokeStyle = obj.color; ctx.lineWidth = obj.lineWidth || 4; ctx.stroke();
                } else if (obj.type === 'parallelogram') {
                    let offset = obj.w * 0.2;
                    ctx.beginPath();
                    ctx.moveTo(obj.x + offset, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y);
                    ctx.lineTo(obj.x + obj.w - offset, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h);
                    ctx.closePath();
                    ctx.fillStyle = obj.fillColor || '#ffffff'; ctx.fill();
                    ctx.strokeStyle = obj.color; ctx.lineWidth = obj.lineWidth || 4; ctx.stroke();
                } else if (obj.type === 'short-line-h') {
                    const midX = obj.x + obj.w / 2;
                    const midY = obj.y;
                    const circleRadius = 3 + (obj.lineWidth || 4) * 0.4; // ขนาดเท่าโคนลูกศร

                    // วาดเส้นขีด
                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y);
                    ctx.strokeStyle = obj.color; 
                    ctx.lineWidth = obj.lineWidth || 4; 
                    ctx.stroke();

                    // วาดวงกลมเล็กตรงกลาง
                    ctx.beginPath();
                    ctx.arc(midX, midY, circleRadius, 0, Math.PI * 2);
                    ctx.fillStyle = obj.fillColor || '#ffffff';
                    ctx.fill();
                    ctx.stroke();
                } else if (obj.type === 'cloud') {
                    drawCloudShape(ctx, obj.x, obj.y, obj.w, obj.h, obj.color, obj.lineWidth || 4, obj.fillColor || '#ffffff');
                } else if (obj.type === 'valve-h' || obj.type === 'valve-v') {
                    drawValveShape(ctx, obj);
                } else if (obj.type === 'valve-poly') {
                    drawValvePolyShape(ctx, obj);
                } else if (obj.type === 'circle') {
                    ctx.lineWidth = obj.lineWidth || 4; ctx.strokeStyle = obj.color; ctx.fillStyle = obj.fillColor || '#ffffff';
                    ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2); ctx.fill();
                    if (obj.isDouble) { 
                        ctx.stroke(); ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius - 8, 0, Math.PI * 2); 
                    }
                    ctx.stroke();
                } else if (obj.type === 'arrow') {
                    if (obj.points) {
                        if (obj.pathType.includes('rounded-angled')) {
                            drawRoundedOrthogonalArrow(ctx, obj, false);
                        } else {
                            drawFreehandArrow(ctx, obj, false);
                        }
                    } else if (obj.p1 && obj.p2) {
                        if (obj.pathType.includes('curved')) {
                            drawCurvedArrow(ctx, obj);
                        } else if (obj.pathType === 'circle-arrow-dashed') {
                            drawCircleTailArrow(ctx, obj);
                        }
                    }
                }
            });

            sceneObjects.forEach(obj => {
                if (obj.type === 'text') {
                    ctx.fillStyle = obj.color;
                    let fontStyle = obj.isItalic ? 'italic ' : '';
                    let fontWeight = obj.isBold ? 'bold ' : '';
                    ctx.font = `${fontStyle}${fontWeight}${obj.fontSize}px sans-serif`;
                    ctx.textBaseline = 'middle';
                    
                    let drawText = obj.isAllCaps ? obj.text.toUpperCase() : obj.text;
                    let lines = drawText.split('\n');
                    
                    let maxWidth = 0;
                    lines.forEach(line => {
                        maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
                    });

                    let lineHeight = obj.fontSize * 1.2;
                    let startY = obj.y - ((lines.length - 1) * lineHeight) / 2;
                    
                    let align = obj.align || 'left';
                    ctx.textAlign = align;
                    
                    let drawX = obj.x;
                    if (align === 'left') {
                        drawX = obj.x - maxWidth / 2;
                    }

                    lines.forEach((line, index) => {
                        let lineY = startY + (index * lineHeight);
                        ctx.fillText(line, drawX, lineY);

                        if (obj.isUnderline) {
                            let metrics = ctx.measureText(line);
                            let textWidth = metrics.width;
                            let yOffset = obj.fontSize * 0.4;
                            
                            ctx.beginPath();
                            ctx.strokeStyle = obj.color;
                            ctx.lineWidth = Math.max(1.5, obj.fontSize / 15);
                            if (align === 'left') {
                                ctx.moveTo(drawX, lineY + yOffset);
                                ctx.lineTo(drawX + textWidth, lineY + yOffset);
                            } else {
                                ctx.moveTo(obj.x - textWidth / 2, lineY + yOffset);
                                ctx.lineTo(obj.x + textWidth / 2, lineY + yOffset);
                            }
                            ctx.stroke();
                        }
                    });
                }
            });

            if (activeGuides.length > 0) {
                ctx.save();
                ctx.strokeStyle = '#34C759'; 
                ctx.lineWidth = 2 / camera.scale; 
                ctx.setLineDash([10 / camera.scale, 10 / camera.scale]);
                
                activeGuides.forEach(g => {
                    ctx.beginPath();
                    if (g.type === 'v') {
                        ctx.moveTo(g.val, -50000); 
                        ctx.lineTo(g.val, 50000);
                    } else {
                        ctx.moveTo(-50000, g.val); 
                        ctx.lineTo(50000, g.val);
                    }
                    ctx.stroke();
                });
                ctx.restore();
            }

            if (lassoPoints.length > 0) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                for(let i = 1; i < lassoPoints.length; i++){
                    ctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = 'rgba(0, 122, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = '#007AFF';
                ctx.lineWidth = 1.5 / camera.scale;
                ctx.setLineDash([6 / camera.scale, 6 / camera.scale]);
                ctx.stroke();
                ctx.restore();
            }

            if (currentTool === 'select') {
                let toDrawBoxes = [];
                if (selectedObject) toDrawBoxes.push(selectedObject);
                if (multiSelectedObjects.length > 0) toDrawBoxes = toDrawBoxes.concat(multiSelectedObjects);

                toDrawBoxes.forEach(obj => {
                    let box = getBoundingBox(obj);
                    if (box) {
                        ctx.save();
                        ctx.strokeStyle = '#007AFF';
                        ctx.lineWidth = 2 / camera.scale;
                        ctx.setLineDash([5 / camera.scale, 5 / camera.scale]);
                        const pad = 8;
                        ctx.strokeRect(box.left - pad, box.top - pad, (box.right - box.left) + pad * 2, (box.bottom - box.top) + pad * 2);
                        ctx.restore();
                    }
                });
            }
        }

        function finalizeTextInput() {
            if (activeTextInput) {
                if (activeTextInput.value.trim() !== '') {
                    const tx = parseFloat(activeTextInput.getAttribute('data-x'));
                    const ty = parseFloat(activeTextInput.getAttribute('data-y'));
                    
                    sceneObjects.push({ 
                        type: 'text', 
                        text: activeTextInput.value, 
                        x: tx, 
                        y: ty, 
                        color: activeTextInput.style.color, 
                        fontSize: parseInt(activeTextInput.getAttribute('data-size')),
                        isBold: isTextBold,
                        isItalic: isTextItalic,
                        isUnderline: isTextUnderline,
                        isAllCaps: isTextAllCaps,
                        align: textAlignMode
                    });
                    resetUndoCounter();
                    renderScene();
                }
                activeTextInput.remove();
                activeTextInput = null;
                isDraggingText = false;
            }
        }
        
        function editExistingText(obj, index) {
            sceneObjects.splice(index, 1);
            selectedObject = null;
            document.getElementById('btn-delete-selected').style.display = 'none';

            setTool('text');
            currentTextSize = obj.fontSize;
            document.getElementById('text-size-input').value = currentTextSize;
            currentColor = obj.color;
            isTextBold = obj.isBold;
            isTextItalic = obj.isItalic;
            isTextUnderline = obj.isUnderline;
            isTextAllCaps = obj.isAllCaps;
            textAlignMode = obj.align || 'left';

            updateFormatButtonsUI();
            
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));

            const screenPos = getScreenPos(obj.x, obj.y);
            createTextInput(obj.x, obj.y, screenPos.x, screenPos.y, obj.text);
            renderScene();
        }

            activeTextInput.addEventListener('pointerdown', (e) => {

                textDragOffset.y = e.clientY - (rect.top + rect.height / 2);
                e.stopPropagation();

        function createTextInput(wx, wy, clientX, clientY, existingText = '') {
            activeTextInput = document.createElement('textarea');
            activeTextInput.placeholder = 'พิมพ์...';
            activeTextInput.className = 'movable-text-input';
            activeTextInput.style.resize = 'none';
            activeTextInput.style.overflow = 'hidden';
            activeTextInput.style.whiteSpace = 'pre';
            activeTextInput.style.lineHeight = '1.2';
            activeTextInput.rows = 1;
            activeTextInput.value = existingText;
            
            activeTextInput.style.left = clientX + 'px';
            activeTextInput.style.top = clientY + 'px';
            activeTextInput.style.fontSize = (currentTextSize * camera.scale) + 'px';
            activeTextInput.style.color = currentColor;
            
            activeTextInput.style.fontWeight = isTextBold ? 'bold' : 'normal';
            activeTextInput.style.fontStyle = isTextItalic ? 'italic' : 'normal';
            activeTextInput.style.textDecoration = isTextUnderline ? 'underline' : 'none';
            activeTextInput.style.textTransform = isTextAllCaps ? 'uppercase' : 'none';
            activeTextInput.style.textAlign = textAlignMode;
            
            activeTextInput.setAttribute('data-x', wx);
            activeTextInput.setAttribute('data-y', wy);
            activeTextInput.setAttribute('data-size', currentTextSize);

            container.appendChild(activeTextInput);

                activeTextInput.style.height = 'auto';

            };

            setTimeout(() => {
                activeTextInput.focus();
                autoResize();
            }, 50);

            activeTextInput.addEventListener('pointerdown', (e) => {
